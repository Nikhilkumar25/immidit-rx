        guard(bh + 4); fillR(M, y, CW, bh, [244, 243, 250]); strokeR(M, y, CW, bh, [221, 216, 238]); vbar(M, y, y + bh, PUR);
        let fy = y + 5;
        if (fu.updatedDiagnosis) { setF('bold', 5.5, PUR); doc.text('UPDATED CLINICAL DIAGNOSIS', M + 5, fy); fy += 4; setF('bold', 10, DRK); doc.text(diagL, M + 5, fy); fy += diagL.length * 4.2 + 4; }
        if (fu.additionalMeds) { setF('bold', 5.5, PUR); doc.text('FOLLOW-UP MEDICATIONS', M + 5, fy); fy += 4; setF('normal', 9, DRK); doc.text(medsL, M + 5, fy); fy += medsL.length * 4.2 + 4; }
        if (fu.finalNotes) { setF('bold', 5.5, PUR); doc.text('FINAL CLINICAL NOTES & ADVICE', M + 5, fy); fy += 4; setF('normal', 8.5, DRK); doc.text(notesL, M + 5, fy); }
        y += bh + 5;
      }

      // ── SIGNATURE ──────────────────────────────────────────────────────────────
      guard(25);
      if (rx.doctorSignature) { try { doc.addImage(rx.doctorSignature, 'PNG', W - M - 44, y, 44, 11); } catch (e) { } }
      doc.setDrawColor(...LGR); doc.setLineWidth(0.35); doc.line(W - M - 46, y + 12, W - M, y + 12);
      setF('bold', 8.5, DRK); doc.text(rx.doctorName, W - M, y + 17, { align: 'right' });
      setF('oblique', 7.5, GRY); doc.text(rx.doctorSpec || '', W - M, y + 22, { align: 'right' });
      setF('normal', 7, LGR); doc.text('Reg. No: ' + rx.doctorReg, W - M, y + 27, { align: 'right' });
      setF('normal', 7, LGR); doc.text("Doctor's Signature & Stamp", W - M, y + 31, { align: 'right' });
      y += 35;

      // ── SERVICES PANEL ─────────────────────────────────────────────────────────
      guard(85); hline(y, XGR, 0.35); y += 5;
      secTitle('OUR SERVICES — CARE AT HOME IN 10 MINUTES');

      const howTxt = 'How immidit works: A background-verified nurse arrives at your door — equipped with clinical tools and connected live to a registered doctor for real-time teleconsultation, diagnosis and prescription.  No waiting rooms. No travel. Care in 10 minutes.';
      const howL = doc.splitTextToSize(howTxt, CW - 10), howH = howL.length * 4.2 + 10;
      guard(howH + 4);
      fillR(M, y, CW, howH, [244, 243, 250]); strokeR(M, y, CW, howH, [221, 216, 238]); vbar(M, y, y + howH, PUR);
      setF('bold', 8, DRK); doc.text('How immidit works:', M + 5, y + 6);
      setF('normal', 8, DRK); doc.text(howL, M + 5, y + 6);
      y += howH + 4;

      const pillarsData = [
        ['Verified Professionals', 'Every nurse is background-checked and clinically trained. Doctors are MCI-registered with verified credentials.'],
        ['Fair & Transparent Pricing', 'Full cost shown upfront — no hidden charges. Consultation, nurse visit and tests priced clearly.'],
        ['10-Minute Arrival', 'Hyperlocal in Sector 56 & nearby Gurugram. Nurse dispatched immediately on booking confirmation.'],
      ];
      const pw = (CW - 8) / 3, ptexts = pillarsData.map(([, b]) => doc.splitTextToSize(b, pw - 6));
      const pbh = Math.max(...ptexts.map(l => l.length)) * 4 + 14; guard(pbh + 4);
      pillarsData.forEach(([title,], i) => {
        const px = M + i * (pw + 4);
        fillR(px, y, pw, pbh, BG); strokeR(px, y, pw, pbh, XGR);
        doc.setDrawColor(...ORG); doc.setLineWidth(1.5); doc.line(px, y, px + pw, y);
        setF('bold', 7.5, ORG); doc.text(title, px + 4, y + 7);
        setF('normal', 7, GRY); doc.text(ptexts[i], px + 4, y + 12);
      }); y += pbh + 5;

      // ── OUR SERVICES MARQUEE ──────────────────────────────────────────────────
      const svcData = [
        ['Doctor', 'Tele-Consult', '499'],
        ['Nurse', 'Nurse Visit', '299'],
        ['Tests', 'Lab Tests', '199'],
        ['Wound', 'Dressings', '399'],
        ['IV/Drip', 'IV Therapy', '499'],
        ['ECG', 'ECG @ Home', '599']
      ];
      const sw = CW / 6; guard(35);
      svcData.forEach(([icon, name, price], i) => {
        const sx = M + i * sw + 0.5;
        fillR(sx, y, sw - 1, 28, WHT); strokeR(sx, y, sw - 1, 28, XGR);
        doc.setDrawColor(...ORG); doc.setLineWidth(1.2); doc.line(sx, y, sx + sw - 1, y);
        
        // Category Label
        fillR(sx + 2, y + 2, sw - 5, 6, BG, 1);
        setF('bold', 6, ORG); doc.text(icon, sx + sw/2, y + 6.2, { align: 'center' });
        
        // Service Name (Dynamic size)
        const nameSz = fitText(name, sw - 4, 8.5, 'bold', DRK);
        doc.text(name, sx + sw / 2, y + 15, { align: 'center' });
        
        // Price
        setF('normal', 6.5, GRY); doc.text('From', sx + sw / 2, y + 20, { align: 'center' });
        setF('bold', 9.5, ORG); doc.text('Rs.' + price, sx + sw / 2, y + 25, { align: 'center' });
      }); y += 32;

      // CTA strip with logo
      guard(14); fillR(M, y, CW, 13, WRM); strokeR(M, y, CW, 13, BRDORG); vbar(M, y, y + 13, ORG);
      addLogo(M + 3, y + 1.5, 20, 8.5);
      if (!logoB64) { setF('bold', 9, ORG); doc.text('immidit', M + 4, y + 8); }
      setF('bold', 8, ORG); doc.text('Book now \u2192', M + 28, y + 8.5);
      setF('normal', 7.5, GRY); doc.text('WhatsApp / Call  +91 92179 22339  \u00b7  immidit.com  \u00b7  care@immidit.com  \u00b7  Sector 56 & nearby, Gurugram', M + 52, y + 8.5);
      y += 17;

      // ── TERMS & CONDITIONS ─────────────────────────────────────────────────────
      guard(55); hline(y, XGR, 0.3); y += 5;
      secTitle('TERMS & CONDITIONS');
      const tcData = [
        ['1. Validity', 'Valid for 30 days from date of issue unless otherwise specified by the treating doctor.'],
        ['2. Authenticity', 'Issued by an MCI-registered practitioner via immidit (Antarlaapika Pvt Ltd). Digitally generated and clinically valid.'],
        ['3. Medicines', 'Purchase only from a licensed pharmacy. Do not alter dosage without consulting the prescribing doctor.'],
        ['4. Lab Tests', 'Investigations are advisory. Conduct at an NABL-accredited laboratory. Patients may choose any certified lab.'],
        ['5. Follow-up', 'Recheck date is advisory. Seek immediate care if symptoms worsen before the scheduled visit.'],
        ['6. Referral', 'Referral is based on clinical assessment. Patients may freely seek a second opinion. immidit does not mandate any specific hospital.'],
        ['7. Privacy', 'Patient data is processed per Indian healthcare data privacy norms and not shared without explicit consent.'],
        ['8. Liability', 'immidit is a healthcare access platform. Clinical decisions rest solely with the prescribing registered medical practitioner.'],
        ['9. Emergency', 'This prescription does not substitute emergency care. Call 112 or visit nearest hospital in any emergency.'],
        ['10. Feedback', 'care@immidit.com  \u00b7  +91 92179 22339  \u00b7  immidit.com'],
      ];
      const tcw = (CW - 6) / 2; let lty = y, rty = y;
      tcData.forEach(([t, d], i) => {
        const col = i % 2, cx = M + (col * (tcw + 6)), rowY = col === 0 ? lty : rty;
        const fullL = doc.splitTextToSize(t + ': ' + d, tcw);
        fullL.forEach((ln, li) => { setF(li === 0 ? 'bold' : 'normal', 6, li === 0 ? [85, 85, 85] : GRY); doc.text(ln, cx, rowY + li * 3.8 + 3); });
        const bh = fullL.length * 3.8 + 4;
        if (col === 0) lty += bh; else rty += bh;
      }); y = Math.max(lty, rty) + 6;

      // ── FOOTER ─────────────────────────────────────────────────────────────────
      guard(20); hline(y, ORG, 0.55); y += 5;
      addLogo(M, y, 24, 10.2);
      if (!logoB64) { setF('bold', 8.5, DRK); doc.text('immidit', M, y + 7); }
      setF('bold', 8.5, DRK); doc.text('immidit  \u00b7  Antarlaapika Pvt Ltd', M + 27, y + 4);
      setF('normal', 7, LGR); doc.text('Sector 56 & nearby, Gurugram, Haryana', M + 27, y + 9);
      setF('normal', 7, LGR); doc.text('care@immidit.com  \u00b7  immidit.com  \u00b7  +91 92179 22339', M + 27, y + 14);
      setF('normal', 7, LGR); doc.text('Prescription ID: ', W - M - 55, y + 4);
      setF('bold', 7, DRK); doc.text(rx.id, W - M - 5, y + 4, { align: 'right' });
      setF('normal', 7, LGR); doc.text('Date: ' + fmtDate(rx.createdAt), W - M - 5, y + 9, { align: 'right' });
      setF('normal', 7, LGR); doc.text('immidit Digital Health Records', W - M - 5, y + 14, { align: 'right' });

      // ── DIGITAL APPENDIX (Optional New Page) ───────────────────────────────────
      const reportsList = (rx.orderLines || []).filter(l => l.reportUrl);
      if (reportsList.length > 0) {
        newPage();
        fillR(M, y, CW, 12, ORG, 0); 
        setF('bold', 8, WHT); doc.text('CLINICAL APPENDIX -- DIAGNOSTIC REPORTS', M + CW/2, y + 7.5, { align: 'center' });
        y += 18;

        reportsList.forEach((r, i) => {
          guard(40);
          fillR(M, y, CW, 30, i % 2 === 0 ? BG : WHT); 
          strokeR(M, y, CW, 30, XGR, 1.5, 0.2);
          vbar(M, y, y + 30, ORG, 1.5);
          
          const cleanDet = fitText(r.details, CW - 75, 10, 'bold', DRK);
          doc.text(cleanDet, M + 6, y + 9);
          setF('normal', 7.5, LGR); doc.text('FILE REFERENCE: ' + (r.reportUrl.split('id=')[1]?.substring(0,12) || 'REF-' + i), M + 6, y + 14);
          setF('normal', 7.5, GRY); doc.text('UPLOADED: ' + (r.reportUploadedAt ? fmtDate(r.reportUploadedAt) : '--'), M + 6, y + 19);
          
          setF('bold', 8.5, ORG);
          doc.text('OPEN ORIGINAL DOCUMENT', M + 6, y + 25);
          doc.link(M + 6, y + 21, 45, 6, { url: r.reportUrl });

          if (r.interpretation) {
            const intL = doc.splitTextToSize('DOCTOR\'S NOTE: ' + r.interpretation.replace(/[^\x00-\x7F]/g, ""), CW * 0.45);
            setF('oblique', 8, DRK);
            doc.text(intL, M + CW - 6, y + 9, { align: 'right' });
          }
          y += 35;
        });

        guard(50);
        fillR(M, y, CW, 30, WRM); strokeR(M, y, CW, 30, BRDORG);
        setF('bold', 9, ORG); doc.text('SECURE DIGITAL CASE FOLDER', M + CW/2, y + 10, { align: 'center' });
        setF('normal', 8, DRK);
        doc.text('This folder contains the complete case history, including all diagnostic imaging and lab results.', M + CW/2, y + 18, { align: 'center' });
        setF('bold', 14, DRK); doc.text('CASE ID: ' + rx.id, M + CW/2, y + 26, { align: 'center' });
      }

      // ── MERGE ATTACHMENTS (PDFs) ──────────────────────────────────────────────
      let finalPdfBytes = doc.output('arraybuffer');
      const reportsToMerge = (rx.orderLines || []).filter(l => l.reportUrl && l.reportUrl.includes('id='));
      
      if (reportsToMerge.length > 0 && window.PDFLib) {
        try {
          const { PDFDocument } = window.PDFLib;
          const mergedPdf = await PDFDocument.load(finalPdfBytes);
          
          for (const r of reportsToMerge) {
            try {
              toast(`Attaching ${r.details}...`);
              const res = await SYNC.post({ action: 'proxyFetch', url: r.reportUrl });
              if (res.content) {
                const fileBytes = Uint8Array.from(atob(res.content), c => c.charCodeAt(0));
                
                if (res.mimeType.includes('pdf')) {
                  const reportPdf = await PDFDocument.load(fileBytes);
                  const copiedPages = await mergedPdf.copyPages(reportPdf, reportPdf.getPageIndices());
                  copiedPages.forEach((page) => mergedPdf.addPage(page));
                } else if (res.mimeType.includes('image')) {
                  const page = mergedPdf.addPage();
                  const { width, height } = page.getSize();
                  const img = res.mimeType.includes('png') ? await mergedPdf.embedPng(fileBytes) : await mergedPdf.embedJpg(fileBytes);
                  const dims = img.scaleToFit(width - 40, height - 40);
                  page.drawImage(img, { x: 20, y: height - dims.height - 20, width: dims.width, height: dims.height });
                }
              }
            } catch (err) {
              console.error('Failed to attach report:', r.details, err);
              toast(`Could not attach ${r.details}`, 'error');
            }
          }
          finalPdfBytes = await mergedPdf.save();
        } catch (err) {
          console.error('PDF Merge failed:', err);
          toast('Merge failed, downloading main PDF only.', 'error');
        }
      }

      const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'immidit_' + rx.id + '_' + rx.patient.name.replace(/\s+/g, '_') + '.pdf';
      link.click();
      toast('Prescription ready with attachments!');
    }

    /* ══════════════════════════════════════════════════════
       AUTH
    ══════════════════════════════════════════════════════ */
    function logout() {
      if (_draftTimer) clearInterval(_draftTimer);
      saveDraft();  // save any in-progress work before logging out
      DB.del('session');
      APP.view = 'login'; APP.role = null; APP.currentDoctor = null;
      APP.loginError = ''; APP.loginRole = 'doctor';
      resetForm(); render();
    }

    /* ══════════════════════════════════════════════════════
       BOOT — restore session if available
    ══════════════════════════════════════════════════════ */
    async function boot() {
      try {
        const root = document.getElementById('app');
        if (SHEET_API) {
          root.innerHTML = `
            <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dim);background:var(--bg);">
              <img src="${LOGO_SRC}" style="width:60px;margin-bottom:20px;opacity:0.5;">
              <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;">Syncing with Cloud...</div>
            </div>
          `;
          // Attempt sync but don't block forever
          await Promise.race([
            SYNC.pull(),
            new Promise(resolve => setTimeout(resolve, 5000))
          ]);
        }
      } catch (e) {
        console.error('Boot sync failed:', e);
      } finally {
        try {
          restoreSession();
          render();
        } catch (e) {
          console.error('Final boot render failed:', e);
        }
      }
    }

    boot();
  </script>
</body>

</html>
