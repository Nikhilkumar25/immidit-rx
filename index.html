<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>immidit — Prescription System</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ══════════════════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════════════════ */
    :root {
      --orange: #F5621E;
      --orange-dim: rgba(245, 98, 30, 0.12);
      --orange-bdr: rgba(245, 98, 30, 0.25);
      --amber: #F5A623;
      --purple: #4A3F6B;
      --purple-lt: #6B5E9E;
      --bg: #0C0B14;
      --bg2: #121020;
      --surf: #181626;
      --surf2: #1F1C30;
      --surf3: #272439;
      --surf4: #2F2B44;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --text: #EEEBf8;
      --text-muted: #8B87AA;
      --text-dim: #504C6E;
      --success: #2ECC71;
      --danger: #E74C3C;
      --info: #3498DB;
      --warn: #F39C12;
      --grad: linear-gradient(135deg, #F5621E 0%, #F5A623 100%);
      --grad-soft: linear-gradient(135deg, rgba(245, 98, 30, 0.15) 0%, rgba(245, 166, 35, 0.08) 100%);
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 18px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 14px;
    }

    /* ══════════════════════════════════════════════════════
   TYPOGRAPHY
══════════════════════════════════════════════════════ */
    h1,
    h2,
    h3 {
      font-family: 'DM Serif Display', serif;
      line-height: 1.2;
    }

    code,
    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* ══════════════════════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surf4);
      border-radius: 2px;
    }

    /* ══════════════════════════════════════════════════════
   FORM ELEMENTS
══════════════════════════════════════════════════════ */
    input,
    select,
    textarea {
      width: 100%;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--orange-bdr);
      box-shadow: 0 0 0 3px rgba(245, 98, 30, 0.08);
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--text-dim);
    }

    select option {
      background: var(--surf2);
      color: var(--text);
    }

    textarea {
      resize: vertical;
      min-height: 72px;
      line-height: 1.55;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field-row {
      display: grid;
      gap: 12px;
    }

    .field-row.c2 {
      grid-template-columns: 1fr 1fr;
    }

    .field-row.c3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .field-row.c4 {
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }

    /* ══════════════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      white-space: nowrap;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--grad);
      color: #fff;
      box-shadow: 0 4px 16px rgba(245, 98, 30, 0.3);
    }

    .btn-primary:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--surf2);
      color: var(--text);
      border-color: var(--border2);
    }

    .btn-danger-soft {
      background: rgba(231, 76, 60, 0.12);
      color: var(--danger);
      border: 1px solid rgba(231, 76, 60, 0.2);
    }

    .btn-danger-soft:hover {
      background: rgba(231, 76, 60, 0.22);
    }

    .btn-success-soft {
      background: rgba(46, 204, 113, 0.1);
      color: var(--success);
      border: 1px solid rgba(46, 204, 113, 0.2);
    }

    .btn-success-soft:hover {
      background: rgba(46, 204, 113, 0.2);
    }

    .btn-info-soft {
      background: rgba(52, 152, 219, 0.1);
      color: var(--info);
      border: 1px solid rgba(52, 152, 219, 0.2);
    }

    .btn-info-soft:hover {
      background: rgba(52, 152, 219, 0.2);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-lg {
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
    }

    .btn-full {
      width: 100%;
      justify-content: center;
    }

    .btn-icon {
      padding: 8px;
      border-radius: 6px;
    }

    /* ══════════════════════════════════════════════════════
   CARDS
══════════════════════════════════════════════════════ */
    .card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 16px;
    }

    .card-sm {
      padding: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: var(--orange-dim);
      border: 1px solid var(--orange-bdr);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
    }

    .card-sub {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ══════════════════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════════════════ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: rgba(18, 16, 32, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo {
      height: 30px;
    }

    .topbar-tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--orange);
      opacity: 0.8;
      padding: 3px 8px;
      border: 1px solid var(--orange-bdr);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .topbar-nav {
      display: flex;
      gap: 4px;
    }

    .topbar-tab {
      padding: 6px 16px;
      border-radius: 7px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .topbar-tab:hover {
      color: var(--text);
      background: var(--surf2);
    }

    .topbar-tab.active {
      background: var(--surf3);
      color: var(--text);
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12.5px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .logout-btn {
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
    }

    .logout-btn:hover {
      color: var(--danger);
    }

    /* ══════════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════════ */
    .app-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 52px);
    }

    .sidebar {
      background: var(--surf);
      border-right: 1px solid var(--border);
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
    }

    .sidebar-section {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 12px 10px 5px;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.14s;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
    }

    .sidebar-btn:hover {
      background: var(--surf2);
      color: var(--text);
    }

    .sidebar-btn.active {
      background: var(--orange-dim);
      border-color: var(--orange-bdr);
      color: var(--orange);
    }

    .sidebar-ico {
      font-size: 15px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .sidebar-badge {
      margin-left: auto;
      background: var(--orange);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 14px 10px 0;
      border-top: 1px solid var(--border);
    }

    .sidebar-doctor-info {
      font-size: 11.5px;
    }

    .sidebar-doctor-name {
      font-weight: 600;
      font-size: 12.5px;
      color: var(--text);
    }

    .sidebar-doctor-reg {
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      margin-top: 2px;
    }

    .content {
      padding: 28px;
      overflow-y: auto;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 24px;
      line-height: 1.2;
    }

    .page-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ══════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════ */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(245, 98, 30, 0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(74, 63, 107, 0.12) 0%, transparent 50%),
        var(--bg);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-box {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 44px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--grad);
    }

    .login-logo-wrap {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-logo {
      height: 44px;
    }

    .login-tagline {
      font-size: 11.5px;
      color: var(--text-dim);
      letter-spacing: 0.4px;
      margin-top: 8px;
    }

    .login-heading {
      font-size: 18px;
      text-align: center;
      margin-bottom: 24px;
      color: var(--text);
    }

    .role-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 22px;
      background: var(--surf2);
      border-radius: 9px;
      padding: 5px;
    }

    .role-opt {
      padding: 9px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      font-family: 'DM Sans', sans-serif;
    }

    .role-opt.sel {
      background: var(--surf4);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
    }

    .error-msg {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.2);
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 12.5px;
      color: var(--danger);
      margin-bottom: 14px;
    }

    /* ══════════════════════════════════════════════════════
   PROFILE COMPLETION (first login)
══════════════════════════════════════════════════════ */
    .profile-screen {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 60%, rgba(245, 98, 30, 0.06) 0%, transparent 50%),
        var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .profile-card {
      width: 100%;
      max-width: 640px;
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .profile-banner {
      background: var(--grad);
      padding: 28px 32px;
      position: relative;
    }

    .profile-banner-logo {
      height: 30px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    .profile-banner h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #fff;
      margin-top: 14px;
    }

    .profile-banner p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 4px;
    }

    .profile-steps {
      display: flex;
      gap: 6px;
      padding: 16px 32px;
      background: var(--surf2);
      border-bottom: 1px solid var(--border);
    }

    .profile-step {
      flex: 1;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      padding: 6px;
      border-radius: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .profile-step.done {
      color: var(--success);
    }

    .profile-step.active {
      color: var(--orange);
      background: var(--orange-dim);
    }

    .profile-body {
      padding: 32px;
    }

    /* ══════════════════════════════════════════════════════
   SIGNATURE PAD
══════════════════════════════════════════════════════ */
    .sig-container {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .sig-container canvas {
      display: block;
      width: 100%;
      height: 90px;
      cursor: crosshair;
      touch-action: none;
    }

    .sig-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-top: 1px solid var(--border);
    }

    .sig-hint {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ══════════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════════ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--grad);
    }

    .stat-label {
      font-size: 10.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-family: 'DM Serif Display', serif;
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .stat-orange .stat-value {
      color: var(--orange);
    }

    .stat-green .stat-value {
      color: var(--success);
    }

    .stat-blue .stat-value {
      color: var(--info);
    }

    /* ══════════════════════════════════════════════════════
   TABLE
══════════════════════════════════════════════════════ */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--surf2);
      border-bottom: 1px solid var(--border);
    }

    .data-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .data-table tbody tr:hover {
      background: var(--surf2);
    }

    .data-table tbody td {
      padding: 12px 14px;
      vertical-align: middle;
    }

    .data-table tbody tr:last-child {
      border-bottom: none;
    }

    /* ══════════════════════════════════════════════════════
   PILLS & TAGS
══════════════════════════════════════════════════════ */
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .pill-green {
      background: rgba(46, 204, 113, 0.12);
      color: var(--success);
      border: 1px solid rgba(46, 204, 113, 0.2);
    }

    .pill-orange {
      background: var(--orange-dim);
      color: var(--orange);
      border: 1px solid var(--orange-bdr);
    }

    .pill-red {
      background: rgba(231, 76, 60, 0.12);
      color: var(--danger);
      border: 1px solid rgba(231, 76, 60, 0.2);
    }

    .pill-blue {
      background: rgba(52, 152, 219, 0.12);
      color: var(--info);
      border: 1px solid rgba(52, 152, 219, 0.2);
    }

    .pill-gray {
      background: var(--surf3);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--surf3);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-muted);
      margin: 3px;
    }

    .tag-del {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }

    .tag-del:hover {
      color: var(--danger);
    }

    /* ══════════════════════════════════════════════════════
   MEDICINE ROWS
══════════════════════════════════════════════════════ */
    .med-row {
      display: grid;
      grid-template-columns: 2.5fr 1fr 0.7fr 1fr auto;
      gap: 8px;
      align-items: end;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 8px;
    }

    .med-row-header {
      display: grid;
      grid-template-columns: 2.5fr 1fr 0.7fr 1fr auto;
      gap: 8px;
      padding: 0 0 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .add-row-btn {

    /* ══════════════════════════════════════════════════════

══════════════════════════════════════════════════════ */
    .vital-grid {

    /* ══════════════════════════════════════════════════════

══════════════════════════════════════════════════════ */
    .rx-card {

    /* ══════════════════════════════════════════════════════
   SECTION DIVIDER IN FORMS
══════════════════════════════════════════════════════ */
    .form-section {
      display: flex;
      align-items: center;
      gap: 10px;

    .form-section span {

══════════════════════════════════════════════════════ */

    /* ══════════════════════════════════════════════════════

══════════════════════════════════════════════════════ */
    .overlay {
      position: fixed;

      z-index: 300;

    .modal {

    .modal-hdr {

    .modal-close {

    /* ══════════════════════════════════════════════════════
   DOCTOR CARD (admin view)
══════════════════════════════════════════════════════ */
    .doctor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .doctor-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      transition: border-color 0.2s;
    }

    .doctor-card:hover {
      border-color: var(--border2);
    }

    .doctor-card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .doctor-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;

      border: 1px solid var(--orange-bdr);

      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;

    .doctor-spec {

    }

    .doctor-reg {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--text-dim);
      margin-top: 3px;
    }

    .doctor-card-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ══════════════════════════════════════════════════════
   CREDENTIAL BOX
══════════════════════════════════════════════════════ */
    .cred-box {
      background: var(--surf2);
      border: 1px solid var(--orange-bdr);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 14px;
    }

    .cred-box-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .cred-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .cred-label {
      font-size: 11.5px;
      color: var(--text-muted);
    }

    .cred-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
    }

    .cred-warn {
      font-size: 11px;
      color: var(--warn);
      margin-top: 10px;
    }

    /* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      padding: 11px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      gap: 8px;
      animation: slideUp 0.3s ease;
      max-width: 320px;
    }

    .toast.show {
      display: flex;
    }

    .toast-success {
      background: rgba(46, 204, 113, 0.15);
      border: 1px solid rgba(46, 204, 113, 0.3);
      color: var(--success);
    }

    .toast-error {
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: var(--danger);
    }

    @keyframes slideUp {
      from {
        transform: translateY(14px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ══════════════════════════════════════════════════════
   PDF PREVIEW OVERLAY
══════════════════════════════════════════════════════ */
    .pdf-overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .pdf-modal-wrap {
      width: 100%;
      max-width: 700px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .pdf-modal-bar {
      background: var(--surf3);
      padding: 13px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .pdf-preview-content {
      background: #f5f4f0;
      max-height: 70vh;
      overflow-y: auto;
    }

    /* ══════════════════════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 44px;
      margin-bottom: 14px;
      opacity: 0.35;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* ══════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════ */
    .text-orange {
      color: var(--orange);
    }

    .text-muted {
      color: var(--text-muted);
    }

    .text-dim {
      color: var(--text-dim);
    }

    .text-success {
      color: var(--success);
    }

    .text-danger {
      color: var(--danger);
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .flex {
      display: flex;
    }

    .flex-center {
      display: flex;
      align-items: center;
    }

    .gap-8 {
      gap: 8px;
    }

    .gap-12 {
      gap: 12px;
    }

    .mt-4 {
      margin-top: 4px;
    }

    .mt-8 {
      margin-top: 8px;
    }

    .mt-16 {
      margin-top: 16px;
    }

    .hidden {
      display: none !important;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- APP ROOT -->
  <div id="app"></div>

  <script>
    'use strict';

    /* ══════════════════════════════════════════════════════
       IMMIDIT LOGO (base64 placeholder — loads from file path)
    ══════════════════════════════════════════════════════ */
    const LOGO_SRC = 'https://i.ibb.co/chL7QPcJ/Chat-GPT-Image-Feb-17-2026-12-20-37-AM-Photoroom.png';
    const SHEET_API = 'https://script.google.com/macros/s/AKfycbwYrRfGbdwUKFPaOQ-PRKn70Gc-rmtz6PsktdBCFgfMvsxMk2gpMRMtjnPkG4ssItorFA/exec'; // ← PASTE YOUR GOOGLE APPS SCRIPT URL HERE

    /* ══════════════════════════════════════════════════════
       DATABASE (localStorage)
    ══════════════════════════════════════════════════════ */
    const DB = {
      get: (k, def = null) => { try { const v = localStorage.getItem('immidit_' + k); return v ? JSON.parse(v) : def; } catch { return def; } },
      set: (k, v) => { try { localStorage.setItem('immidit_' + k, JSON.stringify(v)); } catch (e) { console.error(e); } },
      del: (k) => { try { localStorage.removeItem('immidit_' + k); } catch (e) { console.error(e); } },
    };

    // Seed admin account
    if (!DB.get('admin')) {
      DB.set('admin', { username: 'admin', password: 'immidit@2026' });
    }

    // Doctors: array of { id, username, password, profileComplete, profile: {...}, active, createdAt }
    if (!DB.get('doctors')) {
      // Seed one demo doctor
      DB.set('doctors', [{
        id: 'DOC001',
        username: 'dr.priya',
        password: 'Priya@123',
        profileComplete: true,
        active: true,
        createdAt: new Date().toISOString(),
        profile: {
          name: 'Dr. Priya Sharma',
          regId: 'MCI-DL-45231',
          specialty: 'General Physician & Internal Medicine',
          qualification: 'MBBS, MD (Internal Medicine)',
          experience: '11',
          phone: '+91 98765 43210',
          bio: 'Experienced physician specialising in internal medicine and infectious diseases.',
          signature: null,
          avatarInitials: 'PS',
        }
      }]);
    }

    // Prescriptions
    if (!DB.get('prescriptions')) {
      DB.set('prescriptions', []);
    }

    /* ══════════════════════════════════════════════════════
       CLOUD SYNC (Google Sheets)
    ══════════════════════════════════════════════════════ */
    const SYNC = {
      active: false,
      async post(data) {
        if (!SHEET_API) return { error: 'No API configured' };
        this.active = true;
        try {
          const resp = await fetch(SHEET_API, {
            method: 'POST',
            mode: 'no-cors', // Apps Script requires no-cors for simple posts or it might fail on preflight
            body: JSON.stringify(data)
          });
          // with no-cors we can't see the response, but the data reaches Google
          return { ok: true };
        } catch (e) {
          console.error('Sync error:', e);
          return { error: e };
        } finally {
          this.active = false;
        }
      },
      // Real Apps Script fetch for data pulling
      async pull() {
        if (!SHEET_API) return;
        try {
          const resp = await fetch(SHEET_API + '?action=pull');
          const data = await resp.json();
          if (data.error) throw data.error;

          // Update local storage with cloud data
          if (data.admin) DB.set('admin', data.admin);
          if (data.doctors) DB.set('doctors', data.doctors);
          if (data.prescriptions) DB.set('prescriptions', data.prescriptions);

          console.log('Cloud sync successful:', data.synced);
          return true;
        } catch (e) {
          console.warn('Pull failed, using local cache:', e);
          return false;
        }
      },
      pushDoctors() { this.post({ action: 'saveDoctors', data: getDoctors() }); },
      pushRx(rx, isUpdate = false) { this.post({ action: isUpdate ? 'updatePrescription' : 'addPrescription', data: rx }); },
      pushDraft(docId, data) { this.post({ action: 'saveDraft', doctorId: docId, data: data }); },
      delDraft(docId) { this.post({ action: 'deleteDraft', doctorId: docId }); }
    };

    /* ══════════════════════════════════════════════════════
       APP STATE
    ══════════════════════════════════════════════════════ */
    const APP = {
      view: 'login',        // login | profile_complete | doctor | admin
      role: null,           // 'doctor' | 'admin'
      currentDoctor: null,  // doctor object
      section: 'new',       // sidebar section
      expandedRx: null,
      previewRx: null,
      showModal: null,       // 'add_doctor' | 'view_creds' | 'reset_pass'
      modalData: null,
      loginRole: 'doctor',
      loginError: '',
      profileStep: 1,       // 1 = basic, 2 = credentials, 3 = signature

      // form state
      formMeds: [{ name: '', dosage: '', days: '', timing: 'After food' }],
      formLabTests: [],
      formDiagTests: [],
      formReferrals: [],
      editingRxId: null,
    };

    /* ══════════════════════════════════════════════════════
       SESSION PERSISTENCE — survive page refresh
    ══════════════════════════════════════════════════════ */
    function saveSession() {
      if (APP.role === 'doctor' && APP.currentDoctor) {
        DB.set('session', { role: 'doctor', doctorId: APP.currentDoctor.id });
      } else if (APP.role === 'admin') {
        DB.set('session', { role: 'admin' });
      } else {
        DB.del('session');
      }
    }

    function restoreSession() {
      const sess = DB.get('session');
      if (!sess) return false;
      if (sess.role === 'admin') {
        APP.view = 'admin'; APP.role = 'admin'; APP.section = 'dashboard';
        return true;
      }
      if (sess.role === 'doctor' && sess.doctorId) {
        const docs = getDoctors();
        const doc = docs.find(d => d.id === sess.doctorId && d.active);
        if (doc && doc.profileComplete) {
          APP.currentDoctor = doc; APP.view = 'doctor'; APP.role = 'doctor'; APP.section = 'new';
          restoreDraft();  // restore any in-progress prescription
          return true;
        }
      }
      DB.del('session');
      return false;
    }

    /* ══════════════════════════════════════════════════════
       DRAFT AUTO-SAVE — never lose a prescription in progress
    ══════════════════════════════════════════════════════ */
    let _draftTimer = null;

    function saveDraft() {
      if (APP.view !== 'doctor' || APP.section !== 'new') return;
      // Gather current form values if DOM is available
      const draft = {
        patient: {
          name: document.getElementById('p-name')?.value || '',
          phone: document.getElementById('p-phone')?.value || '',
          age: document.getElementById('p-age')?.value || '',
          gender: document.getElementById('p-gender')?.value || '',
          address: document.getElementById('p-addr')?.value || '',
        },
        visitDate: document.getElementById('p-date')?.value || '',
        vitals: {
          bp: document.getElementById('v-bp')?.value || '',
          pulse: document.getElementById('v-pulse')?.value || '',
          temp: document.getElementById('v-temp')?.value || '',
          spo2: document.getElementById('v-spo2')?.value || '',
          weight: document.getElementById('v-weight')?.value || '',
          rr: document.getElementById('v-rr')?.value || '',
        },
        chiefConcerns: document.getElementById('cc')?.value || '',
        observations: document.getElementById('obs')?.value || '',
        diagnosis: document.getElementById('diag')?.value || '',
        suggestions: document.getElementById('sug')?.value || '',
        recheckDate: document.getElementById('recheck')?.value || '',
        recheckNote: document.getElementById('recheck-note')?.value || '',
        formMeds: APP.formMeds,
        formLabTests: APP.formLabTests,
        formDiagTests: APP.formDiagTests,
        formReferrals: APP.formReferrals,
        editingRxId: APP.editingRxId,
        savedAt: new Date().toISOString(),
      };
      // Only save if there's actual content
      const hasContent = draft.patient.name || draft.chiefConcerns || draft.diagnosis ||
        draft.formMeds.some(m => m.name);
      if (hasContent) {
        DB.set('draft_rx', draft);
        if (APP.currentDoctor) SYNC.pushDraft(APP.currentDoctor.id, draft);
      }
    }

    function restoreDraft() {
      const draft = DB.get('draft_rx');
      if (!draft) return;
      // Only restore if draft is less than 24 hours old
      if (draft.savedAt) {
        const age = Date.now() - new Date(draft.savedAt).getTime();
        if (age > 24 * 60 * 60 * 1000) { DB.del('draft_rx'); return; }
      }
      APP.formMeds = draft.formMeds || [{ name: '', dosage: '', days: '', timing: 'After food' }];
      APP.formLabTests = draft.formLabTests || [];
      APP.formDiagTests = draft.formDiagTests || [];
      APP.formReferrals = draft.formReferrals || [];
      APP.editingRxId = draft.editingRxId || null;
      // Store draft data for form population after render
      APP._pendingDraft = draft;
    }

    function applyDraftToForm() {
      const draft = APP._pendingDraft;
      if (!draft) return;
      const setVal = (id, val) => { const el = document.getElementById(id); if (el && val) el.value = val; };
      setVal('p-name', draft.patient?.name);
      setVal('p-phone', draft.patient?.phone);
      setVal('p-age', draft.patient?.age);
      setVal('p-gender', draft.patient?.gender);
      setVal('p-addr', draft.patient?.address);
      setVal('p-date', draft.visitDate);
      setVal('v-bp', draft.vitals?.bp);
      setVal('v-pulse', draft.vitals?.pulse);
      setVal('v-temp', draft.vitals?.temp);
      setVal('v-spo2', draft.vitals?.spo2);
      setVal('v-weight', draft.vitals?.weight);
      setVal('v-rr', draft.vitals?.rr);
      setVal('cc', draft.chiefConcerns);
      setVal('obs', draft.observations);
      setVal('diag', draft.diagnosis);
      setVal('sug', draft.suggestions);
      setVal('recheck', draft.recheckDate);
      setVal('recheck-note', draft.recheckNote);
      APP._pendingDraft = null;
      toast('Draft restored from your last session');
    }

    function clearDraft() {
      DB.del('draft_rx');
      if (APP.currentDoctor) SYNC.delDraft(APP.currentDoctor.id);
      APP._pendingDraft = null;
    }

    function startDraftAutoSave() {
      if (_draftTimer) clearInterval(_draftTimer);
      _draftTimer = setInterval(saveDraft, 5000); // save every 5 seconds
    }

    /* ══════════════════════════════════════════════════════
       AUTOCOMPLETE — remember patients and medicines
    ══════════════════════════════════════════════════════ */
    function getAutocompleteData() {
      const rxs = getRxs();
      const names = new Set(), phones = new Set(), meds = new Set();
      rxs.forEach(rx => {
        if (rx.patient?.name) names.add(rx.patient.name);
        if (rx.patient?.phone) phones.add(rx.patient.phone);
        (rx.medicines || []).forEach(m => { if (m.name) meds.add(m.name); });

    const saveRxs = r => { DB.set('prescriptions', r); }; // normally we push individual Rxs

      const rxs = getRxs();
      rxs.unshift(rx);
      DB.set('prescriptions', rxs);
      SYNC.pushRx(rx, false);
    };
    const updatePrescription = rx => {
      const rxs = getRxs();
      const idx = rxs.findIndex(r => r.id === rx.id);
      if (idx !== -1) {

        DB.set('prescriptions', rxs);
        SYNC.pushRx(rx, true);

        if (!user || !pass) { APP.loginError = 'Please enter both fields.'; render(); return; }

        if (APP.loginRole === 'admin') {

            saveSession(); render();
          } else { APP.loginError = 'Invalid admin credentials.'; render(); }
        } else {
          const doctors = getDoctors();
          const doc = doctors.find(d => d.username === user && d.password === pass && d.active);
          if (!doc) { APP.loginError = 'Invalid credentials or account inactive.'; render(); return; }
          APP.currentDoctor = doc;
          APP.loginError = '';
          if (!doc.profileComplete) { APP.view = 'profile_complete'; APP.profileStep = 1; render(); }
          else { APP.view = 'doctor'; APP.role = 'doctor'; APP.section = 'new'; saveSession(); render(); }

    function bindProfileComplete() {
      if (APP.profileStep === 1) {
        document.getElementById('pf-next1')?.addEventListener('click', () => {
          const name = document.getElementById('pf-name').value.trim();
          const reg = document.getElementById('pf-reg').value.trim();

          const doctors = getDoctors();
          const idx = doctors.findIndex(d => d.id === APP.currentDoctor.id);
          doctors[idx].profile = {
            name, regId: reg,
            specialty: document.getElementById('pf-spec').value,
            experience: document.getElementById('pf-exp').value,
            qualification: document.getElementById('pf-qual').value,
            phone: document.getElementById('pf-phone').value,
            bio: document.getElementById('pf-bio').value,
            signature: null,
            avatarInitials: name.split(' ').filter(w => w.length > 0).slice(0, 2).map(w => w[0].toUpperCase()).join(''),
          };
          saveDoctors(doctors);
          APP.currentDoctor = doctors[idx];
          APP.profileStep = 2;
          render();
        });
      }

      if (APP.profileStep === 2) {
        const canvas = document.getElementById('sig-canvas');
        if (canvas) {
          sigCanvas = canvas;
          sigCtx = canvas.getContext('2d');
          sigCtx.strokeStyle = '#F5621E';
          sigCtx.lineWidth = 2.2;
          sigCtx.lineCap = 'round';
          sigCtx.lineJoin = 'round';
          const pt = e => ({ x: e.offsetX, y: e.offsetY });
          const tpt = e => { const r = canvas.getBoundingClientRect(), sx = canvas.width / r.width, sy = canvas.height / r.height; return { x: (e.touches[0].clientX - r.left) * sx, y: (e.touches[0].clientY - r.top) * sy }; };
          canvas.onmousedown = e => { sigDrawing = true; sigCtx.beginPath(); sigCtx.moveTo(pt(e).x, pt(e).y); };
          canvas.onmousemove = e => { if (!sigDrawing) return; sigCtx.lineTo(pt(e).x, pt(e).y); sigCtx.stroke(); };
          canvas.onmouseup = () => sigDrawing = false;
          canvas.onmouseleave = () => sigDrawing = false;
          canvas.ontouchstart = e => { e.preventDefault(); sigDrawing = true; const p = tpt(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); };
          canvas.ontouchmove = e => { e.preventDefault(); if (!sigDrawing) return; const p = tpt(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); };
          canvas.ontouchend = () => sigDrawing = false;
        }

        document.getElementById('pf-back2')?.addEventListener('click', () => { APP.profileStep = 1; render(); });
        document.getElementById('pf-finish')?.addEventListener('click', () => {
          const sig = sigCanvas ? sigCanvas.toDataURL() : null;

          APP.view = 'doctor'; APP.role = 'doctor'; APP.section = 'new'; saveSession();
          toast('Profile complete! Welcome to immidit Rx.');
          render();
        });
      }
    }

    function renderMedRow(m, i) {
      return `
  <div class="med-row" id="med-row-${i}">
    <div class="field" style="margin:0"><input placeholder="Tab. Paracetamol 650 mg" id="med-name-${i}" value="${m.name}" oninput="updateMed(${i},'name',this.value)" list="ac-med-names" autocomplete="off"></div>
    <div class="field" style="margin:0"><input placeholder="1-0-1 or 1-0-1-1" id="med-dose-${i}" value="${m.dosage}" oninput="updateMed(${i},'dosage',this.value)"></div>

      <select id="med-tim-${i}" onchange="updateMed(${i},'timing',this.value)">

    function renderAdminRxs(rxs) {
      return `
  <div class="page-header">
    <div><h1 class="page-title">All Prescriptions</h1><div class="page-sub">${rxs.length} total records</div></div>
  </div>
  ${rxs.length === 0 ? `<div class="empty-state"><div class="icon">📋</div><p>No prescriptions yet.</p></div>` :

    /* ══════════════════════════════════════════════════════
       ADMIN ACTIONS
    ══════════════════════════════════════════════════════ */
    function mountModal() {
      const existing = document.getElementById('app-modal');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.className = 'overlay'; overlay.id = 'app-modal';

      if (APP.showModal === 'add_doctor') {
        overlay.innerHTML = `
    <div class="modal">
      <div class="modal-hdr">
        <h3>Add New Doctor</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:18px;">Create login credentials for the doctor. They will complete their profile on first login.</p>
        <div class="field-row c2">
          <div class="field"><label>Username</label><input id="m-user" placeholder="dr.name (unique)" autocomplete="off"></div>
          <div class="field"><label>Temporary Password</label><input id="m-pass" placeholder="Min 6 characters" type="text"></div>
        </div>
        <div class="field"><label>Display Name (optional)</label><input id="m-name" placeholder="Dr. Full Name"></div>
        <div class="field"><label>Medical Reg. ID (optional)</label><input id="m-reg" placeholder="MCI-XXXXX"></div>
        <div id="m-error" style="display:none;" class="error-msg"></div>
        <div id="m-success" style="display:none;" class="cred-box">
          <div class="cred-box-title">🎉 Doctor Account Created</div>
          <div class="cred-row"><span class="cred-label">Username</span><span class="cred-value" id="cred-u"></span></div>
          <div class="cred-row"><span class="cred-label">Password</span><span class="cred-value" id="cred-p"></span></div>
          <div class="cred-warn">⚠ Share these credentials securely. Doctor must change password after first login.</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Close</button>
        <button class="btn btn-primary" id="m-submit">Create Account</button>
      </div>
    </div>`;
        document.body.appendChild(overlay);
        document.getElementById('m-submit').addEventListener('click', createDoctor);

      } else if (APP.showModal === 'view_creds') {
        const d = APP.modalData;
        overlay.innerHTML = `
    <div class="modal">
      <div class="modal-hdr"><h3>Login Credentials</h3><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="cred-box">
          <div class="cred-box-title">Doctor Access Credentials</div>
          <div class="cred-row"><span class="cred-label">Doctor</span><span class="cred-value">${d.profile?.name || d.username}</span></div>
          <div class="cred-row"><span class="cred-label">Username</span><span class="cred-value">${d.username}</span></div>
          <div class="cred-row"><span class="cred-label">Password</span><span class="cred-value">${d.password}</span></div>
          <div class="cred-row"><span class="cred-label">Doctor ID</span><span class="cred-value">${d.id}</span></div>
          <div class="cred-warn">Share credentials securely. Never share via unencrypted email.</div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">Done</button></div>
    </div>`;
        document.body.appendChild(overlay);

      } else if (APP.showModal === 'reset_pass') {
        overlay.innerHTML = `
    <div class="modal">
      <div class="modal-hdr"><h3>Reset Password</h3><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Set a new temporary password for <b>${APP.modalData.profile?.name || APP.modalData.username}</b>.</p>
        <div class="field"><label>New Password</label><input id="new-pass" placeholder="Min 6 characters" type="text"></div>
        <div id="rp-error" style="display:none;" class="error-msg"></div>
        <div id="rp-success" class="cred-box" style="display:none;">
          <div class="cred-box-title">✓ Password Reset</div>
          <div class="cred-row"><span class="cred-label">Username</span><span class="cred-value">${APP.modalData.username}</span></div>
          <div class="cred-row"><span class="cred-label">New Password</span><span class="cred-value" id="rp-new-val"></span></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Close</button>
        <button class="btn btn-primary" id="rp-submit">Reset Password</button>
      </div>
    </div>`;
        document.body.appendChild(overlay);
        document.getElementById('rp-submit').addEventListener('click', doResetPass);
      }
    }

    function createDoctor() {
      const username = document.getElementById('m-user').value.trim().toLowerCase();
      const password = document.getElementById('m-pass').value.trim();
      const name = document.getElementById('m-name').value.trim();
      const reg = document.getElementById('m-reg').value.trim();
      const errEl = document.getElementById('m-error');

      if (!username || !password) { errEl.textContent = 'Username and password are required.'; errEl.style.display = 'block'; return; }
      if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
      const docs = getDoctors();
      if (docs.find(d => d.username === username)) { errEl.textContent = 'Username already exists. Choose another.'; errEl.style.display = 'block'; return; }

      const id = genId('DOC');
      const newDoc = {
        id, username, password,
        profileComplete: false,
        active: true,
        createdAt: new Date().toISOString(),
        profile: {
          name: name || '',
          regId: reg || '',
          specialty: '',
          qualification: '',
          experience: '',
          phone: '',
          bio: '',
          signature: null,
          avatarInitials: name ? name.split(' ').filter(w => w).slice(0, 2).map(w => w[0].toUpperCase()).join('') : username.substring(0, 2).toUpperCase(),
        }
      };
      docs.push(newDoc);
      saveDoctors(docs);

      errEl.style.display = 'none';
      document.getElementById('m-submit').disabled = true;
      document.getElementById('m-submit').textContent = 'Created ✓';
      document.getElementById('cred-u').textContent = username;
      document.getElementById('cred-p').textContent = password;
      document.getElementById('m-success').style.display = 'block';
      toast('Doctor account created successfully!');
    }

    function showCreds(id) {
      const d = getDoctors().find(doc => doc.id === id);
      APP.showModal = 'view_creds'; APP.modalData = d; render();
    }

    function resetPassword(id) {
      const d = getDoctors().find(doc => doc.id === id);
      APP.showModal = 'reset_pass'; APP.modalData = d; render();
    }

    function doResetPass() {
      const newPass = document.getElementById('new-pass').value.trim();
      const errEl = document.getElementById('rp-error');
      if (!newPass || newPass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
      const docs = getDoctors();
      const idx = docs.findIndex(d => d.id === APP.modalData.id);
      docs[idx].password = newPass;
      saveDoctors(docs);
      errEl.style.display = 'none';
      document.getElementById('rp-new-val').textContent = newPass;
      document.getElementById('rp-success').style.display = 'block';
      document.getElementById('rp-submit').disabled = true;
      toast('Password reset successfully!');
    }

    function toggleDoctor(id) {
      const docs = getDoctors();
      const idx = docs.findIndex(d => d.id === id);
      docs[idx].active = !docs[idx].active;
      saveDoctors(docs);
      toast(docs[idx].active ? 'Doctor activated.' : 'Doctor deactivated.');
      render();
    }

    function closeModal() { APP.showModal = null; APP.modalData = null; const el = document.getElementById('app-modal'); if (el) el.remove(); render(); }

    /* ══════════════════════════════════════════════════════
       PRESCRIPTION FORM ACTIONS
    ══════════════════════════════════════════════════════ */
    function addMed() {
      APP.formMeds.push({ name: '', dosage: '', days: '', timing: 'After food' });
      const list = document.getElementById('med-list');
      if (list) { const d = document.createElement('div'); d.innerHTML = renderMedRow(APP.formMeds[APP.formMeds.length - 1], APP.formMeds.length - 1); list.appendChild(d.firstElementChild); }
    }
    function removeMed(i) { APP.formMeds.splice(i, 1); const el = document.getElementById('med-row-' + i); if (el) el.remove(); }
    function updateMed(i, field, val) { if (APP.formMeds[i]) APP.formMeds[i][field] = val; }

    function addTag(type) {
      const inp = document.getElementById(type === 'lab' ? 'new-lab' : 'new-diag');
      const val = inp?.value.trim(); if (!val) return;
      const arr = type === 'lab' ? APP.formLabTests : APP.formDiagTests;
      arr.push(val);
      const container = document.getElementById(type + '-tags');
      if (container) {
        const i = arr.length - 1;
        const icon = type === 'lab' ? '🧫' : '📡';
        const span = document.createElement('span'); span.className = 'tag'; span.id = type + '-tag-' + i;
        span.innerHTML = `${icon} ${val}<button class="tag-del" onclick="removeTag('${type}',${i})">×</button>`;
        container.appendChild(span);
      }
      inp.value = '';
    }

    function removeTag(type, i) {
      if (type === 'lab') APP.formLabTests.splice(i, 1);
      else APP.formDiagTests.splice(i, 1);
      const el = document.getElementById(type + '-tag-' + i); if (el) el.remove();
    }

    function addRef() {
      APP.formReferrals.push({ specialist: '', hospital: '', reason: '' });
      const list = document.getElementById('ref-list');
      if (list) {
        const i = APP.formReferrals.length - 1;
        const d = document.createElement('div');
        d.innerHTML = `<div class="med-row" style="grid-template-columns:1.5fr 1.5fr 2fr auto;" id="ref-row-${i}">
      <div class="field" style="margin:0"><input placeholder="Specialist" id="ref-spec-${i}" oninput="APP.formReferrals[${i}].specialist=this.value"></div>
      <div class="field" style="margin:0"><input placeholder="Hospital / Clinic" id="ref-hosp-${i}" oninput="APP.formReferrals[${i}].hospital=this.value"></div>
      <div class="field" style="margin:0"><input placeholder="Reason" id="ref-reason-${i}" oninput="APP.formReferrals[${i}].reason=this.value"></div>
      <button class="btn btn-danger-soft btn-icon" onclick="removeRef(${i})">✕</button>
    </div>`;
        list.appendChild(d.firstElementChild);
      }
    }
    function removeRef(i) { APP.formReferrals.splice(i, 1); const el = document.getElementById('ref-row-' + i); if (el) el.remove(); }

    function gatherForm() {
      // Flush any pending test inputs that weren't Add-ed via button
      ['new-lab', 'new-diag'].forEach(id => {
        const el = document.getElementById(id);
        if (el?.value.trim()) {
          addTag(id === 'new-lab' ? 'lab' : 'diag');
        }
      });

      const meds = [];
      document.querySelectorAll('[id^="med-name-"]').forEach((el, i) => {
        meds.push({ name: el.value, dosage: document.getElementById(`med-dose-${i}`)?.value || '', days: document.getElementById(`med-days-${i}`)?.value || '', timing: document.getElementById(`med-tim-${i}`)?.value || '' });
      });
      const refs = [];
      document.querySelectorAll('[id^="ref-spec-"]').forEach((el, i) => {
        refs.push({ specialist: el.value, hospital: document.getElementById(`ref-hosp-${i}`)?.value || '', reason: document.getElementById(`ref-reason-${i}`)?.value || '' });
      });
      return {
        patient: { name: document.getElementById('p-name')?.value || '', phone: document.getElementById('p-phone')?.value || '', age: document.getElementById('p-age')?.value || '', gender: document.getElementById('p-gender')?.value || '', address: document.getElementById('p-addr')?.value || '' },

    function savePrescription() {
      const data = gatherForm();
      if (!data.patient.name) { toast('Patient name is required.', 'error'); return; }
      const doc = APP.currentDoctor;

      if (APP.editingRxId) {
        const rx = getRx(APP.editingRxId);
        if (rx) {
          const updated = { ...rx, ...data, edited: true, editedAt: new Date().toISOString() };
          updatePrescription(updated);
          APP.previewRx = updated;
        }
      } else {
        const rx = {
          id: genId('RX'),
          doctorId: doc.id, doctorName: doc.profile.name, doctorReg: doc.profile.regId,
          doctorSpec: doc.profile.specialty, doctorQual: doc.profile.qualification,
          doctorSignature: doc.profile.signature,
          createdAt: new Date().toISOString(), edited: false,
          ...data
        };
        addPrescription(rx);
        APP.previewRx = rx;
      }

      resetForm();
      toast(APP.editingRxId ? 'Prescription updated!' : 'Prescription saved!');
      render();
    }

    function editRx(id) {
      const rx = getRxs().find(r => r.id === id);
      if (!rx) return;
      APP.editingRxId = id;
      APP.formMeds = rx.medicines?.slice() || [{ name: '', dosage: '', days: '', timing: 'After food' }];
      APP.formLabTests = rx.labTests?.slice() || [];
      APP.formDiagTests = rx.diagnosticTests?.slice() || [];
      APP.formReferrals = rx.referral?.slice() || [];
      APP.section = 'new';
      render();
    }

    function bindDoctorApp() {
      // Bind profile save
      document.getElementById('save-profile-btn')?.addEventListener('click', () => {
        const docs = getDoctors();
        const idx = docs.findIndex(d => d.id === APP.currentDoctor.id);
        const sig = sigCanvas ? sigCanvas.toDataURL() : docs[idx].profile.signature;
        docs[idx].profile = {
          ...docs[idx].profile,
          qualification: document.getElementById('up-qual')?.value || docs[idx].profile.qualification,
          experience: document.getElementById('up-exp')?.value || docs[idx].profile.experience,
          phone: document.getElementById('up-phone')?.value || docs[idx].profile.phone,
          bio: document.getElementById('up-bio')?.value || docs[idx].profile.bio,
          signature: sig,
        };
        saveDoctors(docs);
        APP.currentDoctor = docs[idx];
        toast('Profile saved successfully!');
      });

      // Bind signature pad if on profile
      if (APP.section === 'profile') {
        const canvas = document.getElementById('sig-canvas');
        if (canvas) {
          sigCanvas = canvas; sigCtx = canvas.getContext('2d');
          sigCtx.strokeStyle = '#F5621E'; sigCtx.lineWidth = 2.2; sigCtx.lineCap = 'round';
          // Restore existing sig
          const existingSig = APP.currentDoctor.profile.signature;
          if (existingSig) { const img = new Image(); img.onload = () => sigCtx.drawImage(img, 0, 0, canvas.width, canvas.height); img.src = existingSig; }
          const pt = e => ({ x: e.offsetX, y: e.offsetY });
          canvas.onmousedown = e => { sigDrawing = true; sigCtx.beginPath(); sigCtx.moveTo(pt(e).x, pt(e).y); };
          canvas.onmousemove = e => { if (!sigDrawing) return; sigCtx.lineTo(pt(e).x, pt(e).y); sigCtx.stroke(); };
          canvas.onmouseup = () => sigDrawing = false;
          canvas.onmouseleave = () => sigDrawing = false;
        }
      }

      // Apply draft if pending (after DOM is ready)
      if (APP.section === 'new' && APP._pendingDraft) {
        setTimeout(applyDraftToForm, 50);
      }

      // Start draft auto-save timer
      if (APP.section === 'new') {
        startDraftAutoSave();
      }
    }

      </div>
    `;
        await SYNC.pull();
      }

      restoreSession();
      render();
    }

    boot();
  </script>
