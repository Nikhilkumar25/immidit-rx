<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>immidit — Prescription System</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════════════════ */
    :root {
      --bg: hsl(30, 52%, 96%);
      --bg2: hsl(30, 30%, 93%);
      --surf: #ffffff;
      --surf2: hsl(30, 20%, 92%);
      --surf3: hsl(30, 20%, 90%);
      --surf4: hsl(30, 20%, 86%);
      --border: hsl(30, 20%, 88%);
      --border2: hsl(30, 20%, 84%);
      --text: hsl(20, 28%, 19%);
      --text-muted: hsl(20, 15%, 45%);
      --text-dim: hsl(20, 10%, 65%);
      --primary: hsl(200, 66%, 51%);
      --primary-glow: hsl(200, 60%, 60%);
      --orange: hsl(21, 80%, 54%);
      --orange-dim: hsla(21, 80%, 54%, 0.1);
      --orange-bdr: hsla(21, 80%, 54%, 0.25);
      --amber: #F5A623;
      --success: #10B981;
      --danger: #EF4444;
      --info: hsl(200, 66%, 51%);
      --warn: #F59E0B;
      --grad: linear-gradient(135deg, var(--primary) 0%, var(--primary-glow) 100%);
      --grad-accent: linear-gradient(135deg, var(--orange) 0%, #F5A623 100%);
      --grad-soft: linear-gradient(135deg, hsla(200, 66%, 51%, 0.08) 0%, hsla(200, 60%, 60%, 0.04) 100%);
      --shadow: 0 12px 32px rgba(20, 10, 0, 0.08);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 18px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 14px;
    }

    /* ══════════════════════════════════════════════════════
   TYPOGRAPHY
══════════════════════════════════════════════════════ */
    h1,
    h2,
    h3 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      line-height: 1.2;
    }

    code,
    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* ══════════════════════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surf4);
      border-radius: 2px;
    }

    /* ══════════════════════════════════════════════════════
   FORM ELEMENTS
══════════════════════════════════════════════════════ */
    input,
    select,
    textarea {
      width: 100%;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 13.5px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--orange-bdr);
      box-shadow: 0 0 0 3px rgba(245, 98, 30, 0.08);
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--text-dim);
    }

    select option {
      background: var(--surf2);
      color: var(--text);
    }

    textarea {
      resize: vertical;
      min-height: 72px;
      line-height: 1.55;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .field {
      margin-bottom: 14px;
    }

    .checklist-container {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 12.5px;
    }

    .checklist-item:last-child {
      margin-bottom: 0;
    }

    .checklist-type {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg2);
      color: var(--text-muted);
      margin-left: 8px;
    }

    .checklist-del {
      color: var(--danger);
      cursor: pointer;
      opacity: 0.6;
      padding: 4px;
    }

    .checklist-del:hover {
      opacity: 1;
    }

    .field-row {
      display: grid;
      gap: 12px;
    }

    .field-row.c2 {
      grid-template-columns: 1fr 1fr;
    }

    .field-row.c3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .field-row.c4 {
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }

    /* ══════════════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      white-space: nowrap;
      text-decoration: none;
    }

    .filter-tab.active {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary {
      background: var(--grad);
      color: #fff;
      box-shadow: 0 4px 16px hsla(200, 66%, 51%, 0.25);
    }

    .btn-accent {
      background: var(--grad-accent);
      color: #fff;
      box-shadow: 0 4px 16px hsla(21, 80%, 54%, 0.25);
    }

    .btn-primary:hover,
    .btn-accent:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-primary:active,
    .btn-accent:active {
      transform: translateY(0);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--surf2);
      color: var(--text);
      border-color: var(--border2);
    }

    .btn-danger-soft {
      background: rgba(231, 76, 60, 0.12);
      color: var(--danger);
      border: 1px solid rgba(231, 76, 60, 0.2);
    }

    .btn-danger-soft:hover {
      background: rgba(231, 76, 60, 0.22);
    }

    .btn-success-soft {
      background: rgba(46, 204, 113, 0.1);
      color: var(--success);
      border: 1px solid rgba(46, 204, 113, 0.2);
    }

    .btn-success-soft:hover {
      background: rgba(46, 204, 113, 0.2);
    }

    .btn-info-soft {
      background: rgba(52, 152, 219, 0.1);
      color: var(--info);
      border: 1px solid rgba(52, 152, 219, 0.2);
    }

    .btn-info-soft:hover {
      background: rgba(52, 152, 219, 0.2);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-lg {
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
    }

    .btn-full {
      width: 100%;
      justify-content: center;
    }

    .btn-icon {
      padding: 8px;
      border-radius: 6px;
    }

    /* ══════════════════════════════════════════════════════
   CARDS
══════════════════════════════════════════════════════ */
    .card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 16px;
    }

    .card-sm {
      padding: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: var(--orange-dim);
      border: 1px solid var(--orange-bdr);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
    }

    .card-sub {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ══════════════════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════════════════ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: hsla(30, 52%, 96%, 0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo {
      height: 30px;
    }

    .topbar-tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--orange);
      opacity: 0.8;
      padding: 3px 8px;
      border: 1px solid var(--orange-bdr);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .topbar-nav {
      display: flex;
      gap: 4px;
    }

    .topbar-tab {
      padding: 6px 16px;
      border-radius: 7px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
      font-family: 'Poppins', sans-serif;
    }

    .topbar-tab:hover {
      color: var(--text);
      background: var(--surf2);
    }

    .topbar-tab.active {
      background: var(--grad-soft);
      color: var(--primary);
      font-weight: 600;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12.5px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .logout-btn {
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
      background: none;
      border: none;
      font-family: 'Poppins', sans-serif;
    }

    .logout-btn:hover {
      color: var(--danger);
    }

    /* ══════════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════════ */
    .app-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 52px);
    }

    .sidebar {
      background: var(--surf);
      border-right: 1px solid var(--border);
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
    }

    .sidebar-section {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 12px 10px 5px;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.14s;
      text-align: left;
      font-family: 'Poppins', sans-serif;
    }

    .sidebar-btn:hover {
      background: var(--surf2);
      color: var(--text);
    }

    .sidebar-btn.active {
      background: var(--grad-soft);
      border-color: var(--border2);
      color: var(--primary);
    }

    .sidebar-ico {
      font-size: 15px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .sidebar-badge.blink {
      animation: blink-bg 1s infinite;
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
    }
    .urgent-glow {
      animation: glow-red 2s infinite;
      border-color: var(--danger) !important;
    }
    @keyframes glow-red {
      0%, 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
      50% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
    }
    @keyframes blink-bg {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }
    .sidebar-badge {
      margin-left: auto;
      background: var(--orange);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 14px 10px 0;
      border-top: 1px solid var(--border);
    }

    .sidebar-doctor-info {
      font-size: 11.5px;
    }

    .sidebar-doctor-name {
      font-weight: 600;
      font-size: 12.5px;
      color: var(--text);
    }

    .sidebar-doctor-reg {
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      margin-top: 2px;
    }

    .content {
      padding: 28px;
      overflow-y: auto;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 24px;
      line-height: 1.2;
    }

    .page-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ══════════════════════════════════════════════════════
   MOBILE RESPONSIVENESS
══════════════════════════════════════════════════════ */
    @media (max-width: 800px) {
      .app-layout {
        display: flex;
        flex-direction: column;
      }
      .sidebar {
        height: auto;
        flex-direction: row;
        overflow-x: auto;
        padding: 10px;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-btn {
        width: auto;
        white-space: nowrap;
      }
      .sidebar-section, .sidebar-footer {
        display: none;
      }
      .field-row.c2, .field-row.c3, .field-row.c4 {
        grid-template-columns: 1fr !important;
      }
      .content {
        padding: 16px;
      }
      .topbar {
        padding: 10px 16px;
      }
      .topbar-nav {
        display: none !important;
      }
      .stats-grid {
        grid-template-columns: 1fr;
      }
      .page-header {
        flex-direction: column;
      }
      .rx-builder {
        grid-template-columns: 1fr !important;
      }
      .rx-preview-pane {
        position: static !important;
        height: auto !important;
        margin-top: 24px;
        transform-origin: top left;
        transform: scale(min(1, calc((100vw - 32px) / 794)));
        margin-bottom: calc(-100% * (1 - min(1, calc((100vw - 32px) / 794))));
      }
      .field-span-2 { grid-column: span 1 !important; }
      
      .vital-grid, .rx-detail-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      .med-row {
        grid-template-columns: 1fr 1fr !important;
        position: relative;
        padding-top: 36px;
      }
      .med-row > .field:first-child {
        grid-column: span 2;
      }
      .med-row-header {
        display: none !important;
      }
      .med-row .btn-danger-soft {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 24px;
        height: 24px;
        padding: 0;
      }

    /* ══════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════ */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 15% 50%, hsla(200, 66%, 51%, 0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, hsla(21, 80%, 54%, 0.06) 0%, transparent 50%),
        var(--bg);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-box {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 44px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--grad);
    }

    .login-logo-wrap {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-logo {
      height: 44px;
    }

    .login-tagline {
      font-size: 11.5px;
      color: var(--text-dim);
      letter-spacing: 0.4px;
      margin-top: 8px;
    }

    .login-heading {
      font-size: 18px;
      text-align: center;
      margin-bottom: 24px;
      color: var(--text);
    }

    .role-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 22px;
      background: var(--surf2);
      border-radius: 9px;
      padding: 5px;
    }

    .role-opt {
      padding: 9px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      font-family: 'Poppins', sans-serif;
    }

    .role-opt.sel {
      background: var(--surf4);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
    }

    .error-msg {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.2);
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 12.5px;
      color: var(--danger);
      margin-bottom: 14px;
    }

    /* ══════════════════════════════════════════════════════
   PROFILE COMPLETION (first login)
══════════════════════════════════════════════════════ */
    .profile-screen {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 60%, rgba(245, 98, 30, 0.06) 0%, transparent 50%),
        var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .profile-card {
      width: 100%;
      max-width: 640px;
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .profile-banner {
      background: var(--grad);
      padding: 28px 32px;
      position: relative;
    }

    .profile-banner-logo {
      height: 30px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    .profile-banner h2 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: #fff;
      margin-top: 14px;
    }

    .profile-banner p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 4px;
    }

    .profile-steps {
      display: flex;
      gap: 6px;
      padding: 16px 32px;
      background: var(--surf2);
      border-bottom: 1px solid var(--border);
    }

    .profile-step {
      flex: 1;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      padding: 6px;
      border-radius: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .profile-step.done {
      color: var(--success);
    }

    .profile-step.active {
      color: var(--orange);
      background: var(--orange-dim);
    }

    .profile-body {
      padding: 32px;
    }

    /* ══════════════════════════════════════════════════════
   SIGNATURE PAD
══════════════════════════════════════════════════════ */
    .sig-container {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .sig-container canvas {
      display: block;
      width: 100%;
      height: 90px;
      cursor: crosshair;
      touch-action: none;
    }

    .sig-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-top: 1px solid var(--border);
    }

    .sig-hint {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ══════════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════════ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--grad);
    }

    .stat-label {
      font-size: 10.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .stat-orange .stat-value {
      color: var(--orange);
    }

    .stat-green .stat-value {
      color: var(--success);
    }

    .stat-blue .stat-value {
      color: var(--info);
    }

    /* ══════════════════════════════════════════════════════
   TABLE
══════════════════════════════════════════════════════ */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--surf2);
      border-bottom: 1px solid var(--border);
    }

    .data-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .data-table tbody tr:hover {
      background: var(--surf2);
    }

    .data-table tbody td {
      padding: 12px 14px;
      vertical-align: middle;
    }

    .data-table tbody tr:last-child {
      border-bottom: none;
    }

    /* ══════════════════════════════════════════════════════
   PILLS & TAGS
══════════════════════════════════════════════════════ */
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .pill-green {
      background: rgba(46, 204, 113, 0.12);
      color: var(--success);
      border: 1px solid rgba(46, 204, 113, 0.2);
    }

    .pill-orange {
      background: var(--orange-dim);
      color: var(--orange);
      border: 1px solid var(--orange-bdr);
    }

    .pill-red {
      background: rgba(231, 76, 60, 0.12);
      color: var(--danger);
      border: 1px solid rgba(231, 76, 60, 0.2);
    }

    .pill-blue {
      background: rgba(52, 152, 219, 0.12);
      color: var(--info);
      border: 1px solid rgba(52, 152, 219, 0.2);
    }

    .pill-gray {
      background: var(--surf3);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--surf3);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-muted);
      margin: 3px;
    }

    .tag-del {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }

    .tag-del:hover {
      color: var(--danger);
    }

    /* ══════════════════════════════════════════════════════
   MEDICINE ROWS
══════════════════════════════════════════════════════ */
    .med-row {
      display: grid;
      grid-template-columns: 2.5fr 1fr 0.7fr 1fr auto;
      gap: 8px;
      align-items: end;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 8px;
    }

    .med-row-header {
      display: grid;
      grid-template-columns: 2.5fr 1fr 0.7fr 1fr auto;
      gap: 8px;
      padding: 0 0 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .med-col-hdr {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .add-row-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 10px;
      border-radius: var(--radius-sm);
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all 0.15s;
      margin-top: 4px;
    }

    .add-row-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: var(--orange-dim);
    }

    /* ══════════════════════════════════════════════════════
   VITAL CHIPS
══════════════════════════════════════════════════════ */
    .vital-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .vital-chip {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 13px;
    }

    .vital-chip label {
      font-size: 9.5px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .vital-chip input {
      background: transparent;
      border: none;
      padding: 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      box-shadow: none;
    }

    .vital-chip input:focus {
      border: none;
      box-shadow: none;
    }

    .vital-unit {
      font-size: 10.5px;
      color: var(--text-dim);
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ══════════════════════════════════════════════════════
   RX CARDS (list view)
══════════════════════════════════════════════════════ */
    .rx-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .rx-card:hover {
      border-color: var(--border2);
    }

    .rx-card-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 18px;
      cursor: pointer;
    }

    .rx-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--orange);
      margin-bottom: 3px;
    }

    .rx-patient-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .rx-meta {
      font-size: 11.5px;
      color: var(--text-muted);
    }

    .rx-actions {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .rx-body {
      display: none;
      padding: 0 18px 16px;
      border-top: 1px solid var(--border);
    }

    .rx-body.open {
      display: block;
      padding-top: 14px;
    }

    .rx-detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .rx-detail-item label {
      font-size: 9.5px;
      color: var(--text-dim);
      margin-bottom: 3px;
    }

    .rx-detail-item p {
      font-size: 13px;
    }

    .chevron {
      transition: transform 0.2s;
      display: inline-block;
      color: var(--text-dim);
    }

    .chevron.open {
      transform: rotate(180deg);
    }

    /* ══════════════════════════════════════════════════════
   SECTION DIVIDER IN FORMS
══════════════════════════════════════════════════════ */
    .form-section {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 16px;
    }

    .form-section span {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .form-section::before,
    .form-section::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ══════════════════════════════════════════════════════
   ACTION BAR
══════════════════════════════════════════════════════ */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 18px 0;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    /* ══════════════════════════════════════════════════════
   MODAL / OVERLAY
══════════════════════════════════════════════════════ */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }

    .modal {
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--surf);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      position: relative;
    }

    .modal-hdr {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--surf);
      z-index: 10;
    }

    .modal-hdr h3 {
      font-size: 17px;
    }

    .modal-body {
      padding: 22px 24px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .modal-close:hover {
      background: var(--surf2);
      color: var(--danger);
    }

    .modal-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* ══════════════════════════════════════════════════════
   DOCTOR CARD (admin view)
══════════════════════════════════════════════════════ */
    .doctor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .doctor-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      transition: border-color 0.2s;
    }

    .doctor-card:hover {
      border-color: var(--border2);
    }

    .doctor-card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .doctor-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--orange-dim);
      border: 1px solid var(--orange-bdr);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .doctor-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .doctor-name {
      font-weight: 600;
      font-size: 14px;
    }

    .doctor-spec {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .doctor-reg {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--text-dim);
      margin-top: 3px;
    }

    .doctor-card-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ══════════════════════════════════════════════════════
   CREDENTIAL BOX
══════════════════════════════════════════════════════ */
    .cred-box {
      background: var(--surf2);
      border: 1px solid var(--orange-bdr);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 14px;
    }

    .cred-box-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .cred-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .cred-label {
      font-size: 11.5px;
      color: var(--text-muted);
    }

    .cred-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
    }

    .cred-warn {
      font-size: 11px;
      color: var(--warn);
      margin-top: 10px;
    }

    /* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      padding: 11px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      gap: 8px;
      animation: slideUp 0.3s ease;
      max-width: 320px;
    }

    .toast.show {
      display: flex;
    }

    .toast-success {
      background: rgba(46, 204, 113, 0.15);
      border: 1px solid rgba(46, 204, 113, 0.3);
      color: var(--success);
    }

    .toast-error {
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: var(--danger);
    }

    @keyframes slideUp {
      from {
        transform: translateY(14px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ══════════════════════════════════════════════════════
   PDF PREVIEW OVERLAY
══════════════════════════════════════════════════════ */
    .pdf-overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .pdf-modal-wrap {
      width: 100%;
      max-width: 700px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .pdf-modal-bar {
      background: var(--surf3);
      padding: 13px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .pdf-preview-content {
      background: #f5f4f0;
      max-height: 70vh;
      overflow-y: auto;
    }

    /* ══════════════════════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 44px;
      margin-bottom: 14px;
      opacity: 0.35;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* ══════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════ */
    .text-orange {
      color: var(--orange);
    }

    .text-muted {
      color: var(--text-muted);
    }

    .text-dim {
      color: var(--text-dim);
    }

    .text-success {
      color: var(--success);
    }

    .text-danger {
      color: var(--danger);
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .flex {
      display: flex;
    }

    .flex-center {
      display: flex;
      align-items: center;
    }

    .gap-8 {
      gap: 8px;
    }

    .gap-12 {
      gap: 12px;
    }

    .mt-4 {
      margin-top: 4px;
    }

    .mt-8 {
      margin-top: 8px;
    }

    .mt-16 {
      margin-top: 16px;
    }

    .hidden {
      display: none !important;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }

    /* ══════════════════════════════════════════════════════
   STATUS PILLS (extended)
══════════════════════════════════════════════════════ */
    .pill-amber {
      background: rgba(243, 156, 18, 0.12);
      color: var(--warn);
      border: 1px solid rgba(243, 156, 18, 0.25);
    }

    .pill-purple {
      background: rgba(142, 68, 173, 0.12);
      color: #A66BBF;
      border: 1px solid rgba(142, 68, 173, 0.25);
    }

    /* ══════════════════════════════════════════════════════
   PROCEDURE ROWS
══════════════════════════════════════════════════════ */
    .proc-row {
      display: grid;
      grid-template-columns: 1.2fr 2.5fr 0.6fr auto;
      gap: 8px;
      align-items: end;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 8px;
    }

    .proc-row-header {
      display: grid;
      grid-template-columns: 1.2fr 2.5fr 0.6fr auto;
      gap: 8px;
      padding: 0 0 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    /* ══════════════════════════════════════════════════════
   OPERATIONS DASHBOARD
══════════════════════════════════════════════════════ */
    .ops-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .ops-stat {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.18s;
    }

    .ops-stat:hover,
    .ops-stat.active {
      border-color: var(--orange-bdr);
      background: var(--orange-dim);
    }

    .ops-stat-val {
      font-size: 26px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-weight: 700;
    }

    .ops-stat-card.active {
      background: var(--grad-soft);
      border-color: var(--primary);
      color: var(--primary);
    }

    .ops-stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-top: 4px;
    }

    .ops-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .ops-card-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surf2);
    }

    .ops-card-body {
      padding: 14px 18px;
    }

    .order-line {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .order-line:last-child {
      border-bottom: none;
    }

  <script>
    const LAB_TUBE_MAPPING = {

      'Kidney Function Test (KFT)': { tube: 'Yellow Top (SST)', color: '#FFD700', instructions: 'Allow to clot for 30 mins' },
      'Thyroid Profile (T3/T4/TSH)': { tube: 'Yellow Top (SST)', color: '#FFD700', instructions: 'Allow to clot for 30 mins' },

      'Electrolytes (Na/K/Cl)': { tube: 'Yellow Top (SST)', color: '#FFD700', instructions: 'Allow to clot for 30 mins' },
      'Coagulation Profile (PT/INR)': { tube: 'Light Blue Top (Citrate)', color: '#ADD8E6', instructions: 'Must fill to exact mark' },
      'D-Dimer': { tube: 'Light Blue Top (Citrate)', color: '#ADD8E6', instructions: 'Invert 3-4 times gently' },
      'Vitamin B12 / D3': { tube: 'Yellow Top (SST)', color: '#FFD700', instructions: 'Protect from light if possible' },
      'Blood Culture': { tube: 'Culture Bottle', color: '#FFFFFF', instructions: 'Clean skin with chlorhexidine' },
    };
    const STANDARD_LAB_TESTS = Object.keys(LAB_TUBE_MAPPING);
    'use strict';

    // ── Global Error Handler for Diagnostics ──
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      const errDiv = document.createElement('div');
      errDiv.style = 'position:fixed;top:0;left:0;width:100%;background:#fee;color:#b00;padding:20px;z-index:9999;font-family:monospace;border-bottom:2px solid #b00;font-size:12px;';
      errDiv.innerHTML = `<strong>Runtime Error:</strong> ${msg}<br><small>at ${url}:${lineNo}:${columnNo}</small>`;
      document.body.appendChild(errDiv);
      return false;
    };

    /* ══════════════════════════════════════════════════════
       IMMIDIT LOGO (base64 placeholder — loads from file path)
    ══════════════════════════════════════════════════════ */
    const LOGO_SRC = 'logo.png';
    const SHEET_API = 'https://script.google.com/macros/s/AKfycbz0sC-J2AKXP9fLaWUQYLa5aQ-6E6kGTo1-bHCYKBx77PcFV2v7PTlujFeU0xtW4FJXSg/exec'; // Updated to user-provided URL

    /* ══════════════════════════════════════════════════════
       PROCEDURE TYPES & TEMPLATES
    ══════════════════════════════════════════════════════ */

    const PROCEDURE_TYPES = [
      { value: 'injection_im', label: '💉 Injection (IM)', icon: '💉' },
      { value: 'injection_iv', label: '💉 Injection (IV)', icon: '💉' },
      { value: 'injection_sc', label: '💉 Injection (SC)', icon: '💉' },
      { value: 'iv_drip', label: '🩸 IV Drip / Infusion', icon: '🩸' },
      { value: 'wound_dressing', label: '🩹 Wound Dressing', icon: '🩹' },
      { value: 'nebulization', label: '🌡️ Nebulization', icon: '🌡️' },
      { value: 'vaccination', label: '💉 Vaccination', icon: '💉' },
      { value: 'catheter_care', label: '🔌 Catheter Care', icon: '🔌' },

    ];

    const SERVICE_TEMPLATES = {
      'injection_im': [

      ],
      'injection_iv': [

      ],
      'iv_drip': [
        { name: 'IV Cannula (20G/22G)', type: 'consumable' },
        { name: 'IV Set / Tubing', type: 'consumable' },
        { name: 'NS/RL 500ml', type: 'medicine' },

      ],
      'wound_dressing': [
        { name: 'Sterile Dressing Kit', type: 'consumable' },
        { name: 'Normal Saline', type: 'medicine' },
        { name: 'Betadine Solution', type: 'medicine' },
        { name: 'Micropore Tape', type: 'consumable' },
        { name: 'Surgical Gloves', type: 'consumable' }
      ],
      'vital_monitoring': [
        { name: 'BP Monitor', type: 'device' },
        { name: 'Pulse Oximeter', type: 'device' },
        { name: 'Thermometer', type: 'device' },
        { name: 'Consent Forms', type: 'consumable' }
      ],
      'blood_draw': [
        { name: 'Vacutainer Tubes', type: 'consumable' },
        { name: 'Spirit Swab', type: 'consumable' },
        { name: 'Tourniquet', type: 'device' },
        { name: 'Multi-sample Needle', type: 'consumable' }
      ],
      'catheter_care': [
        { name: 'Foley Catheter', type: 'consumable' },
        { name: 'Urine Bag', type: 'consumable' },
        { name: 'Lignocaine Jelly', type: 'medicine' },
        { name: 'Sterile Water 10ml', type: 'medicine' },
        { name: 'Surgical Gloves', type: 'consumable' }
      ],
      'ecg': [
        { name: 'Portable ECG Machine', type: 'device' },
        { name: 'ECG Electrodes / Gel', type: 'consumable' },
        { name: 'Thermal Paper Roll', type: 'consumable' }
      ],
      'vaccination': [
        { name: 'Cold Box / Carrier', type: 'device' },
        { name: 'AD Syringe 0.5ml', type: 'consumable' },
        { name: 'Vaccine (As requested)', type: 'medicine' },
        { name: 'Spirit Swab', type: 'consumable' }
      ]
    };

    const ORDER_ICONS = {
      procedure: '💉', lab_test: '🧪', diagnostic_test: '📡', referral: '🔀'
    };

    const STATUS_CONFIG = {
      active: { label: 'Active', pill: 'pill-green', icon: '✅' },
      pending_actions: { label: 'Pending Actions', pill: 'pill-amber', icon: '⏳' },
      reports_ready: { label: 'Reports Ready', pill: 'pill-blue', icon: '📊' },
      executed: { label: 'Executed', pill: 'pill-green', icon: '✅' },
      case_complete: { label: 'Case Complete', pill: 'pill-purple', icon: '🟣' },
    };

    /* ══════════════════════════════════════════════════════
       DATABASE (localStorage)
    ══════════════════════════════════════════════════════ */
    const DB = {
      get: (k, def = null) => { try { const v = localStorage.getItem('immidit_' + k); return v ? JSON.parse(v) : def; } catch { return def; } },
      set: (k, v) => { try { localStorage.setItem('immidit_' + k, JSON.stringify(v)); } catch (e) { console.error(e); } },
      del: (k) => { try { localStorage.removeItem('immidit_' + k); } catch (e) { console.error(e); } },
    };

    // Seed admin account
    if (!DB.get('admin')) {
      DB.set('admin', { username: 'admin', password: 'immidit@2026' });
    }

    // Doctors: array of { id, username, password, profileComplete, profile: {...}, active, createdAt }
    if (!DB.get('doctors')) {
      DB.set('doctors', []);
    }

    // Prescriptions
    if (!DB.get('prescriptions')) {
      DB.set('prescriptions', []);
    }

    // Labs: array of { id, name, address, active }
    if (!DB.get('labs')) {
      DB.set('labs', []);
    }

    /* ══════════════════════════════════════════════════════
       CLOUD SYNC (Google Sheets)
    ══════════════════════════════════════════════════════ */
    const SYNC = {
      active: false,
      async post(data) {
        if (!SHEET_API) return { error: 'No API configured' };
        this.active = true;
        try {
          // Use 'no-cors' and 'text/plain' to bypass CORS preflight and 'file://' origin restrictions.
          // This ensures that updates reach Google Sheets even when running locally.
          await fetch(SHEET_API, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(data)
          });
          return { ok: true };
        } catch (e) {
          console.error('Sync error:', e);
          return { error: e };
        } finally {
          this.active = false;
        }
      },
      // Real Apps Script fetch for data pulling
      async pull() {
        if (!SHEET_API) return;
        try {
          const resp = await fetch(SHEET_API + '?action=pull');
          const data = await resp.json();
          if (data.error) throw data.error;

          // Update local storage with cloud data
          if (data.admin) DB.set('admin', data.admin);
          if (data.doctors) DB.set('doctors', data.doctors);
          if (data.prescriptions) DB.set('prescriptions', data.prescriptions);
          if (data.nurses) DB.set('nurses', data.nurses);
          if (data.labs) DB.set('labs', data.labs);

          // Atomic Merging for Cases: Newer data always wins
          if (data.cases) {
            const localCases = DB.get('cases', []);
            const cloudCases = data.cases;
            const merged = cloudCases.map(c => {
              const local = localCases.find(l => l.id === c.id);
              if (!local) return c;
              const localTime = new Date(local.updatedAt || 0).getTime();
              const cloudTime = new Date(c.updatedAt || 0).getTime();
              return cloudTime >= localTime ? c : local;
            });
            DB.set('cases', merged);
          }

          console.log('Cloud sync successful:', data.synced);
          return true;
        } catch (e) {
          console.warn('Pull failed, using local cache:', e);
          return false;
        }
      },
      pushDoctors() { this.post({ action: 'saveDoctors', data: getDoctors() }); },
      pushRx(rx, isUpdate = false) { this.post({ action: isUpdate ? 'updatePrescription' : 'addPrescription', data: rx }); },
      pushDraft(docId, data) { this.post({ action: 'saveDraft', doctorId: docId, data: data }); },
      delDraft(docId) { this.post({ action: 'deleteDraft', doctorId: docId }); },
      pushCases(cases) { 
        // Ensure updatedAt is set on all cases being pushed
        const now = new Date().toISOString();
        const updated = cases.map(c => ({ ...c, updatedAt: c.updatedAt || now }));
        this.post({ action: 'saveCases', data: updated }); 
      },
      pushNurses(nurses) { this.post({ action: 'saveNurses', data: nurses }); },
      pushLabs(labs) { this.post({ action: 'saveLabs', data: labs }); }
    };

    async function syncNow() {
      const btn = document.getElementById('sync-btn');
      if (btn) btn.innerHTML = '⌛ Syncing...';
      try {
        await Cloud.pull();
        showToast('Data synced successfully', 'success');
      } catch(e) {
        showToast('Sync failed: ' + e.toString(), 'error');
      } finally {
        if (btn) btn.innerHTML = '🔄 Sync';
        render();
      }
    }
    window.syncNow = syncNow;

    function getDoctors() { return DB.get('doctors', []); }
    function getRxs() { return DB.get('prescriptions', []); }
    function getRx(id) { return getRxs().find(r => r.id === id); }
    function getNurses() { return DB.get('nurses', []); }
    function getCases() { return DB.get('cases', []); }
    function getLabs() { return DB.get('labs', []); }
    function saveLabsLocal(labs) { DB.set('labs', labs); }


    /* ══════════════════════════════════════════════════════
       APP STATE
    ══════════════════════════════════════════════════════ */
    const APP = {
      view: 'login',        // login | profile_complete | doctor | admin
      role: null,           // 'doctor' | 'admin'
      currentDoctor: null,  // doctor object
      section: 'new',       // sidebar section
      expandedRx: null,
      previewRx: null,
      showModal: null,       // 'add_doctor' | 'view_creds' | 'reset_pass'
      modalData: null,
      loginRole: 'doctor',
      loginError: '',
      profileStep: 1,       // 1 = basic, 2 = credentials, 3 = signature

      // form state
      formMeds: [{ name: '', dosage: '', days: '', timing: 'After food' }],
      formLabTests: [],
      formDiagTests: [],
      formReferrals: [],
      formProcedures: [],
      formProcInstructions: '',
      editingRxId: null,

      // operations state (admin)
      opsFilter: 'all',       // all | pending | to_administer | reports_pending | complete
      opsSearch: '',

      // doctor review
      reviewingRxId: null,    // prescription being reviewed for reports
    };

    /* ══════════════════════════════════════════════════════
       SESSION PERSISTENCE — survive page refresh
    ══════════════════════════════════════════════════════ */
    function saveSession() {
      if (APP.role === 'doctor' && APP.currentDoctor) {
        DB.set('session', { role: 'doctor', doctorId: APP.currentDoctor.id });
      } else if (APP.role === 'admin') {
        DB.set('session', { role: 'admin' });
      } else {
        DB.del('session');
      }
    }

    function restoreSession() {
      const sess = DB.get('session');
      if (!sess) return false;
      if (sess.role === 'admin') {
        APP.view = 'admin'; APP.role = 'admin'; APP.section = 'dashboard';
        return true;
      }
      if (sess.role === 'doctor' && sess.doctorId) {
        const docs = getDoctors();
        const doc = docs.find(d => d.id === sess.doctorId && d.active);
        if (doc && doc.profileComplete) {
          APP.currentDoctor = doc; APP.view = 'doctor'; APP.role = 'doctor'; APP.section = 'new';
          initPeer(doc.id);
          restoreDraft();  // restore any in-progress prescription
          return true;
        }
      }
      DB.del('session');
      return false;
    }

    /* ══════════════════════════════════════════════════════
       DRAFT AUTO-SAVE — never lose a prescription in progress
    ══════════════════════════════════════════════════════ */
    let _draftTimer = null;

    function saveDraft() {
      if (APP.view !== 'doctor' || APP.section !== 'new') return;
      // Gather current form values if DOM is available
      const draft = {
        patient: {
          name: document.getElementById('p-name')?.value || '',
          phone: document.getElementById('p-phone')?.value || '',
          age: document.getElementById('p-age')?.value || '',
          gender: document.getElementById('p-gender')?.value || '',
          address: document.getElementById('p-addr')?.value || '',
          allergies: document.getElementById('p-allergies')?.value || '',
          comorbidities: document.getElementById('p-comorbidities')?.value || '',
        },
        visitDate: document.getElementById('p-date')?.value || '',
        vitals: {
          bp: document.getElementById('v-bp')?.value || '',
          pulse: document.getElementById('v-pulse')?.value || '',
          temp: document.getElementById('v-temp')?.value || '',
          spo2: document.getElementById('v-spo2')?.value || '',
          weight: document.getElementById('v-weight')?.value || '',
          rr: document.getElementById('v-rr')?.value || '',
        },
        chiefConcerns: document.getElementById('cc')?.value || '',
        diagnosis: document.getElementById('diag')?.value || '',
        suggestions: document.getElementById('sug')?.value || '',
        recheckDate: document.getElementById('recheck')?.value || '',
        recheckNote: document.getElementById('recheck-note')?.value || '',
        formMeds: APP.formMeds,
        formLabTests: APP.formLabTests,
        formDiagTests: APP.formDiagTests,
        formReferrals: APP.formReferrals,
        editingRxId: APP.editingRxId,
        savedAt: new Date().toISOString(),
      };
      // Only save if there's actual content
      const hasContent = draft.patient.name || draft.chiefConcerns || draft.diagnosis ||
        draft.formMeds.some(m => m.name);
      if (hasContent) {
        DB.set('draft_rx', draft);
        if (APP.currentDoctor) SYNC.pushDraft(APP.currentDoctor.id, draft);
      }
    }

    function restoreDraft() {
      const draft = DB.get('draft_rx');
      if (!draft) return;
      // Only restore if draft is less than 24 hours old
      if (draft.savedAt) {
        const age = Date.now() - new Date(draft.savedAt).getTime();
        if (age > 24 * 60 * 60 * 1000) { DB.del('draft_rx'); return; }
      }
      APP.formMeds = draft.formMeds || [{ name: '', dosage: '', days: '', timing: 'After food' }];
      APP.formLabTests = draft.formLabTests || [];
      APP.formDiagTests = draft.formDiagTests || [];
      APP.formReferrals = draft.formReferrals || [];
      APP.editingRxId = draft.editingRxId || null;
      // Store draft data for form population after render
      APP._pendingDraft = draft;
    }

    function applyDraftToForm() {
      const draft = APP._pendingDraft;
      if (!draft) return;
      const setVal = (id, val) => { const el = document.getElementById(id); if (el && val) el.value = val; };
      setVal('p-name', draft.patient?.name);
      setVal('p-phone', draft.patient?.phone);
      setVal('p-age', draft.patient?.age);
      setVal('p-gender', draft.patient?.gender);
      setVal('p-addr', draft.patient?.address);
      setVal('p-allergies', draft.patient?.allergies);
      setVal('p-comorbidities', draft.patient?.comorbidities);

    function getAutocompleteData() {
      const rxs = getRxs();
      const names = new Set(), phones = new Set(), meds = new Set();
      rxs.forEach(rx => {
        if (rx.patient?.name) names.add(rx.patient.name);
        if (rx.patient?.phone) phones.add(rx.patient.phone);
        (rx.medicines || []).forEach(m => { if (m.name) meds.add(m.name); });
      });
      return { names: [...names], phones: [...phones], meds: [...meds] };
    }

    function bindLogin() {

        if (!user || !pass) { APP.loginError = 'Please enter both fields.'; render(); return; }

          if (user === admin.username && pass === admin.password) {
            APP.view = 'admin'; APP.role = 'admin'; APP.loginError = ''; APP.section = 'dashboard';
            saveSession(); render();
          } else { APP.loginError = 'Invalid admin credentials.'; render(); }
        } else {
          const doctors = getDoctors();
          const doc = doctors.find(d => d.username === user && d.password === pass && d.active);
          if (!doc) { APP.loginError = 'Invalid credentials or account inactive.'; render(); return; }
          APP.currentDoctor = doc;

            initPeer(doc.id);
            saveSession(); 
            render(); 
          }

      document.getElementById('l-pass')?.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

        });
      }

      if (APP.profileStep === 2) {
        const canvas = document.getElementById('sig-canvas');
        if (canvas) {
          sigCanvas = canvas;
          sigCtx = canvas.getContext('2d');
          sigCtx.strokeStyle = '#F5621E';
          sigCtx.lineWidth = 2.2;
          sigCtx.lineCap = 'round';
          sigCtx.lineJoin = 'round';
          const pt = e => ({ x: e.offsetX, y: e.offsetY });
          const tpt = e => { const r = canvas.getBoundingClientRect(), sx = canvas.width / r.width, sy = canvas.height / r.height; return { x: (e.touches[0].clientX - r.left) * sx, y: (e.touches[0].clientY - r.top) * sy }; };
          canvas.onmousedown = e => { sigDrawing = true; sigCtx.beginPath(); sigCtx.moveTo(pt(e).x, pt(e).y); };
          canvas.onmousemove = e => { if (!sigDrawing) return; sigCtx.lineTo(pt(e).x, pt(e).y); sigCtx.stroke(); };
          canvas.onmouseup = () => sigDrawing = false;
          canvas.onmouseleave = () => sigDrawing = false;
          canvas.ontouchstart = e => { e.preventDefault(); sigDrawing = true; const p = tpt(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); };
          canvas.ontouchmove = e => { e.preventDefault(); if (!sigDrawing) return; const p = tpt(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); };
          canvas.ontouchend = () => sigDrawing = false;
        }

        document.getElementById('pf-back2')?.addEventListener('click', () => { APP.profileStep = 1; render(); });
        document.getElementById('pf-finish')?.addEventListener('click', () => {
          const sig = sigCanvas ? sigCanvas.toDataURL() : null;

          toast('Profile complete! Welcome to immidit Rx.');
          render();
        });
      }
    }
