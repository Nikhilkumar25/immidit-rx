      <div class="field"><label style="color: var(--danger)">Known Allergies</label><input id="p-allergies" placeholder="e.g. Penicillin, Peanuts" value="${rx?.patient?.allergies || ''}" class="input-danger" style="border-color: var(--danger); background: hsla(0, 84%, 60%, 0.05);"></div>
      <div class="field field-span-2" style="grid-column: span 2;"><label>Comorbidities</label><input id="p-comorbidities" placeholder="e.g. Type 2 Diabetes, Hypertension" value="${rx?.patient?.comorbidities || ''}"></div>
    </div>
  </div>

  <!-- VITALS -->
  <div class="card">
    <div class="card-header"><div class="card-icon">💓</div><div><div class="card-title">Vitals at Visit</div><div class="card-sub">Measured at time of consultation</div></div></div>
    <div class="vital-grid">
      <div class="vital-chip"><label>BLOOD PRESSURE</label><input id="v-bp" placeholder="120/80" value="${v.bp || ''}"><div class="vital-unit">mmHg</div></div>
      <div class="vital-chip"><label>PULSE RATE</label><input id="v-pulse" placeholder="72" value="${v.pulse || ''}"><div class="vital-unit">bpm</div></div>
      <div class="vital-chip"><label>TEMPERATURE</label><input id="v-temp" placeholder="98.6" value="${v.temp || ''}"><div class="vital-unit">deg F</div></div>
      <div class="vital-chip"><label>SpO2</label><input id="v-spo2" placeholder="99" value="${v.spo2 || ''}"><div class="vital-unit">%</div></div>
      <div class="vital-chip"><label>WEIGHT</label><input id="v-weight" placeholder="70" value="${v.weight || ''}"><div class="vital-unit">kg</div></div>
      <div class="vital-chip"><label>RESP. RATE</label><input id="v-rr" placeholder="16" value="${v.rr || ''}"><div class="vital-unit">br/min</div></div>
    </div>
  </div>

  <!-- CHIEF CONCERNS -->
  <div class="card">
    <div class="card-header"><div class="card-icon">🗣️</div><div><div class="card-title">Chief Concerns</div><div class="card-sub">Patient's primary complaints</div></div></div>
    <textarea id="cc" placeholder="Fever since 3 days, body ache, sore throat...">${rx?.chiefConcerns || ''}</textarea>
  </div>

  <!-- CLINICAL NOTES -->
  <div class="card">
    <div class="card-header"><div class="card-icon">🔬</div><div><div class="card-title">Clinical Notes</div><div class="card-sub">Primary and secondary diagnosis</div></div></div>
    <div class="field"><label>Diagnosis</label><textarea id="diag" style="min-height:52px;" placeholder="Primary and secondary diagnoses...">${rx?.diagnosis || ''}</textarea></div>
  </div>

  <!-- MEDICINES -->
  <div class="card">
    <div class="card-header"><div class="card-icon">💊</div><div><div class="card-title">Medicines</div><div class="card-sub">M = Morning · A = Afternoon · E = Evening · N = Night</div></div></div>
    <div class="med-row-header">
      <div class="med-col-hdr">Medicine Name</div>
      <div class="med-col-hdr">Dosage (M-A-E-N)</div>
      <div class="med-col-hdr">Days</div>
      <div class="med-col-hdr">Timing</div>
      <div></div>
    </div>
    <div id="med-list">
      ${meds.map((m, i) => renderMedRow(m, i)).join('')}
    </div>
    <button class="add-row-btn" onclick="addMed()">+ Add Medicine</button>
  </div>

  <!-- NURSE PROCEDURES -->
  <div class="card">
    <div class="card-header"><div class="card-icon">💉</div><div><div class="card-title">Nurse Procedures</div><div class="card-sub">IV drips, injections, wound care — actions for the attending nurse</div></div></div>
    <div class="proc-row-header">
      <div class="med-col-hdr">Procedure Type</div>
      <div class="med-col-hdr">Details / Instructions</div>
      <div class="med-col-hdr">Qty</div>
      <div></div>
    </div>
    <div id="proc-list">
      ${procs.map((p, i) => renderProcRow(p, i)).join('')}
    </div>
    <button class="add-row-btn" onclick="addProc()">+ Add Procedure</button>
    <div class="field" style="margin-top:12px;">
      <label>Special Instructions for Nurse</label>
      <textarea id="proc-instructions" placeholder="Monitor vitals during IV, check for allergies before injection...">${rx?.procInstructions || APP.formProcInstructions || ''}</textarea>
    </div>
  </div>

  <!-- SUGGESTIONS -->
  <div class="card">
    <div class="card-header"><div class="card-icon">💡</div><div><div class="card-title">Advice & Suggestions</div></div></div>
    <textarea id="sug" placeholder="Rest, fluids, diet instructions...">${rx?.suggestions || ''}</textarea>
  </div>

  <!-- INVESTIGATIONS -->
  <div class="card">
    <div class="card-header"><div class="card-icon">🧪</div><div><div class="card-title">Investigations</div><div class="card-sub">Lab and diagnostic tests</div></div></div>
    <div class="form-section"><span>Laboratory Tests</span></div>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <input id="new-lab" list="lab-datalist" placeholder="Search standard tests (e.g. CBC)..." onkeydown="if(event.key==='Enter')addTag('lab')">
      <datalist id="lab-datalist">
        ${STANDARD_LAB_TESTS.map(t => `<option value="${t}">`).join('')}
      </datalist>
      <button class="btn btn-ghost" onclick="addTag('lab')">Add</button>
    </div>
    <div id="lab-tags">${labTags}</div>

    <div class="form-section" style="margin-top:16px;"><span>Diagnostic / Imaging</span></div>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <input id="new-diag" placeholder="e.g. X-Ray Chest PA, ECG, USG Abdomen...">
      <button class="btn btn-ghost" onclick="addTag('diag')">Add</button>
    </div>
    <div id="diag-tags">${diagTags}</div>
  </div>

  <!-- REFERRAL -->
  <div class="card">
    <div class="card-header"><div class="card-icon">🔀</div><div><div class="card-title">Referral</div><div class="card-sub">If specialist consultation required</div></div></div>
    <div id="ref-list">${refRows}</div>
    <button class="add-row-btn" onclick="addRef()">+ Add Referral</button>
  </div>

  <!-- RECHECK -->
  <div class="card">
    <div class="card-header"><div class="card-icon">📅</div><div><div class="card-title">Follow-up / Recheck</div></div></div>
    <div class="field-row c2">
      <div class="field"><label>Recheck Date</label><input type="date" id="recheck" value="${rx?.recheckDate || ''}"></div>
      <div class="field"><label>Follow-up Note</label><input id="recheck-note" placeholder="Instructions for next visit..." value="${rx?.recheckNote || ''}"></div>
    </div>
  </div>

  ${buildDatalistHTML()}

  <div class="action-bar">
    <button class="btn btn-ghost" onclick="clearDraft();resetForm();render()">Clear</button>
    <button class="btn btn-primary" onclick="savePrescription()">
      ${editing ? '💾 Update & Preview' : '📄 Generate Prescription'}
    </button>
  </div>
  </div>`;
    }

    function renderMedRow(m, i) {
      return `
  <div class="med-row" id="med-row-${i}">
    <div class="field" style="margin:0"><input placeholder="Tab. Paracetamol 650 mg" id="med-name-${i}" value="${m.name}" oninput="updateMed(${i},'name',this.value)" list="ac-med-names" autocomplete="off"></div>
    <div class="field" style="margin:0"><input placeholder="1-0-1 or 1-0-1-1" id="med-dose-${i}" value="${m.dosage}" oninput="updateMed(${i},'dosage',this.value)"></div>
    <div class="field" style="margin:0"><input type="number" placeholder="5" id="med-days-${i}" value="${m.days}" oninput="updateMed(${i},'days',this.value)"></div>
    <div class="field" style="margin:0">
      <select id="med-tim-${i}" onchange="updateMed(${i},'timing',this.value)">
        ${['After food', 'Before food', 'With food', 'Before bed', 'SOS', 'Empty stomach'].map(o => `<option ${m.timing === o ? 'selected' : ''}>${o}</option>`).join('')}
      </select>
    </div>
    <button class="btn btn-danger-soft btn-icon" onclick="removeMed(${i})">✕</button>
  </div>`;
    }

    function renderMyRxs(rxs) {
      return `
  <div class="page-header">
    <div><h1 class="page-title">My Prescriptions</h1><div class="page-sub">${rxs.length} prescription${rxs.length !== 1 ? 's' : ''} issued by you</div></div>
  </div>
  ${rxs.length === 0 ? `<div class="empty-state"><div class="icon">📋</div><p>No prescriptions yet. Write your first one.</p></div>` :
          rxs.map(rx => renderRxCard(rx, true)).join('')}`;
    }

    function renderRxCard(rx, canEdit) {
      const open = APP.expandedRx === rx.id;
      const status = rx.status || 'active';
      const sc = STATUS_CONFIG[status] || STATUS_CONFIG.active;
      const orderLines = rx.orderLines || [];
      const procCount = orderLines.filter(l => l.type === 'procedure').length;
      const testCount = orderLines.filter(l => l.type === 'lab_test' || l.type === 'diagnostic_test').length;
      const hasReports = orderLines.some(l => l.status === 'report_uploaded');
      return `
  <div class="rx-card">
    <div class="rx-card-hdr" onclick="toggleExpand('${rx.id}')">
      <div>
        <div class="rx-id">${rx.id}</div>
        <div class="rx-patient-name">${rx.patient.name} <span style="font-weight:400;font-size:13px;color:var(--text-muted);">· ${rx.patient.age}Y, ${rx.patient.gender}</span></div>
        <div class="rx-meta">${rx.doctorName} · ${fmtDate(rx.createdAt)}${rx.edited ? ' · <span class="pill pill-blue" style="font-size:10px;">Edited</span>' : ''}
          ${procCount ? ` · <span style="font-size:11px;">💉 ${procCount} procedures</span>` : ''}
          ${testCount ? ` · <span style="font-size:11px;">🧪 ${testCount} tests</span>` : ''}
        </div>
      </div>
      <div class="rx-actions">
        <span class="pill ${sc.pill}">${sc.icon} ${sc.label}</span>
        ${canEdit ? `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editRx('${rx.id}')">✏️ Edit</button>` : ''}
        ${(status === 'reports_ready' && canEdit) ? `<button class="btn btn-info-soft btn-sm" onclick="event.stopPropagation();APP.reviewingRxId='${rx.id}';APP.section='review';render()">📊 Review</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();APP.previewRx=getRx('${rx.id}');render()">📄 PDF</button>
        <span class="chevron ${open ? 'open' : ''}">▾</span>
      </div>
    </div>
    <div class="rx-body ${open ? 'open' : ''}">
      <div class="rx-detail-grid">
        <div class="rx-detail-item"><label>DIAGNOSIS</label><p>${rx.diagnosis || '—'}</p></div>
        <div class="rx-detail-item"><label>CHIEF CONCERNS</label><p>${rx.chiefConcerns || '—'}</p></div>
        <div class="rx-detail-item"><label>RECHECK</label><p>${rx.recheckDate ? fmtDate2(rx.recheckDate) : '—'}</p></div>
        <div class="rx-detail-item"><label>BP / PULSE</label><p>${rx.vitals?.bp || '—'} · ${rx.vitals?.pulse || '—'} bpm</p></div>
        <div class="rx-detail-item"><label>MEDICINES</label><p>${rx.medicines?.length || 0} prescribed</p></div>
        <div class="rx-detail-item"><label>LAB TESTS</label><p>${(rx.labTests || []).join(', ') || '—'}</p></div>
      </div>
      ${rx.procedures?.length ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px;">💉 Procedures: ${rx.procedures.map(p => { const pt = PROCEDURE_TYPES.find(t => t.value === p.type); return (pt ? pt.icon + ' ' : '') + p.details; }).join(', ')}</div>` : ''}
      ${rx.referral?.length ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">🔀 Referral: ${rx.referral.map(r => r.specialist).join(', ')}</div>` : ''}
      ${orderLines.length ? `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">${orderLines.map(l => {
        const sc2 = l.status === 'administered' || l.status === 'report_uploaded' ? 'pill-green' : l.status === 'declined' ? 'pill-red' : l.status === 'accepted' ? 'pill-blue' : 'pill-gray';
        const slbl = l.status === 'administered' ? '✅' : l.status === 'report_uploaded' ? '📊' : l.status === 'declined' ? '❌' : l.status === 'accepted' ? '✓' : '⏳';
        return `<span class="pill ${sc2}" style="font-size:10px;">${slbl} ${l.details.substring(0, 25)}${l.details.length > 25 ? '...' : ''}</span>`;
      }).join('')}</div>` : ''}
    </div>
  </div>`;
    }

    /* ══════════════════════════════════════════════════════
       ADMIN APP
    ══════════════════════════════════════════════════════ */
    function renderAdminApp() {
      const s = APP.section;
      const doctors = getDoctors();
      const rxs = getRxs();
      const today = new Date().toDateString();
      const todayRxs = rxs.filter(r => new Date(r.createdAt).toDateString() === today).length;
      const activeDocs = doctors.filter(d => d.active && d.profileComplete).length;

      return `
  <div class="topbar">
    <div class="topbar-brand">
      <img class="topbar-logo" src="${LOGO_SRC}" onerror="this.style.display='none'">
      <span class="topbar-tag">Admin</span>
    </div>
    <div class="topbar-user">
      <span class="status-dot" style="background:var(--info);box-shadow:0 0 6px var(--info)"></span>
      <span>Administrator</span>
      <span style="color:var(--text-dim)">·</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-section">Overview</div>
      <button class="sidebar-btn ${s === 'dashboard' ? 'active' : ''}" onclick="APP.section='dashboard';render()">
        <span class="sidebar-ico">📊</span> Dashboard
      </button>

      <div class="sidebar-section">Operations</div>
      <button class="sidebar-btn ${s === 'operations' ? 'active' : ''}" onclick="APP.section='operations';render()">
        <span class="sidebar-ico">🏥</span> Operations
        ${(() => { const pa = rxs.filter(r => r.status === 'pending_actions').length; return pa ? `<span class="sidebar-badge" style="background:var(--warn);color:#000;">${pa}</span>` : ''; })()}
      </button>

      <div class="sidebar-section">Nurses & Cases</div>
      <button class="sidebar-btn ${s === 'nurses' ? 'active' : ''}" onclick="APP.section='nurses';render()">
        <span class="sidebar-ico">🧑‍⚕️</span> Manage Nurses
        <span class="sidebar-badge">${getNurses().length}</span>
      </button>
      <button class="sidebar-btn ${s === 'cases' ? 'active' : ''}" onclick="APP.section='cases';render()">
        <span class="sidebar-ico">📁</span> Assign Cases
        <span class="sidebar-badge">${getCases().length}</span>
      </button>
      <button class="sidebar-btn ${s === 'admin-consults' ? 'active' : ''}" onclick="APP.section='cases';render()">
        <span class="sidebar-ico">📞</span> Consultations
        ${(() => { const cc = getCases().filter(c => c.consultationRequested).length; return cc ? `<span class="sidebar-badge blink">${cc} LIVE</span>` : ''; })()}
      </button>

      <div class="sidebar-section">Doctors</div>
      <button class="sidebar-btn ${s === 'doctors' ? 'active' : ''}" onclick="APP.section='doctors';render()">
        <span class="sidebar-ico">🩺</span> Manage Doctors
        <span class="sidebar-badge">${doctors.length}</span>
      </button>
      <div class="sidebar-section">Prescriptions</div>
      <button class="sidebar-btn ${s === 'allrx' ? 'active' : ''}" onclick="APP.section='allrx';render()">
        <span class="sidebar-ico">📋</span> All Prescriptions
        <span class="sidebar-badge">${rxs.length}</span>
      </button>

      <div class="sidebar-section">Master Data</div>
      <button class="sidebar-btn ${s === 'labs' ? 'active' : ''}" onclick="APP.section='labs';render()">
        <span class="sidebar-ico">🧪</span> Lab Partners
        <span class="sidebar-badge">${getLabs().length}</span>
      </button>
    </div>

    <div class="content">
      ${s === 'dashboard' ? renderAdminDash(doctors, rxs, todayRxs, activeDocs) :
          s === 'operations' ? renderOperations(rxs) :
            s === 'doctors' ? renderAdminDoctors(doctors) :
              s === 'nurses' ? renderAdminNurses() :
                s === 'labs' ? renderAdminLabs() :
                s === 'cases' ? (APP.viewingCaseId ? renderAdminCaseDetail(getCases().find(c => c.id === APP.viewingCaseId)) : renderAdminCases()) :
                  s === 'review' ? (APP.reviewingRxId ? renderReviewDetail(getRx(APP.reviewingRxId)) : renderAdminRxs(rxs)) :
                    renderAdminRxs(rxs)}
    </div>
  </div>`;
    }

    function renderAdminDash(doctors, rxs, todayRxs, activeDocs) {
      return `
  <div class="page-header">
    <div><h1 class="page-title">Dashboard</h1><div class="page-sub">System overview for immidit Prescription Platform</div></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card stat-orange"><div class="stat-label">Total Prescriptions</div><div class="stat-value">${rxs.length}</div><div class="stat-sub">All time</div></div>
    <div class="stat-card"><div class="stat-label">Today</div><div class="stat-value">${todayRxs}</div><div class="stat-sub">${new Date().toLocaleDateString('en-IN', { weekday: 'long' })}</div></div>
    <div class="stat-card stat-green"><div class="stat-label">Active Doctors</div><div class="stat-value">${activeDocs}</div><div class="stat-sub">Profile complete</div></div>
    <div class="stat-card stat-blue"><div class="stat-label">Field Nurses</div><div class="stat-value">${getNurses().length}</div><div class="stat-sub">Registered accounts</div></div>
    <div class="stat-card stat-purple"><div class="stat-label">Total Cases</div><div class="stat-value">${getCases().length}</div><div class="stat-sub">All time</div></div>
    <div class="stat-card stat-red"><div class="stat-label">Active Cases</div><div class="stat-value">${getCases().filter(c => c.status !== 'closed').length}</div><div class="stat-sub">Pending completion</div></div>
  </div>
  <div class="page-header" style="margin-top:8px;">
    <div><h2 style="font-size:18px;">Recent Prescriptions</h2></div>
    <button class="btn btn-ghost btn-sm" onclick="APP.section='allrx';render()">View All →</button>
  </div>
  ${rxs.length === 0 ? `<div class="empty-state"><div class="icon">📋</div><p>No prescriptions yet.</p></div>` :
          rxs.slice(0, 6).map(rx => renderRxCard(rx, false)).join('')}`;
    }

    function renderAdminDoctors(doctors) {
      return `
  <div class="page-header">
    <div><h1 class="page-title">Manage Doctors</h1><div class="page-sub">Create accounts and manage doctor access</div></div>
    <button class="btn btn-primary" onclick="APP.showModal='add_doctor';APP.modalData={};render()">+ Add Doctor</button>
  </div>

  ${doctors.length === 0 ? `<div class="empty-state"><div class="icon">🩺</div><p>No doctors yet. Add your first doctor.</p></div>` : `
  <div class="doctor-grid">
    ${doctors.map(d => renderDoctorCard(d)).join('')}
  </div>`}`;
    }

    function renderDoctorCard(d) {
      const p = d.profile || {};
      const rxCount = getRxs().filter(r => r.doctorId === d.id).length;
      return `
  <div class="doctor-card">
    <div class="doctor-card-top">
      <div class="doctor-avatar">
        ${p.avatarInitials || '👤'}
      </div>
      <div style="flex:1;min-width:0;">
        <div class="doctor-name">${p.name || d.username}</div>
        <div class="doctor-spec">${p.specialty || 'Profile incomplete'}</div>
        <div class="doctor-reg">${d.id} · @${d.username}</div>
        <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;">
          ${d.active ? `<span class="pill pill-green">Active</span>` : `<span class="pill pill-red">Inactive</span>`}
          ${d.profileComplete ? `<span class="pill pill-blue">${rxCount} Rx</span>` : `<span class="pill pill-gray">Profile Pending</span>`}
        </div>
      </div>
    </div>
    <div class="doctor-card-actions">
      <button class="btn btn-ghost btn-sm" onclick="showCreds('${d.id}')">🔑 Credentials</button>
      <button class="btn btn-info-soft btn-sm" onclick="resetPassword('${d.id}')">🔄 Reset Pass</button>
      <button class="btn ${d.active ? 'btn-danger-soft' : 'btn-success-soft'} btn-sm" onclick="toggleDoctor('${d.id}')">
        ${d.active ? '🚫 Deactivate' : '✓ Activate'}
      </button>
    </div>
  </div>`;
    }

    function renderAdminRxs(rxs) {
      return `
  <div class="page-header">
    <div><h1 class="page-title">All Prescriptions</h1><div class="page-sub">${rxs.length} total records</div></div>
  </div>
  ${rxs.length === 0 ? `<div class="empty-state"><div class="icon">📋</div><p>No prescriptions yet.</p></div>` :
          rxs.map(rx => renderRxCard(rx, false)).join('')}`;
    }

    /* ══════════════════════════════════════════════════════
       ADMIN ACTIONS
    ══════════════════════════════════════════════════════ */
    /* ══════════════════════════════════════════════════════
       NURSE PCR VIEW (DOCTOR)
    ══════════════════════════════════════════════════════ */
    function renderNurseCases() {
      if (APP.viewingCaseId) return renderCaseDetail(APP.viewingCaseId);
      const cases = getCases().filter(c => c.status !== 'assigned');
      return `
  <div class="page-header">
    <div><h1 class="page-title">Nurse PCR Records</h1><div class="page-sub">Field data collected by nurses — review and start prescriptions</div></div>
    <button class="btn btn-ghost btn-sm" onclick="SYNC.pull().then(()=>render())">🔄 Refresh</button>
  </div>
  ${cases.length === 0 ? `<div class="empty-state"><div class="icon">🧑‍⚕️</div><p>No active nurse cases yet. Cases will appear here once a nurse starts a visit.</p></div>` :
    cases.map(c => {
      const sc = c.status === 'closed' ? 'pill-green' : c.status === 'in_progress' ? 'pill-blue' : 'pill-gray';
      const sl = c.status === 'closed' ? '✅ Closed' : c.status === 'in_progress' ? '🔄 In Progress' : c.status === 'en_route' ? '🚗 En Route' : c.status === 'arrived' ? '📍 Arrived' : c.status;
      const isUrgent = c.consultationRequested;
      return `<div class="rx-card ${isUrgent ? 'urgent-glow' : ''}" style="cursor:pointer; ${isUrgent ? 'border-color:var(--danger);' : ''}" onclick="APP.viewingCaseId='${c.id}';render()">
        <div class="rx-card-hdr">
          <div>
            <div class="rx-id">${c.id} ${isUrgent ? `<span class="pill pill-red blink" style="margin-left:8px;">⚠️ CALL DOCTOR</span>` : ''}</div>
            <div class="rx-patient-name">${c.patientName} <span style="font-weight:400;font-size:13px;color:var(--text-muted);">· ${c.patientAge}Y, ${c.patientGender}</span></div>
            <div class="rx-meta">${c.chiefIssue || '—'} · ${c.address || ''}</div>
          </div>
          <div class="rx-actions"><span class="pill ${sc}">${sl}</span></div>
        </div>
      </div>`;
    }).join('')}`;
    }

    function startRxFromCase(caseId) {
      const c = getCases().find(x => x.id === caseId);
      if (!c) return;
      resetForm();
      // Pre-fill patient data into the form state so renderNewRx picks it up
      APP.editingRxId = null;
      APP.section = 'new';
      APP.viewingCaseId = null;
      APP._prefillFromCase = c; // stash for gatherForm pre-fill
      render();
      // Now fill the DOM inputs directly
      setTimeout(() => {
        const el = id => document.getElementById(id);
        if (el('p-name')) el('p-name').value = c.patientName || '';
        if (el('p-age')) el('p-age').value = c.patientAge || '';
        if (el('p-gender')) { const g = c.patientGender === 'M' ? 'Male' : c.patientGender === 'F' ? 'Female' : ''; el('p-gender').value = g; }
        if (el('p-addr')) el('p-addr').value = c.address || '';
        if (el('cc')) el('cc').value = c.chiefIssue || '';
        
        // Import Nurse Vitals
        const v = c.vitals || {};
        if (el('v-bp')) el('v-bp').value = v.bp || '';
        if (el('v-pulse')) el('v-pulse').value = v.pulse || '';
        if (el('v-temp')) el('v-temp').value = v.temp || '';
        if (el('v-spo2')) el('v-spo2').value = v.spo2 || '';
        if (el('v-weight')) el('v-weight').value = v.weight || '';
        if (el('v-rr')) el('v-rr').value = v.rr || '';

        const pcr = c.pcrData || {};
        if (pcr.chiefComplaint && el('cc')) el('cc').value = pcr.chiefComplaint;
        if (pcr.handoverNotes && el('diag')) el('diag').value = 'Nurse notes: ' + pcr.handoverNotes;
        
        toast('Patient data & vitals imported from nurse case ' + c.id);
        saveDraft(); // Persist the import immediately
      }, 100);
    }

      const input = document.getElementById('mc-new-supply');

      if (!val) return;

      APP.modalData.supplies.push({

        type: 'consumable', 
        confirmed: false

    function renderCaseTimeline(c) {
      const events = [];
      const add = (time, title, body, icon, geo, type, media) => { 
        if (time) events.push({ time, title, body, icon, geo, type, media }); 
      };

      add(c.createdAt, 'Case Created', `Assignment issued to nurse ${c.assignedNurseId || '—'}`, '📂', null, 'info');
      
      if (c.departureTime) {
        add(c.departureTime, 'Nurse Departed', 'Nurse verified equipment and started trip', '🚗', null, 'info');
      }

      if (c.arrivalTime) {
        add(c.arrivalTime, 'Nurse Arrived', 'Nurse arrived at patient location', '📍', c.gpsCoordinates, 'success');
      }
      
      if (c.consentFormPhotoUri) {
        add(c.arrivalTime, 'Consent Obtained', 'Patient signature and consent captured', '📝', null, 'success', [c.consentFormPhotoUri]);
      }

      if (c.deviceReadingPhotoUri) {
        add(c.arrivalTime, 'Vitals Verified', 'Physical device reading documented via camera', '📊', null, 'info', [c.deviceReadingPhotoUri]);
      }
      
      if (c.pcrCompletedTime) {
        const p = c.pcrData || {};
        let pcrMedia = [];
        if (p.formPage1Uri) pcrMedia.push(p.formPage1Uri);
        if (p.formPage2Uri) pcrMedia.push(p.formPage2Uri);
        if (p.prevPrescriptionUri) pcrMedia.push(p.prevPrescriptionUri);
        if (p.prevMedicinePhotoUri) pcrMedia.push(p.prevMedicinePhotoUri);

        add(c.pcrCompletedTime, 'PCR Completed', `Complaint: ${p.chiefComplaint || '—'}<br>Interventions: ${p.handoverNotes || '—'}`, '🩺', c.lastUpdatedLocation, 'success', pcrMedia);
      }

      if (c.doctorConsultTime) {
        const consult = c.doctorConsultation || {};
        let consultBody = `Consultation with ${consult.doctorName || 'Doctor'}<br>Instructions: ${consult.instructions || '—'}`;
        if (consult.voiceRecordingUri) {
          consultBody += `<br><audio controls src="${consult.voiceRecordingUri}" style="margin-top:8px;height:32px;width:100%;"></audio>`;
        }
        add(c.doctorConsultTime, 'Doctor Consultation', consultBody, '📞', null, 'warn');
      }
      
      // Photos & Orders
      const procPhotos = c.procedurePhotos || [];
      if (procPhotos.length > 0) {
        add(c.doctorConsultTime || c.pcrCompletedTime, 'Clinical Procedures', `Captured ${procPhotos.length} procedure/site photos`, '📸', c.lastUpdatedLocation, 'info', procPhotos);
      }

      const samplePhotos = c.samplePhotos || [];
      if (samplePhotos.length > 0) {
        add(c.sampleCollectionTime || c.doctorConsultTime, 'Sample Collection', `Collected diagnostic samples at ${new Date(c.sampleCollectionTime).toLocaleTimeString()}`, '🧪', c.lastUpdatedLocation, 'success', samplePhotos);
      }

      if (c.closeTime) {
        const vitals = c.exitVitals || {};
        let exitBody = `Outcome: <b>${(c.caseOutcome || '—').toUpperCase()}</b><br>Notes: ${c.nurseNotes || '—'}`;
        if (vitals.bp) exitBody += `<br>Exit Vitals: BP ${vitals.bp}, PR ${vitals.pr}, SpO2 ${vitals.spo2}`;
        add(c.closeTime, 'Discharge & Exit', exitBody, '✅', c.lastUpdatedLocation, 'success');
      }
      
      if (c.labDropoff) {
        add(c.labDropoff.dropoffTime, 'Lab Drop-off', `Samples delivered to <b>${c.labDropoff.labName}</b><br>Seal: ${c.labDropoff.sealNumber || '—'} · Count: ${c.labDropoff.sampleCount}`, '🏢', null, 'success', c.labDropoff.photoUri ? [c.labDropoff.photoUri] : null);
      }

      // Sort events by time
      events.sort((a, b) => new Date(a.time) - new Date(b.time));

      return `
      <div class="timeline">
        ${events.map(e => `
          <div class="timeline-item">
            <div class="timeline-marker ${e.type || ''}">${e.icon || '•'}</div>
            <div class="timeline-content">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
                <span class="timeline-time">${new Date(e.time).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}</span>
                ${e.geo ? `<button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:10px;" onclick="window.open('https://maps.google.com/?q=${e.geo.lat},${e.geo.lng}')">📍 View GPS</button>` : ''}
              </div>
              <div class="timeline-title">${e.title}</div>
              <div class="timeline-body">${e.body}</div>
              
              ${e.media ? `
                <div class="timeline-media-grid" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
                  ${e.media.map(m => `
                    <div class="timeline-img-box" onclick="window.open('${m}')" style="width:80px;height:80px;border-radius:6px;overflow:hidden;border:1px solid var(--border);cursor:zoom-in;">
                      <img src="${m}" style="width:100%;height:100%;object-fit:cover;">
                    </div>
                  `).join('')}
                </div>
              ` : ''}
            </div>
          </div>
        `).join('')}
      </div>`;
    }

    function createNurse() {
      const name = document.getElementById('mn-name').value.trim();
      const phone = document.getElementById('mn-phone').value.trim();
      const zone = document.getElementById('mn-zone').value.trim();
      const password = document.getElementById('mn-pass').value.trim();
      const errEl = document.getElementById('mn-error');
      if (!name || !password) { errEl.textContent = 'Name and passcode are required.'; errEl.style.display = 'block'; return; }
      const nurses = getNurses();
      const id = 'N-' + String(nurses.length + 1).padStart(3, '0');
      nurses.push({ id, name, phone, zone, password, casesCompleted: 0, joinedDate: new Date().toISOString().split('T')[0] });
      saveNurses(nurses);
      // Also push to Google Sheets
      SYNC.pushCases(getCases()); 
      SYNC.pushNurses(nurses);
      toast('Nurse ' + name + ' added successfully!');
      closeModal();
    }

    function createCase() {
      const name = document.getElementById('mc-name').value.trim();
      const age = document.getElementById('mc-age').value.trim();
      const gender = document.getElementById('mc-gender').value;
      const urgency = document.getElementById('mc-urgency').value;
      const addr = document.getElementById('mc-addr').value.trim();
      const issue = document.getElementById('mc-issue').value.trim();
      const nurseId = document.getElementById('mc-nurse').value;
      const errEl = document.getElementById('mc-error');
      if (!name || !issue) { errEl.textContent = 'Patient name and chief issue are required.'; errEl.style.display = 'block'; return; }
      const cases = getCases();
      const todayStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      const seq = String(cases.length + 1).padStart(4, '0');
      const newCase = {
        id: 'IMM-' + todayStr + '-' + seq,
        patientName: name, patientAge: parseInt(age) || 0, patientGender: gender,
        address: addr, chiefIssue: issue, urgency: urgency,
        status: 'assigned', currentPhase: 1,
        assignedNurseId: nurseId || null,
        supplies: APP.modalData.supplies || [],
        procedurePhotos: [], samplePhotos: [],
        createdAt: new Date().toISOString()
      };
      cases.push(newCase);
      saveCasesLocal(cases);
      toast('Case ' + newCase.id + ' created and assigned!');
      closeModal();
    }

    function createDoctor() {
      const username = document.getElementById('m-user').value.trim().toLowerCase();
      const password = document.getElementById('m-pass').value.trim();
      const name = document.getElementById('m-name').value.trim();
      const reg = document.getElementById('m-reg').value.trim();
      const phone = document.getElementById('m-phone').value.trim();
      const errEl = document.getElementById('m-error');

      if (!username || !password) { errEl.textContent = 'Username and password are required.'; errEl.style.display = 'block'; return; }
      if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
      const docs = getDoctors();
      if (docs.find(d => d.username === username)) { errEl.textContent = 'Username already exists. Choose another.'; errEl.style.display = 'block'; return; }

      const id = genId('DOC');
      const newDoc = {
        id, username, password,
        profileComplete: false,
        active: true,
        createdAt: new Date().toISOString(),
        profile: {
          name: name || '',
          regId: reg || '',
          specialty: '',
          qualification: '',
          experience: '',
          phone: phone || '',
          bio: '',
          signature: null,
          avatarInitials: name ? name.split(' ').filter(w => w).slice(0, 2).map(w => w[0].toUpperCase()).join('') : username.substring(0, 2).toUpperCase(),
        }
      };
      docs.push(newDoc);
      saveDoctors(docs);

      errEl.style.display = 'none';
      document.getElementById('m-submit').disabled = true;
      document.getElementById('m-submit').textContent = 'Created ✓';
      document.getElementById('cred-u').textContent = username;
      document.getElementById('cred-p').textContent = password;
      document.getElementById('m-success').style.display = 'block';
      toast('Doctor account created successfully!');
    }

    function addTag(type) {
      const inp = document.getElementById(type === 'lab' ? 'new-lab' : 'new-diag');
      const val = inp?.value.trim(); if (!val) return;
      const arr = type === 'lab' ? APP.formLabTests : APP.formDiagTests;
      
      // If lab, store as object with tube mapping
      if (type === 'lab') {
        const mapping = LAB_TUBE_MAPPING[val];
        arr.push({ 
          name: val, 
          tube: mapping?.tube || 'Other', 
          color: mapping?.color || '#ccc',
          instructions: mapping?.instructions || ''
        });
      } else {
        arr.push(val);
      }

      const container = document.getElementById(type + '-tags');
      if (container) {
        const i = arr.length - 1;
        const icon = type === 'lab' ? '🧫' : '📡';
        const displayVal = type === 'lab' ? val : val;
        const span = document.createElement('span'); span.className = 'tag'; span.id = type + '-tag-' + i;
        span.innerHTML = `${icon} ${val}<button class="tag-del" onclick="removeTag('${type}',${i})">×</button>`;
        container.appendChild(span);
      }
      inp.value = '';
      saveDraft();
    }

    function removeTag(type, i) {
      if (type === 'lab') APP.formLabTests.splice(i, 1);
      else APP.formDiagTests.splice(i, 1);
      const el = document.getElementById(type + '-tag-' + i); if (el) el.remove();
      saveDraft();
    }

      <div class="field" style="margin:0"><input placeholder="Hospital / Clinic" id="ref-hosp-${i}" oninput="APP.formReferrals[${i}].hospital=this.value;saveDraft()"></div>

    function gatherForm() {
      // Flush any pending test inputs that weren't Add-ed via button
      ['new-lab', 'new-diag'].forEach(id => {
        const el = document.getElementById(id);
        if (el?.value.trim()) {
          addTag(id === 'new-lab' ? 'lab' : 'diag');
        }
      });

      const meds = [];
      document.querySelectorAll('[id^="med-name-"]').forEach((el, i) => {
        meds.push({ name: el.value, dosage: document.getElementById(`med-dose-${i}`)?.value || '', days: document.getElementById(`med-days-${i}`)?.value || '', timing: document.getElementById(`med-tim-${i}`)?.value || '' });
      });
      const refs = [];
      document.querySelectorAll('[id^="ref-spec-"]').forEach((el, i) => {
        refs.push({ specialist: el.value, hospital: document.getElementById(`ref-hosp-${i}`)?.value || '', reason: document.getElementById(`ref-reason-${i}`)?.value || '' });
      });
      // Gather procedures from APP state (already updated via oninput)
      const procs = APP.formProcedures.filter(p => p.type || p.details);
      return {
        patient: { name: document.getElementById('p-name')?.value || '', phone: document.getElementById('p-phone')?.value || '', age: document.getElementById('p-age')?.value || '', gender: document.getElementById('p-gender')?.value || '', address: document.getElementById('p-addr')?.value || '', allergies: document.getElementById('p-allergies')?.value || '', comorbidities: document.getElementById('p-comorbidities')?.value || '' },
        visitDate: document.getElementById('p-date')?.value || '',
        vitals: { bp: document.getElementById('v-bp')?.value || '', pulse: document.getElementById('v-pulse')?.value || '', temp: document.getElementById('v-temp')?.value || '', spo2: document.getElementById('v-spo2')?.value || '', weight: document.getElementById('v-weight')?.value || '', rr: document.getElementById('v-rr')?.value || '' },
        chiefConcerns: document.getElementById('cc')?.value || '',
        diagnosis: document.getElementById('diag')?.value || '',
        suggestions: document.getElementById('sug')?.value || '',
        medicines: meds,
        labTests: APP.formLabTests.slice(),
        diagnosticTests: APP.formDiagTests.slice(),
        referral: refs,
        procedures: procs,
        procInstructions: document.getElementById('proc-instructions')?.value || '',
        recheckDate: document.getElementById('recheck')?.value || '',
        recheckNote: document.getElementById('recheck-note')?.value || '',
      };

    function resetForm() {
      APP.formMeds = [{ name: '', dosage: '', days: '', timing: 'After food' }];
      APP.formLabTests = []; APP.formDiagTests = []; APP.formReferrals = [];
      APP.formProcedures = []; APP.formProcInstructions = '';
      APP.editingRxId = null;
      clearDraft();
    }

    function savePrescription() {
      const data = gatherForm();
      if (!data.patient.name) { toast('Patient name is required.', 'error'); return; }
      const doc = APP.currentDoctor;
      let finalRx = null;

      if (APP.editingRxId) {
        const rx = getRx(APP.editingRxId);
        if (rx) {
          finalRx = { ...rx, ...data, edited: true, editedAt: new Date().toISOString() };
          if (!finalRx.orderLines) finalRx.orderLines = generateOrderLines(finalRx);
          finalRx.status = computeRxStatus(finalRx);
          updatePrescription(finalRx);
          APP.previewRx = finalRx;
        }
      } else {
        finalRx = {
          id: genId('RX'),
          doctorId: doc.id, doctorName: doc.profile.name, doctorReg: doc.profile.regId,
          doctorSpec: doc.profile.specialty, doctorQual: doc.profile.qualification,
          doctorSignature: doc.profile.signature,
          createdAt: new Date().toISOString(), edited: false,
          ...data
        };
        finalRx.orderLines = generateOrderLines(finalRx);
        finalRx.status = computeRxStatus(finalRx);
        finalRx.followUp = null;
        addPrescription(finalRx);
        APP.previewRx = finalRx;
      }

      // ── NURSE SYNC ──
      // If this Rx was started from an active nurse case, update the case immediately
      if (APP._prefillFromCase && finalRx) {
        const caseId = APP._prefillFromCase.id;
        const cases = getCases();
        const c = cases.find(x => x.id === caseId);
        if (c) {
          c.orderLines = finalRx.orderLines;
          c.doctorConsultTime = new Date().toISOString();
          c.doctorConsultation = {
            doctorId: doc.id,
            doctorName: doc.profile.name,
            instructions: finalRx.suggestions || 'Refer to prescription.',
            callDuration: 'Prescription Issued'
          };
          c.updatedAt = new Date().toISOString();
          saveCases(cases);
          SYNC.post({ action: 'saveCases', data: [c] });
          toast('Nurse actionables updated with new orders!', 'success');
        }
        APP._prefillFromCase = null;
      }

      resetForm();
      toast(APP.editingRxId ? 'Prescription updated!' : 'Prescription saved!');
      render();
    }

    /* ══════════════════════════════════════════════════════
       ORDER LINE GENERATION & STATUS
    ══════════════════════════════════════════════════════ */
    function generateOrderLines(rx) {
      const lines = [];
      let idx = 0;
      // From procedures
      (rx.procedures || []).forEach(p => {
        if (!p.type && !p.details) return;
        const pt = PROCEDURE_TYPES.find(t => t.value === p.type);
        lines.push({
          id: 'OL-' + (++idx),
          type: 'procedure',
          category: pt ? pt.label : p.type,
          icon: pt ? pt.icon : '💉',
          details: p.details || '',
          quantity: p.quantity || 1,
          status: 'pending',
          administeredAt: null,
          administeredBy: null,
          patientResponse: null,
          reportUrl: null,
          reportFileId: null,
          notes: '',
        });
      });
      // From lab tests
      (rx.labTests || []).forEach(t => {
        const labName = typeof t === 'string' ? t : t.name;
        const mapping = typeof t === 'object' ? t : LAB_TUBE_MAPPING[labName];
        lines.push({
          id: 'OL-' + (++idx),
          type: 'lab_test',
          category: 'Laboratory',
          icon: '🧪',
          details: labName,
          tube: mapping?.tube || 'Other',
          instructions: mapping?.instructions || '',
          status: 'pending',
          patientResponse: null,
          reportUrl: null,
          reportFileId: null,
          notes: '',
          interpretation: '',
        });
      });
      // From diagnostic tests
      (rx.diagnosticTests || []).forEach(t => {
        lines.push({
          id: 'OL-' + (++idx),
          type: 'diagnostic_test',
          category: 'Imaging / Diagnostic',
          icon: '📡',
          details: t,
          status: 'pending',
          patientResponse: null,
          reportUrl: null,
          reportFileId: null,
          notes: '',
          interpretation: '',
        });
      });
      // From referrals
      (rx.referral || []).forEach(r => {
        if (!r.specialist) return;
        lines.push({
          id: 'OL-' + (++idx),
          type: 'referral',
          category: 'Referral',
          icon: '🔀',
          details: r.specialist + (r.hospital ? ' — ' + r.hospital : ''),
          status: 'pending',
          patientResponse: null,
          notes: r.reason || '',
        });
      });
      return lines;
    }

    function computeRxStatus(rx) {
      const lines = rx.orderLines || [];
      if (lines.length === 0) return 'active';

      const allResolved = lines.every(l =>
        l.status === 'administered' || l.status === 'declined' ||
        l.status === 'accepted' || l.status === 'report_uploaded' || l.status === 'not_required'
      );
      const hasTestsWithReports = lines.some(l =>
        (l.type === 'lab_test' || l.type === 'diagnostic_test') && l.status === 'report_uploaded'
      );
      const hasUnresolvedTests = lines.some(l =>
        (l.type === 'lab_test' || l.type === 'diagnostic_test') &&
        (l.status === 'pending' || l.status === 'accepted')
      );

      if (rx.followUp && rx.followUp.completedAt) return 'case_complete';
      if (hasTestsWithReports && !hasUnresolvedTests) return 'reports_ready';
      if (allResolved && !hasTestsWithReports) return 'executed';
      return 'pending_actions';
    }

    function editRx(id) {
      const rx = getRxs().find(r => r.id === id);
      if (!rx) return;
      APP.editingRxId = id;
      APP.formMeds = rx.medicines?.slice() || [{ name: '', dosage: '', days: '', timing: 'After food' }];
      APP.formLabTests = rx.labTests?.slice() || [];
      APP.formDiagTests = rx.diagnosticTests?.slice() || [];
      APP.formReferrals = rx.referral?.slice() || [];
      APP.formProcedures = rx.procedures?.slice() || [];
      APP.formProcInstructions = rx.procInstructions || '';
      APP.section = 'new';
      render();
    }

    function toggleExpand(id) { APP.expandedRx = APP.expandedRx === id ? null : id; render(); }
    function getRx(id) { return getRxs().find(r => r.id === id); }

       DOCTOR PROFILE SAVE
    ══════════════════════════════════════════════════════ */
    function bindDoctorApp() {
      // Bind profile save
      document.getElementById('save-profile-btn')?.addEventListener('click', () => {
        const docs = getDoctors();
        const idx = docs.findIndex(d => d.id === APP.currentDoctor.id);
        const sig = sigCanvas ? sigCanvas.toDataURL() : docs[idx].profile.signature;
        docs[idx].profile = {
          ...docs[idx].profile,
          qualification: document.getElementById('up-qual')?.value || docs[idx].profile.qualification,
          experience: document.getElementById('up-exp')?.value || docs[idx].profile.experience,
          phone: document.getElementById('up-phone')?.value || docs[idx].profile.phone,
          bio: document.getElementById('up-bio')?.value || docs[idx].profile.bio,
          signature: sig,
        };
        saveDoctors(docs);
        APP.currentDoctor = docs[idx];
        toast('Profile saved successfully!');
      });

      // Bind signature pad if on profile
      if (APP.section === 'profile') {
        const canvas = document.getElementById('sig-canvas');
        if (canvas) {
          sigCanvas = canvas; sigCtx = canvas.getContext('2d');
          sigCtx.strokeStyle = '#F5621E'; sigCtx.lineWidth = 2.2; sigCtx.lineCap = 'round';
          // Restore existing sig
          const existingSig = APP.currentDoctor.profile.signature;
          if (existingSig) { const img = new Image(); img.onload = () => sigCtx.drawImage(img, 0, 0, canvas.width, canvas.height); img.src = existingSig; }
          const pt = e => ({ x: e.offsetX, y: e.offsetY });
          canvas.onmousedown = e => { sigDrawing = true; sigCtx.beginPath(); sigCtx.moveTo(pt(e).x, pt(e).y); };
          canvas.onmousemove = e => { if (!sigDrawing) return; sigCtx.lineTo(pt(e).x, pt(e).y); sigCtx.stroke(); };
          canvas.onmouseup = () => sigDrawing = false;
          canvas.onmouseleave = () => sigDrawing = false;
        }
      }

      // Apply draft if pending (after DOM is ready)
      if (APP.section === 'new' && APP._pendingDraft) {
        setTimeout(applyDraftToForm, 50);
      }

      async function zoomImage(src) {
        if (!src) return;
        const ov = document.getElementById('zoom-overlay');
        ov.style.display = 'flex';
        ov.innerHTML = `<div style="color:white;font-size:14px;">Loading high-res image...</div>`;
        
        try {
          // If it's a Drive URL, we can try to proxy it for high-res viewing if needed
          ov.innerHTML = `<img src="${src}" crossorigin="anonymous" onerror="handleImageError(this, '${src}')">`;
        } catch(e) {
          ov.innerHTML = `<div style="color:white;">Failed to load image.</div>`;
        }
      }

      async function handleImageError(img, src) {
        console.warn('Image failed to load directly, trying proxy:', src);
        // If already proxied, stop
        if (src.includes('data:image')) return;
        
        try {
          const resp = await fetch(SHEET_API, {
            method: 'POST',
            body: JSON.stringify({ action: 'proxyFetch', url: src })
          });
          const data = await resp.json();
          if (data.content) {
            img.src = `data:${data.mimeType};base64,${data.content}`;
            img.removeAttribute('onerror');
          } else {
            img.src = 'https://via.placeholder.com/300?text=Image+Unavailable';
          }
        } catch(e) {
          img.src = 'https://via.placeholder.com/300?text=Image+Unavailable';
        }
      }
      window.handleImageError = handleImageError;

      // Start draft auto-save timer
      if (APP.section === 'new') {
        startDraftAutoSave();
      }
    }

    /* ══════════════════════════════════════════════════════
       OPERATIONS DASHBOARD (Admin)
    ══════════════════════════════════════════════════════ */
    function renderOperations(allRxs) {
      const rxsWithOL = allRxs.filter(r => (r.orderLines || []).length > 0);
      const f = APP.opsFilter;
      const filtered = rxsWithOL.filter(rx => {
        if (f === 'all') return true;
        if (f === 'pending') return rx.status === 'pending_actions';
        if (f === 'to_administer') return (rx.orderLines || []).some(l => l.type === 'procedure' && l.status === 'pending');
        if (f === 'reports_pending') return (rx.orderLines || []).some(l => (l.type === 'lab_test' || l.type === 'diagnostic_test') && (l.status === 'pending' || l.status === 'accepted'));
        if (f === 'complete') return rx.status === 'executed' || rx.status === 'case_complete';
        return true;
      });
      const pendingCount = rxsWithOL.filter(r => r.status === 'pending_actions').length;
      const toAdminCount = rxsWithOL.reduce((c, r) => c + (r.orderLines || []).filter(l => l.type === 'procedure' && l.status === 'pending').length, 0);
      const repPendCount = rxsWithOL.reduce((c, r) => c + (r.orderLines || []).filter(l => (l.type === 'lab_test' || l.type === 'diagnostic_test') && (l.status === 'pending' || l.status === 'accepted')).length, 0);
      const doneCount = rxsWithOL.filter(r => r.status === 'executed' || r.status === 'case_complete').length;

      return `
  <div class="page-header">
    <div><h1 class="page-title">Operations</h1><div class="page-sub">Track procedures, tests & referrals</div></div>
  </div>
  <div class="ops-stats">
    <div class="ops-stat ${f === 'pending' ? 'active' : ''}" onclick="APP.opsFilter='pending';render()"><div class="ops-stat-val" style="color:var(--warn)">${pendingCount}</div><div class="ops-stat-label">Pending Actions</div></div>
    <div class="ops-stat ${f === 'to_administer' ? 'active' : ''}" onclick="APP.opsFilter='to_administer';render()"><div class="ops-stat-val" style="color:var(--orange)">${toAdminCount}</div><div class="ops-stat-label">To Administer</div></div>
    <div class="ops-stat ${f === 'reports_pending' ? 'active' : ''}" onclick="APP.opsFilter='reports_pending';render()"><div class="ops-stat-val" style="color:var(--info)">${repPendCount}</div><div class="ops-stat-label">Reports Pending</div></div>
    <div class="ops-stat ${f === 'complete' ? 'active' : ''}" onclick="APP.opsFilter='complete';render()"><div class="ops-stat-val" style="color:var(--success)">${doneCount}</div><div class="ops-stat-label">Complete</div></div>
  </div>
  <div class="filter-bar">
    <button class="filter-tab ${f === 'all' ? 'active' : ''}" onclick="APP.opsFilter='all';render()">All</button>
  </div>
  ${filtered.length === 0 ? '<div class="empty-state"><div class="icon">📋</div><p>No items match this filter.</p></div>' :
          filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map(rx => renderOpsCard(rx)).join('')}`;
    }

    function renderOpsCard(rx) {
      const lines = rx.orderLines || [];
      const sc = STATUS_CONFIG[rx.status] || STATUS_CONFIG.active;
      const doc = getDoctors().find(d => d.id === rx.doctorId);
      return `
  <div class="ops-card">
    <div class="ops-card-hdr">
      <div>
        <div style="font-weight:600;font-size:14px;">${rx.id} · ${rx.patient.name} · ${rx.patient.age}Y ${rx.patient.gender}</div>
        <div style="font-size:11.5px;color:var(--text-muted);margin-top:2px;">${doc?.profile?.name || rx.doctorName} · ${fmtDate(rx.createdAt)}</div>
      </div>
      <span class="pill ${sc.pill}">${sc.icon} ${sc.label}</span>
    </div>
    <div class="ops-card-body">
      ${lines.map((l, i) => renderOrderLine(rx.id, l, i)).join('')}
      <div class="nurse-select">
        <span style="font-size:12px;color:var(--text-muted);">Nurse:</span>
        <select id="nurse-${rx.id}" style="width:auto;min-width:160px;" onchange="saveOpsCard('${rx.id}')">
          <option value="">Select nurse...</option>
          ${getNurses().map(n => `<option value="${n.id}" ${lines.some(l => l.administeredBy === n.id) ? 'selected' : ''}>${n.name}</option>`).join('')}
        </select>
        <button class="btn btn-primary btn-sm" onclick="saveOpsCard('${rx.id}')">💾 Save All</button>
      </div>
    </div>
  </div>`;
    }

    function renderOrderLine(rxId, line, idx) {
      const iconBg = line.type === 'procedure' ? 'rgba(245,98,30,0.12)' : line.type === 'referral' ? 'rgba(142,68,173,0.12)' : 'rgba(52,152,219,0.12)';
      const sDone = line.status === 'administered' || line.status === 'report_uploaded';
      const sDecl = line.status === 'declined';
      const sAccepted = line.status === 'accepted';
      const isPending = line.status === 'pending';
      const isTest = line.type === 'lab_test' || line.type === 'diagnostic_test';
      const isProc = line.type === 'procedure';
      const isRef = line.type === 'referral';

      let statusHtml = '';
      if (sDone) statusHtml = `<span class="pill pill-green">✅ ${isProc ? 'Administered' : 'Report Uploaded'}</span>`;
      else if (sDecl) statusHtml = `<span class="pill pill-red">❌ Declined</span>`;
      else if (sAccepted && isTest) statusHtml = `<span class="pill pill-blue">✓ Accepted</span><button class="btn btn-primary btn-sm" onclick="showUploadModal('${rxId}',${idx})">📤 Upload Report</button>`;
      else if (isPending) {
        if (isProc) statusHtml = `<button class="btn btn-success-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'administered')">✅ Administered</button><button class="btn btn-danger-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'declined')">❌ Declined</button>`;
        else if (isTest) statusHtml = `<button class="btn btn-info-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'accepted')">✅ Accepted</button><button class="btn btn-danger-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'declined')">❌ Declined</button>`;
        else if (isRef) statusHtml = `<button class="btn btn-info-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'accepted')">✅ Accepted</button><button class="btn btn-danger-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'declined')">❌ Declined</button>`;
      }

      return `
    <div class="order-line">
      <div class="order-line-icon" style="background:${iconBg}">${line.icon || ORDER_ICONS[line.type]}</div>
      <div class="order-line-info">
        <div class="order-line-name">${line.details}</div>
        <div class="order-line-meta">${line.category}${line.quantity > 1 ? ' × ' + line.quantity : ''}${line.administeredBy ? ' · by ' + getNurses().find(n => n.id === line.administeredBy)?.name : ''}${line.administeredAt ? ' · ' + fmtDate(line.administeredAt) : ''}</div>
      </div>
      <div class="order-line-actions">${statusHtml}</div>
    </div>`;
    }

    function setOLStatus(rxId, idx, status) {
      const rxs = getRxs();
      const rx = rxs.find(r => r.id === rxId);
      if (!rx || !rx.orderLines[idx]) return;
      rx.orderLines[idx].status = status;
      if (status === 'administered') {
        const nurseEl = document.getElementById('nurse-' + rxId);
        if (!nurseEl?.value) { toast('Please select a nurse first.', 'error'); return; }
        rx.orderLines[idx].administeredBy = nurseEl.value;
        rx.orderLines[idx].administeredAt = new Date().toISOString();
      }
      if (status === 'accepted' || status === 'declined') {
        rx.orderLines[idx].patientResponse = status;
      }
      rx.status = computeRxStatus(rx);
      saveRxs(rxs);
      updatePrescription(rx);
      toast(status === 'administered' ? 'Procedure marked as administered.' : status === 'declined' ? 'Marked as declined.' : 'Status updated.');
      render();
    }

    function saveOpsCard(rxId) {
      toast('Status saved for ' + rxId);
    }

    /* ── Upload Report Modal ── */
    function showUploadModal(rxId, lineIdx) {
      const existing = document.getElementById('upload-modal');
      if (existing) existing.remove();
      const ov = document.createElement('div');
      ov.className = 'overlay'; ov.id = 'upload-modal';
      ov.innerHTML = `
    <div class="modal" style="max-width:500px;">
      <div class="modal-hdr"><h3>📤 Upload Report</h3><button class="modal-close" onclick="closeUploadModal()">×</button></div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Upload the lab/diagnostic report image or PDF.</p>
        <div class="upload-area" id="upload-drop" onclick="document.getElementById('upload-file').click()">
          <div class="upload-icon">📁</div>
          <div class="upload-text">Click or drag & drop to upload</div>
          <div class="upload-hint">JPEG, PNG, or PDF · Max 10MB</div>

        <button class="btn btn-ghost" onclick="closeUploadModal()">Cancel</button>
        <button class="btn btn-primary" id="upload-submit" disabled>Upload Report</button>
      </div>
    </div>`;
      document.body.appendChild(ov);
      // Drag & drop
      const drop = document.getElementById('upload-drop');
      drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
      drop.ondragleave = () => drop.classList.remove('dragover');
      drop.ondrop = e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files[0]) processUploadFile(e.dataTransfer.files[0], rxId, lineIdx); };
    }

    function closeUploadModal() { const el = document.getElementById('upload-modal'); if (el) el.remove(); }

    let _pendingUpload = null;
    function handleFileSelect(input, rxId, lineIdx) {
      if (input.files[0]) processUploadFile(input.files[0], rxId, lineIdx);
    }

    function processUploadFile(file, rxId, lineIdx) {
      if (file.size > 10 * 1024 * 1024) { document.getElementById('upload-error').textContent = 'File too large (max 10MB)'; document.getElementById('upload-error').style.display = 'block'; return; }
      const reader = new FileReader();
      reader.onload = () => {
        _pendingUpload = { rxId, lineIdx, base64: reader.result, name: file.name, type: file.type };
        const prev = document.getElementById('upload-preview-area');
        if (file.type.startsWith('image/')) {
          prev.innerHTML = `<div class="upload-preview"><img class="upload-preview-thumb" src="${reader.result}"><div><div style="font-weight:600;font-size:13px;">${file.name}</div><div style="font-size:11px;color:var(--text-muted);">${(file.size / 1024).toFixed(0)} KB</div></div></div>`;
        } else {
          prev.innerHTML = `<div class="upload-preview"><div style="font-size:28px;">📄</div><div><div style="font-weight:600;font-size:13px;">${file.name}</div><div style="font-size:11px;color:var(--text-muted);">${(file.size / 1024).toFixed(0)} KB · PDF</div></div></div>`;
        }
        const btn = document.getElementById('upload-submit');
        btn.disabled = false;
        btn.onclick = () => doUploadReport();
      };
      reader.readAsDataURL(file);
    }

    function doUploadReport() {
      if (!_pendingUpload) return;
      const { rxId, lineIdx, base64, name, type } = _pendingUpload;
      const btn = document.getElementById('upload-submit');
      btn.disabled = true;
      btn.textContent = 'Uploading to Drive...';

      fetch(SHEET_API, {
        method: 'POST',
        body: JSON.stringify({ action: 'uploadReport', data: { base64, name, type } })
      })
        .then(r => r.json())
        .then(res => {
          if (res.error) throw new Error(res.error);
          const rxs = getRxs();
          const rx = rxs.find(r => r.id === rxId);
          if (!rx || !rx.orderLines[lineIdx]) return;

          rx.orderLines[lineIdx].status = 'report_uploaded';
          rx.orderLines[lineIdx].reportUrl = res.url;
          rx.orderLines[lineIdx].reportFileId = res.fileId;
          rx.orderLines[lineIdx].reportFileName = name;
          rx.orderLines[lineIdx].reportMimeType = type;
          rx.orderLines[lineIdx].reportUploadedAt = new Date().toISOString();
          rx.status = computeRxStatus(rx);

          saveRxs(rxs);
          updatePrescription(rx);

          _pendingUpload = null;
          closeUploadModal();
          toast('Report uploaded to Drive!');
          render();
        })
        .catch(err => {
          toast('Upload failed: ' + err.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Retry Upload';
        });
    }

    /* ── Image Zoom ── */
    function zoomImage(src) {
      const ov = document.createElement('div');
      ov.className = 'report-zoom-overlay';
      ov.onclick = () => ov.remove();
      ov.innerHTML = `<img src="${src}">`;
      document.body.appendChild(ov);
    }

    /* ══════════════════════════════════════════════════════

    function renderDoctorReview(myRxs) {
      const reviewable = myRxs.filter(r => r.status === 'reports_ready' || r.status === 'pending_actions' || r.status === 'executed' || r.status === 'case_complete');

            const pri = { reports_ready: 0, pending_actions: 1, executed: 2, case_complete: 3 };
            return (pri[a.status] || 9) - (pri[b.status] || 9) || new Date(b.createdAt) - new Date(a.createdAt);
          }).map(rx => {
            const sc = STATUS_CONFIG[rx.status] || STATUS_CONFIG.active;
            const reportsCount = (rx.orderLines || []).filter(l => l.status === 'report_uploaded').length;

        </div>
      </div>

    </div>
    <button class="btn btn-ghost" onclick="APP.reviewingRxId=null;render()">← Back</button>

  <!-- Execution Summary -->

        🔀 <span style="flex:1">${l.details}</span>
        <span class="pill ${l.status === 'accepted' ? 'pill-green' : l.status === 'declined' ? 'pill-red' : 'pill-gray'}" style="font-size:10px;">${l.status === 'accepted' ? '✅ Accepted' : l.status === 'declined' ? '❌ Declined' : '⏳ Pending'}</span>

  <!-- Lab Reports -->
  ${reports.length ? `
  <div class="followup-section">

    function saveFollowUp(rxId) {
      const rxs = getRxs();
      const rx = rxs.find(r => r.id === rxId);
      if (!rx) return;
      const lines = rx.orderLines || [];
      // Save interpretations
      lines.forEach((l, i) => {
        if (l.status === 'report_uploaded') {
          const el = document.getElementById('interp-' + i);
          if (el) l.interpretation = el.value;
        }
      });
      rx.followUp = {
        ...(rx.followUp || {}),
        updatedDiagnosis: document.getElementById('fu-diagnosis')?.value || '',
        additionalMeds: document.getElementById('fu-meds')?.value || '',
        finalNotes: document.getElementById('fu-notes')?.value || '',
        savedAt: new Date().toISOString(),
      };
      saveRxs(rxs);
      updatePrescription(rx);
      toast('Follow-up saved!');
    }

    function completeCase(rxId) {
      saveFollowUp(rxId); // save first
      const rxs = getRxs();
      const rx = rxs.find(r => r.id === rxId);
      if (!rx) return;
      rx.followUp.completedAt = new Date().toISOString();
      rx.status = 'case_complete';
      saveRxs(rxs);
      updatePrescription(rx);
      toast('Case completed! Generating PDF...');
      APP.previewRx = rx;
      render();
    }

    function reopenCase(rxId) {
      const rxs = getRxs();
      const rx = rxs.find(r => r.id === rxId);
      if (!rx) return;
      rx.followUp.completedAt = null;
      rx.status = computeRxStatus(rx);
      saveRxs(rxs);
      updatePrescription(rx);
      toast('Case reopened for review.');
      render();
    }

      const ORG = [245, 98, 30], DRK = [26, 26, 46], PUR = [74, 63, 107],
        GRY = [102, 102, 102], LGR = [187, 187, 187], XGR = [232, 232, 232],
        BG = [249, 248, 245], WRM = [255, 243, 238], GRN = [238, 249, 244],
        GR2 = [46, 204, 113], WHT = [255, 255, 255], BRDORG = [245, 208, 192], BRDGRN = [183, 228, 205];

      const setF = (st, sz, col) => { doc.setFont('helvetica', st); doc.setFontSize(sz); doc.setTextColor(...col); };
      const drawFooter = (pgNum, total) => {
        const currY = H - 15;
        doc.setDrawColor(...ORG); doc.setLineWidth(0.4); doc.line(M, currY, W - M, currY);
        setF('normal', 6.5, LGR); doc.text('immidit Health  \u00b7  care@immidit.com  \u00b7  +91 92179 22339', M, currY + 5);
        doc.text('Page ' + pgNum, W - M, currY + 5, { align: 'right' });
      };
      const newPage = () => { drawFooter(doc.internal.getNumberOfPages()); doc.addPage(); y = 15; };
      const guard = (need) => { if (y + need > H - 18) newPage(); };
      const fitText = (txt, maxW, startSz, st, col) => {
        const cleanTxt = String(txt || '').replace(/[^\x00-\x7F]/g, "");
        let sz = startSz; doc.setFont('helvetica', st); doc.setFontSize(sz);
        while (doc.getTextWidth(cleanTxt) > maxW && sz > 7) { sz -= 0.5; doc.setFontSize(sz); }
        doc.setTextColor(...col); return cleanTxt;
      };
      const fillR = (x, yy, w, h, col, r = 2) => { doc.setFillColor(...col); r ? doc.roundedRect(x, yy, w, h, r, r, 'F') : doc.rect(x, yy, w, h, 'F'); };
      const strokeR = (x, yy, w, h, col, r = 2, lw = 0.3) => { doc.setDrawColor(...col); doc.setLineWidth(lw); r ? doc.roundedRect(x, yy, w, h, r, r, 'S') : doc.rect(x, yy, w, h, 'S'); };
      const hline = (yy, col, lw = 0.3) => { doc.setDrawColor(...col); doc.setLineWidth(lw); doc.line(M, yy, W - M, yy); };
      const vbar = (x, yy, y2, col, lw = 0.7) => { doc.setDrawColor(...(col || ORG)); doc.setLineWidth(lw); doc.line(x, yy, x, y2); };
      const secTitle = (label) => {
        guard(10);
        setF('bold', 6.5, ORG); doc.text(label, M, y + 4);
        const tw = doc.getTextWidth(label);
        doc.setDrawColor(...ORG); doc.setLineWidth(0.35); doc.line(M + tw + 3, y + 3, W - M, y + 3);
        y += 8;

      // Load logo for embedding

      try {
        const imgEl = document.createElement('img');

        const cvs = document.createElement('canvas'); cvs.width = imgEl.naturalWidth; cvs.height = imgEl.naturalHeight;
        const ctx2 = cvs.getContext('2d'); ctx2.fillStyle = '#ffffff'; ctx2.fillRect(0, 0, cvs.width, cvs.height);

      } catch (e) { logoB64 = null; }

      const addLogo = (x, yy, w, h) => { if (logoB64) { try { doc.addImage(logoB64, 'PNG', x, yy, w, h); } catch (e) { } } };

      // ── TOP BAR ────────────────────────────────────────────────────────────────

      const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'immidit_' + rx.id + '_' + rx.patient.name.replace(/\s+/g, '_') + '.pdf';
      link.click();
      toast('Prescription ready with attachments!');
    }

    /* ══════════════════════════════════════════════════════
       AUTH
    ══════════════════════════════════════════════════════ */
    function logout() {
      if (_draftTimer) clearInterval(_draftTimer);
      saveDraft();  // save any in-progress work before logging out
      DB.del('session');
      APP.view = 'login'; APP.role = null; APP.currentDoctor = null;
      APP.loginError = ''; APP.loginRole = 'doctor';
      resetForm(); render();
    }

    let _peer = null;
    let _remoteStream = null;
    let _callInterval = null;
    let _activeCallCaseId = null;

    function initPeer(doctorId) {
      if (_peer) return;
      // PeerJS IDs should be alphanumeric/simple
      const cleanId = String(doctorId).replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
      console.log('📡 Initializing PeerJS for Doctor:', cleanId);
      _peer = new Peer(cleanId);
      
      _peer.on('open', id => console.log('✅ PeerJS Connected: ', id));
      _peer.on('error', err => console.warn('❌ PeerJS Error:', err));
      
      _peer.on('call', call => {
        APP.activeCall = call;
        toast('Direct Audio Link Established');
        checkIncomingCalls(); // Force UI check immediately
      });
    }

    async function checkIncomingCalls() {
      if (APP.role !== 'doctor' || !APP.currentDoctor) return;
      initPeer(APP.currentDoctor.id);

      const cases = getCases();
      let incoming = cases.find(c => c.consultationRequested && !c.doctorConsultation);
      
      // IF we have an active WebRTC link but no data flag yet, force a sync
      if (APP.activeCall && !incoming) {
        console.log('🔄 WebRTC Signal active, forcing data sync...');
        await SYNC.pull();
        incoming = getCases().find(c => c.consultationRequested && !c.doctorConsultation);
      }

      if (incoming && _activeCallCaseId !== incoming.id) {
        _activeCallCaseId = incoming.id;
        showIncomingCall(incoming);
      } else if (!incoming && _activeCallCaseId) {
        _activeCallCaseId = null;
        const overlay = document.getElementById('incoming-call-overlay');
        if (overlay) overlay.remove();
      }
    }

    function showIncomingCall(c) {
      if (document.getElementById('incoming-call-overlay')) return;

      const overlay = document.createElement('div');
      overlay.id = 'incoming-call-overlay';
      overlay.style = `
        position: fixed; top: 20px; right: 20px; z-index: 9999;
        background: #0F172A; color: white; border-radius: 16px;
        padding: 20px; width: 320px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 16px;
        animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      `;
      overlay.innerHTML = `
        <div style="display:flex; align-items:center; gap:12px;">
          <div style="width:48px; height:48px; border-radius:24px; background:var(--primary); display:flex; align-items:center; justify-content:center; position:relative;">
            <div style="position:absolute; width:100%; height:100%; border-radius:50%; background:var(--primary); opacity:0.6; animation: ping 1.5s infinite;"></div>
            <span style="font-size:24px;">👨‍⚕️</span>
          </div>
          <div>
            <div style="font-weight:700; font-size:14px;">Incoming Virtual Consult</div>
            <div style="font-size:12px; opacity:0.7;">Field Nurse is requesting bridge...</div>
          </div>
        </div>
        <div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:10px;">
          <div style="font-weight:600; font-size:13px; margin-bottom:4px;">${c.patientName}</div>
          <div style="font-size:11px; opacity:0.6; line-height:1.4;">${c.chiefIssue}</div>
        </div>
        <div style="display:flex; gap:10px;">
          <button onclick="acceptCall('${c.id}')" style="flex:1; background:var(--primary); color:white; border:none; padding:10px; border-radius:8px; font-weight:600; cursor:pointer;">Accept</button>
          <button onclick="document.getElementById('incoming-call-overlay').remove()" style="background:rgba(255,255,255,0.1); color:white; border:none; padding:10px; border-radius:8px; font-weight:600; cursor:pointer;">Ignore</button>
        </div>
        <style>
          @keyframes ping { 0% { transform: scale(1); opacity: 0.8; } 70%, 100% { transform: scale(2.5); opacity: 0; } }
          @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        </style>
      `;
      document.body.appendChild(overlay);
    }

    window.acceptCall = function(caseId) {
      const overlay = document.getElementById('incoming-call-overlay');
      if (overlay) overlay.remove();
      
      APP.viewingCaseId = caseId;
      APP.section = 'cases';
      
      const c = getCases().find(x => x.id === caseId);
      if (c) {
        APP.showModal = 'add_rx';
        APP.modalData = { 
          patient: { name: c.patientName, age: c.patientAge, gender: c.patientGender },
          linkedCaseId: c.id,
          vitals: c.exitVitals || null
        };
        
        // ANSWER THE WEBRTC CALL IF IT EXISTS
        if (APP.activeCall) {
          navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            APP.activeCall.answer(stream);
            APP.activeCall.on('stream', remoteStream => {
              const audio = document.getElementById('remote-audio') || document.createElement('audio');
              audio.id = 'remote-audio';
              audio.srcObject = remoteStream;
              audio.play();
              if (!document.getElementById('remote-audio')) document.body.appendChild(audio);
              toast('Clinical Bridge Connected — Real-time Audio Active', 'success');
            });
          });
        }
      }
      render();
    };

    window.endCall = function() {
      if (APP.activeCall) {
        APP.activeCall.close();
        APP.activeCall = null;
      }
      const audio = document.getElementById('remote-audio');
      if (audio) {
        audio.pause();
        audio.srcObject = null;
      }
      toast('Call Ended');
      render();
    };

    /* ══════════════════════════════════════════════════════
       BOOT — restore session if available
    ══════════════════════════════════════════════════════ */
    let _syncInterval = null;

    async function boot() {
      try {
        const root = document.getElementById('app');
        if (SHEET_API) {
          root.innerHTML = `
            <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dim);background:var(--bg);">
              <img src="${LOGO_SRC}" style="width:60px;margin-bottom:20px;opacity:0.5;">
              <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;">Syncing with Cloud...</div>
            </div>
          `;
          await Promise.race([
            SYNC.pull(),
            new Promise(resolve => setTimeout(resolve, 5000))
          ]);

          if (_syncInterval) clearInterval(_syncInterval);
          _syncInterval = setInterval(() => {
            const isInputFocused = !!APP.showModal || !!APP.viewingCaseId || !!APP.viewingRxId || (APP.role === 'doctor' && APP.section === 'new');
            
            if (!SYNC.active && !isInputFocused) {
              SYNC.pull().then(changed => {
                if (changed) render();
              });
            }
          }, 20000); 

          // ── VIRTUAL CALL POLLING ──
          if (_callInterval) clearTimeout(_callInterval);
          const pollCalls = async () => {
            await checkIncomingCalls();
            _callInterval = setTimeout(pollCalls, 5000);
          };
          pollCalls();
        }
      } catch (e) {
        console.error('Boot sync failed:', e);
      } finally {
        try {
          restoreSession();
          render();
        } catch (e) {
          console.error('Final boot render failed:', e);
        }
      }
    }

    boot();
      function showRawData(id) {
        const c = getCases().find(x => x.id === id);
        if (!c) return;
        alert(JSON.stringify(c, null, 2));
      }
      window.showRawData = showRawData;
    </script>
</body>
