<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>immidit — Prescription System</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <style>
    /* ══════════════════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════════════════ */
    :root {
      --bg: hsl(30, 52%, 96%);
      --bg2: hsl(30, 30%, 93%);
      --surf: #ffffff;
      --surf2: hsl(30, 20%, 92%);
      --surf3: hsl(30, 20%, 90%);
      --surf4: hsl(30, 20%, 86%);
      --border: hsl(30, 20%, 88%);
      --border2: hsl(30, 20%, 84%);
      --text: hsl(20, 28%, 19%);
      --text-muted: hsl(20, 15%, 45%);
      --text-dim: hsl(20, 10%, 65%);
      --primary: hsl(200, 66%, 51%);
      --primary-glow: hsl(200, 60%, 60%);
      --orange: hsl(21, 80%, 54%);
      --orange-dim: hsla(21, 80%, 54%, 0.1);
      --orange-bdr: hsla(21, 80%, 54%, 0.25);
      --amber: #F5A623;
      --success: #10B981;
      --danger: #EF4444;
      --info: hsl(200, 66%, 51%);
      --warn: #F59E0B;
      --grad: linear-gradient(135deg, var(--primary) 0%, var(--primary-glow) 100%);
      --grad-accent: linear-gradient(135deg, var(--orange) 0%, #F5A623 100%);
      --grad-soft: linear-gradient(135deg, hsla(200, 66%, 51%, 0.08) 0%, hsla(200, 60%, 60%, 0.04) 100%);
      --shadow: 0 12px 32px rgba(20, 10, 0, 0.08);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 18px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 14px;
    }

    /* ══════════════════════════════════════════════════════
   TYPOGRAPHY
══════════════════════════════════════════════════════ */
    h1,
    h2,
    h3 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      line-height: 1.2;
    }

    code,
    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* ══════════════════════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surf4);
      border-radius: 2px;
    }

    /* ══════════════════════════════════════════════════════
   FORM ELEMENTS
══════════════════════════════════════════════════════ */
    input,
    select,
    textarea {
      width: 100%;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 13.5px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--orange-bdr);
      box-shadow: 0 0 0 3px rgba(245, 98, 30, 0.08);
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--text-dim);
    }

    select option {
      background: var(--surf2);
      color: var(--text);
    }

    textarea {
      resize: vertical;
      min-height: 72px;
      line-height: 1.55;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field-row {
      display: grid;
      gap: 12px;
    }

    .field-row.c2 {
      grid-template-columns: 1fr 1fr;
    }

    .field-row.c3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .field-row.c4 {
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }

    /* ══════════════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      white-space: nowrap;
      text-decoration: none;
    }

    .filter-tab.active {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary {
      background: var(--grad);
      color: #fff;
      box-shadow: 0 4px 16px hsla(200, 66%, 51%, 0.25);
    }

    .btn-accent {
      background: var(--grad-accent);
      color: #fff;
      box-shadow: 0 4px 16px hsla(21, 80%, 54%, 0.25);
    }

    .btn-primary:hover, .btn-accent:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-primary:active, .btn-accent:active {
      transform: translateY(0);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--surf2);
      color: var(--text);
      border-color: var(--border2);
    }

    .btn-danger-soft {
      background: rgba(231, 76, 60, 0.12);
      color: var(--danger);
      border: 1px solid rgba(231, 76, 60, 0.2);
    }

    .btn-danger-soft:hover {
      background: rgba(231, 76, 60, 0.22);
    }

    .btn-success-soft {
      background: rgba(46, 204, 113, 0.1);
      color: var(--success);
      border: 1px solid rgba(46, 204, 113, 0.2);
    }

    .btn-success-soft:hover {
      background: rgba(46, 204, 113, 0.2);
    }

    .btn-info-soft {
      background: rgba(52, 152, 219, 0.1);
      color: var(--info);
      border: 1px solid rgba(52, 152, 219, 0.2);
    }

    .btn-info-soft:hover {
      background: rgba(52, 152, 219, 0.2);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-lg {
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
    }

    .btn-full {
      width: 100%;
      justify-content: center;
    }

    .btn-icon {
      padding: 8px;
      border-radius: 6px;
    }

    /* ══════════════════════════════════════════════════════
   CARDS
══════════════════════════════════════════════════════ */
    .card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 16px;
    }

    .card-sm {
      padding: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: var(--orange-dim);
      border: 1px solid var(--orange-bdr);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
    }

    .card-sub {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ══════════════════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════════════════ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: hsla(30, 52%, 96%, 0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo {
      height: 30px;
    }

    .topbar-tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--orange);
      opacity: 0.8;
      padding: 3px 8px;
      border: 1px solid var(--orange-bdr);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .topbar-nav {
      display: flex;
      gap: 4px;
    }

    .topbar-tab {
      padding: 6px 16px;
      border-radius: 7px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
      font-family: 'Poppins', sans-serif;
    }

    .topbar-tab:hover {
      color: var(--text);
      background: var(--surf2);
    }

    .topbar-tab.active {
      background: var(--grad-soft);
      color: var(--primary);
      font-weight: 600;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12.5px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .logout-btn {
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
      background: none;
      border: none;
      font-family: 'Poppins', sans-serif;
    }

    .logout-btn:hover {
      color: var(--danger);
    }

    /* ══════════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════════ */
    .app-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 52px);
    }

    .sidebar {
      background: var(--surf);
      border-right: 1px solid var(--border);
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
    }

    .sidebar-section {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 12px 10px 5px;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.14s;
      text-align: left;
      font-family: 'Poppins', sans-serif;
    }

    .sidebar-btn:hover {
      background: var(--surf2);
      color: var(--text);
    }

    .sidebar-btn.active {
      background: var(--grad-soft);
      border-color: var(--border2);
      color: var(--primary);
    }

    .sidebar-ico {
      font-size: 15px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .sidebar-badge {
      margin-left: auto;
      background: var(--orange);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 14px 10px 0;
      border-top: 1px solid var(--border);
    }

    .sidebar-doctor-info {
      font-size: 11.5px;
    }

    .sidebar-doctor-name {
      font-weight: 600;
      font-size: 12.5px;
      color: var(--text);
    }

    .sidebar-doctor-reg {
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      margin-top: 2px;
    }

    .content {
      padding: 28px;
      overflow-y: auto;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 24px;
      line-height: 1.2;
    }

    .page-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ══════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════ */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 15% 50%, hsla(200, 66%, 51%, 0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, hsla(21, 80%, 54%, 0.06) 0%, transparent 50%),
        var(--bg);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-box {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 44px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--grad);
    }

    .login-logo-wrap {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-logo {
      height: 44px;
    }

    .login-tagline {
      font-size: 11.5px;
      color: var(--text-dim);
      letter-spacing: 0.4px;
      margin-top: 8px;
    }

    .login-heading {
      font-size: 18px;
      text-align: center;
      margin-bottom: 24px;
      color: var(--text);
    }

    .role-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 22px;
      background: var(--surf2);
      border-radius: 9px;
      padding: 5px;
    }

    .role-opt {
      padding: 9px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      font-family: 'Poppins', sans-serif;
    }

    .role-opt.sel {
      background: var(--surf4);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
    }

    .error-msg {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.2);
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 12.5px;
      color: var(--danger);
      margin-bottom: 14px;
    }

    /* ══════════════════════════════════════════════════════
   PROFILE COMPLETION (first login)
══════════════════════════════════════════════════════ */
    .profile-screen {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 60%, rgba(245, 98, 30, 0.06) 0%, transparent 50%),
        var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .profile-card {
      width: 100%;
      max-width: 640px;
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .profile-banner {
      background: var(--grad);
      padding: 28px 32px;
      position: relative;
    }

    .profile-banner-logo {
      height: 30px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    .profile-banner h2 {
      font-family: 'Poppins', sans-serif; font-weight: 700;
      font-size: 22px;
      color: #fff;
      margin-top: 14px;
    }

    .profile-banner p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 4px;
    }

    .profile-steps {
      display: flex;
      gap: 6px;
      padding: 16px 32px;
      background: var(--surf2);
      border-bottom: 1px solid var(--border);
    }

    .profile-step {
      flex: 1;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      padding: 6px;
      border-radius: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .profile-step.done {
      color: var(--success);
    }

    .profile-step.active {
      color: var(--orange);
      background: var(--orange-dim);
    }

    .profile-body {
      padding: 32px;
    }

    /* ══════════════════════════════════════════════════════
   SIGNATURE PAD
══════════════════════════════════════════════════════ */
    .sig-container {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .sig-container canvas {
      display: block;
      width: 100%;
      height: 90px;
      cursor: crosshair;
      touch-action: none;
    }

    .sig-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-top: 1px solid var(--border);
    }

    .sig-hint {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ══════════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════════ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--grad);
    }

    .stat-label {
      font-size: 10.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-family: 'Poppins', sans-serif; font-weight: 700;
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .stat-orange .stat-value {
      color: var(--orange);
    }

    .stat-green .stat-value {
      color: var(--success);
    }

    .stat-blue .stat-value {
      color: var(--info);
    }

    /* ══════════════════════════════════════════════════════
   TABLE
══════════════════════════════════════════════════════ */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--surf2);
      border-bottom: 1px solid var(--border);
    }

    .data-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .data-table tbody tr:hover {
      background: var(--surf2);
    }

    .data-table tbody td {
      padding: 12px 14px;
      vertical-align: middle;
    }

    .data-table tbody tr:last-child {
      border-bottom: none;
    }

    /* ══════════════════════════════════════════════════════
   PILLS & TAGS
══════════════════════════════════════════════════════ */
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .pill-green {
      background: rgba(46, 204, 113, 0.12);
      color: var(--success);
      border: 1px solid rgba(46, 204, 113, 0.2);
    }

    .pill-orange {
      background: var(--orange-dim);
      color: var(--orange);
      border: 1px solid var(--orange-bdr);
    }

    .pill-red {
      background: rgba(231, 76, 60, 0.12);
      color: var(--danger);
      border: 1px solid rgba(231, 76, 60, 0.2);
    }

    .pill-blue {
      background: rgba(52, 152, 219, 0.12);
      color: var(--info);
      border: 1px solid rgba(52, 152, 219, 0.2);
    }

    .pill-gray {
      background: var(--surf3);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--surf3);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-muted);
      margin: 3px;
    }

    .tag-del {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }

    .tag-del:hover {
      color: var(--danger);
    }

    /* ══════════════════════════════════════════════════════
   MEDICINE ROWS
══════════════════════════════════════════════════════ */
    .med-row {
      display: grid;
      grid-template-columns: 2.5fr 1fr 0.7fr 1fr auto;
      gap: 8px;
      align-items: end;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 8px;
    }

    .med-row-header {
      display: grid;
      grid-template-columns: 2.5fr 1fr 0.7fr 1fr auto;
      gap: 8px;
      padding: 0 0 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .med-col-hdr {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .add-row-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 10px;
      border-radius: var(--radius-sm);
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all 0.15s;
      margin-top: 4px;
    }

    .add-row-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: var(--orange-dim);
    }

    /* ══════════════════════════════════════════════════════
   VITAL CHIPS
══════════════════════════════════════════════════════ */
    .vital-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .vital-chip {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 13px;
    }

    .vital-chip label {
      font-size: 9.5px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .vital-chip input {
      background: transparent;
      border: none;
      padding: 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      box-shadow: none;
    }

    .vital-chip input:focus {
      border: none;
      box-shadow: none;
    }

    .vital-unit {
      font-size: 10.5px;
      color: var(--text-dim);
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ══════════════════════════════════════════════════════
   RX CARDS (list view)
══════════════════════════════════════════════════════ */
    .rx-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .rx-card:hover {
      border-color: var(--border2);
    }

    .rx-card-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 18px;
      cursor: pointer;
    }

    .rx-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--orange);
      margin-bottom: 3px;
    }

    .rx-patient-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .rx-meta {
      font-size: 11.5px;
      color: var(--text-muted);
    }

    .rx-actions {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .rx-body {
      display: none;
      padding: 0 18px 16px;
      border-top: 1px solid var(--border);
    }

    .rx-body.open {
      display: block;
      padding-top: 14px;
    }

    .rx-detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .rx-detail-item label {
      font-size: 9.5px;
      color: var(--text-dim);
      margin-bottom: 3px;
    }

    .rx-detail-item p {
      font-size: 13px;
    }

    .chevron {
      transition: transform 0.2s;
      display: inline-block;
      color: var(--text-dim);
    }

    .chevron.open {
      transform: rotate(180deg);
    }

    /* ══════════════════════════════════════════════════════
   SECTION DIVIDER IN FORMS
══════════════════════════════════════════════════════ */
    .form-section {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 16px;
    }

    .form-section span {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .form-section::before,
    .form-section::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ══════════════════════════════════════════════════════
   ACTION BAR
══════════════════════════════════════════════════════ */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 18px 0;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    /* ══════════════════════════════════════════════════════
   MODAL / OVERLAY
══════════════════════════════════════════════════════ */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }

    .modal {
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--surf);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      position: relative;
    }

    .modal-hdr {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--surf);
      z-index: 10;
    }

    .modal-hdr h3 {
      font-size: 17px;
    }

    .modal-body {
      padding: 22px 24px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .modal-close:hover {
      background: var(--surf2);
      color: var(--danger);
    }

    .modal-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* ══════════════════════════════════════════════════════
   DOCTOR CARD (admin view)
══════════════════════════════════════════════════════ */
    .doctor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .doctor-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      transition: border-color 0.2s;
    }

    .doctor-card:hover {
      border-color: var(--border2);
    }

    .doctor-card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .doctor-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--orange-dim);
      border: 1px solid var(--orange-bdr);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .doctor-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .doctor-name {
      font-weight: 600;
      font-size: 14px;
    }

    .doctor-spec {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .doctor-reg {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--text-dim);
      margin-top: 3px;
    }

    .doctor-card-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ══════════════════════════════════════════════════════
   CREDENTIAL BOX
══════════════════════════════════════════════════════ */
    .cred-box {
      background: var(--surf2);
      border: 1px solid var(--orange-bdr);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 14px;
    }

    .cred-box-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .cred-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .cred-label {
      font-size: 11.5px;
      color: var(--text-muted);
    }

    .cred-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
    }

    .cred-warn {
      font-size: 11px;
      color: var(--warn);
      margin-top: 10px;
    }

    /* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      padding: 11px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      gap: 8px;
      animation: slideUp 0.3s ease;
      max-width: 320px;
    }

    .toast.show {
      display: flex;
    }

    .toast-success {
      background: rgba(46, 204, 113, 0.15);
      border: 1px solid rgba(46, 204, 113, 0.3);
      color: var(--success);
    }

    .toast-error {
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: var(--danger);
    }

    @keyframes slideUp {
      from {
        transform: translateY(14px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ══════════════════════════════════════════════════════
   PDF PREVIEW OVERLAY
══════════════════════════════════════════════════════ */
    .pdf-overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .pdf-modal-wrap {
      width: 100%;
      max-width: 700px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .pdf-modal-bar {
      background: var(--surf3);
      padding: 13px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .pdf-preview-content {
      background: #f5f4f0;
      max-height: 70vh;
      overflow-y: auto;
    }

    /* ══════════════════════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 44px;
      margin-bottom: 14px;
      opacity: 0.35;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* ══════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════ */
    .text-orange {
      color: var(--orange);
    }

    .text-muted {
      color: var(--text-muted);
    }

    .text-dim {
      color: var(--text-dim);
    }

    .text-success {
      color: var(--success);
    }

    .text-danger {
      color: var(--danger);
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .flex {
      display: flex;
    }

    .flex-center {
      display: flex;
      align-items: center;
    }

    .gap-8 {
      gap: 8px;
    }

    .gap-12 {
      gap: 12px;
    }

    .mt-4 {
      margin-top: 4px;
    }

    .mt-8 {
      margin-top: 8px;
    }

    .mt-16 {
      margin-top: 16px;
    }

    .hidden {
      display: none !important;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }

    /* ══════════════════════════════════════════════════════
   STATUS PILLS (extended)
══════════════════════════════════════════════════════ */
    .pill-amber {
      background: rgba(243, 156, 18, 0.12);
      color: var(--warn);
      border: 1px solid rgba(243, 156, 18, 0.25);
    }

    .pill-purple {
      background: rgba(142, 68, 173, 0.12);
      color: #A66BBF;
      border: 1px solid rgba(142, 68, 173, 0.25);
    }

    /* ══════════════════════════════════════════════════════
   PROCEDURE ROWS
══════════════════════════════════════════════════════ */
    .proc-row {
      display: grid;
      grid-template-columns: 1.2fr 2.5fr 0.6fr auto;
      gap: 8px;
      align-items: end;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 8px;
    }

    .proc-row-header {
      display: grid;
      grid-template-columns: 1.2fr 2.5fr 0.6fr auto;
      gap: 8px;
      padding: 0 0 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    /* ══════════════════════════════════════════════════════
   OPERATIONS DASHBOARD
══════════════════════════════════════════════════════ */
    .ops-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .ops-stat {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.18s;
    }

    .ops-stat:hover, .ops-stat.active {
      border-color: var(--orange-bdr);
      background: var(--orange-dim);
    }

    .ops-stat-val {
      font-size: 26px;
      font-family: 'Poppins', sans-serif; font-weight: 700;
      font-weight: 700;
    }

    .ops-stat-card.active {
      background: var(--grad-soft);
      border-color: var(--primary);
      color: var(--primary);
    }

    .ops-stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-top: 4px;
    }

    .ops-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .ops-card-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surf2);
    }

    .ops-card-body {
      padding: 14px 18px;
    }

    .order-line {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .order-line:last-child {
      border-bottom: none;
    }

    .order-line-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      background: var(--surf3);
    }

    .order-line-info {
      flex: 1;
      min-width: 0;
    }

    .order-line-name {
      font-size: 13px;
      font-weight: 600;
    }

    .order-line-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .order-line-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .nurse-select {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ══════════════════════════════════════════════════════
   REPORT CARDS
══════════════════════════════════════════════════════ */
    .report-card {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 14px;
    }

    .report-card-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surf3);
      border-bottom: 1px solid var(--border);
    }

    .report-card-body {
      padding: 14px 16px;
    }

    .report-img-wrap {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px;
      text-align: center;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .report-img-wrap img {
      max-width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 4px;
    }

    .report-img-wrap:hover::after {
      content: '🔍 Click to zoom';
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
    }

    .report-zoom-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      padding: 20px;
    }

    .report-zoom-overlay img {
      max-width: 95%;
      max-height: 95vh;
      object-fit: contain;
    }

    /* ══════════════════════════════════════════════════════
   UPLOAD AREA
══════════════════════════════════════════════════════ */
    .upload-area {
      border: 2px dashed var(--border2);
      border-radius: var(--radius);
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surf2);
    }

    .upload-area:hover {
      border-color: var(--orange);
      background: var(--orange-dim);
    }

    .upload-area.dragover {
      border-color: var(--orange);
      background: var(--orange-dim);
    }

    .upload-icon {
      font-size: 32px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    .upload-text {
      font-size: 13px;
      color: var(--text-muted);
    }

    .upload-hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .upload-preview {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surf3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
    }

    .upload-preview-thumb {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--bg);
    }

    /* ══════════════════════════════════════════════════════
   FOLLOW-UP SECTION
══════════════════════════════════════════════════════ */
    .followup-section {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-top: 18px;
    }

    .exec-summary {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .exec-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12.5px;
    }

    .exec-item.done {
      border-color: rgba(46,204,113,0.25);
      background: rgba(46,204,113,0.06);
    }

    .exec-item.declined {
      border-color: rgba(231,76,60,0.25);
      background: rgba(231,76,60,0.06);
    }

    /* ══════════════════════════════════════════════════════
   FILTER BAR
══════════════════════════════════════════════════════ */
    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .filter-bar input, .filter-bar select {
      width: auto;
      min-width: 180px;
    }

    .filter-tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
      font-family: 'Poppins', sans-serif;
    }

    .filter-tab:hover {
      background: var(--surf2);
    }

    .filter-tab.active {
      background: var(--orange-dim);
      border-color: var(--orange-bdr);
      color: var(--orange);
    }
  </style>
</head>

<body>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- APP ROOT -->
  <div id="app"></div>

  <script>
    'use strict';

    // ── Global Error Handler for Diagnostics ──
    window.onerror = function(msg, url, lineNo, columnNo, error) {

        this.active = true;
        try {
          const resp = await fetch(SHEET_API, {
            method: 'POST',
            body: JSON.stringify(data)
          });
          return { ok: true };
        } catch (e) {
          console.error('Sync error:', e);
          return { error: e };
        } finally {
          this.active = false;
        }
      },
      // Real Apps Script fetch for data pulling
      async pull() {
        if (!SHEET_API) return;
        try {
          const resp = await fetch(SHEET_API + '?action=pull');
          const data = await resp.json();
          if (data.error) throw data.error;

          // Update local storage with cloud data
          if (data.admin) DB.set('admin', data.admin);
          if (data.doctors) DB.set('doctors', data.doctors);
          if (data.prescriptions) DB.set('prescriptions', data.prescriptions);

          console.log('Cloud sync successful:', data.synced);
          return true;
        } catch (e) {
          console.warn('Pull failed, using local cache:', e);
          return false;
        }

      pushDoctors() { this.post({ action: 'saveDoctors', data: getDoctors() }); },

      };

      const hasContent = draft.patient.name || draft.chiefConcerns || draft.diagnosis ||

      if (hasContent) {

      }

    function restoreDraft() {
      const draft = DB.get('draft_rx');
      if (!draft) return;
      // Only restore if draft is less than 24 hours old
      if (draft.savedAt) {
        const age = Date.now() - new Date(draft.savedAt).getTime();
        if (age > 24 * 60 * 60 * 1000) { DB.del('draft_rx'); return; }
      }
      APP.formMeds = draft.formMeds || [{ name: '', dosage: '', days: '', timing: 'After food' }];
      APP.formLabTests = draft.formLabTests || [];
      APP.formDiagTests = draft.formDiagTests || [];

        if (rx.patient?.phone) phones.add(rx.patient.phone);
        (rx.medicines || []).forEach(m => { if (m.name) meds.add(m.name); });

      return { names: [...names], phones: [...phones], meds: [...meds] };

      if (APP.profileStep === 2) {
        const canvas = document.getElementById('sig-canvas');
        if (canvas) {
          sigCanvas = canvas;
          sigCtx = canvas.getContext('2d');
          sigCtx.strokeStyle = '#F5621E';
          sigCtx.lineWidth = 2.2;
          sigCtx.lineCap = 'round';
          sigCtx.lineJoin = 'round';
          const pt = e => ({ x: e.offsetX, y: e.offsetY });
          const tpt = e => { const r = canvas.getBoundingClientRect(), sx = canvas.width / r.width, sy = canvas.height / r.height; return { x: (e.touches[0].clientX - r.left) * sx, y: (e.touches[0].clientY - r.top) * sy }; };
          canvas.onmousedown = e => { sigDrawing = true; sigCtx.beginPath(); sigCtx.moveTo(pt(e).x, pt(e).y); };
          canvas.onmousemove = e => { if (!sigDrawing) return; sigCtx.lineTo(pt(e).x, pt(e).y); sigCtx.stroke(); };
          canvas.onmouseup = () => sigDrawing = false;
          canvas.onmouseleave = () => sigDrawing = false;
          canvas.ontouchstart = e => { e.preventDefault(); sigDrawing = true; const p = tpt(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); };
          canvas.ontouchmove = e => { e.preventDefault(); if (!sigDrawing) return; const p = tpt(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); };
          canvas.ontouchend = () => sigDrawing = false;
        }

        document.getElementById('pf-back2')?.addEventListener('click', () => { APP.profileStep = 1; render(); });
        document.getElementById('pf-finish')?.addEventListener('click', () => {
          const sig = sigCanvas ? sigCanvas.toDataURL() : null;
          const doctors = getDoctors();
          const idx = doctors.findIndex(d => d.id === APP.currentDoctor.id);
          doctors[idx].profile.signature = sig;
          doctors[idx].profileComplete = true;
          saveDoctors(doctors);
          APP.currentDoctor = doctors[idx];
          APP.view = 'doctor'; APP.role = 'doctor'; APP.section = 'new'; saveSession();
          toast('Profile complete! Welcome to immidit Rx.');
          render();
        });
      }
    }

    function createDoctor() {
      const username = document.getElementById('m-user').value.trim().toLowerCase();
      const password = document.getElementById('m-pass').value.trim();
      const name = document.getElementById('m-name').value.trim();
      const reg = document.getElementById('m-reg').value.trim();
      const errEl = document.getElementById('m-error');

      if (!username || !password) { errEl.textContent = 'Username and password are required.'; errEl.style.display = 'block'; return; }
      if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
      const docs = getDoctors();
      if (docs.find(d => d.username === username)) { errEl.textContent = 'Username already exists. Choose another.'; errEl.style.display = 'block'; return; }

      const id = genId('DOC');
      const newDoc = {
        id, username, password,
        profileComplete: false,
        active: true,
        createdAt: new Date().toISOString(),
        profile: {
          name: name || '',
          regId: reg || '',
          specialty: '',
          qualification: '',
          experience: '',
          phone: '',
          bio: '',
          signature: null,
          avatarInitials: name ? name.split(' ').filter(w => w).slice(0, 2).map(w => w[0].toUpperCase()).join('') : username.substring(0, 2).toUpperCase(),
        }
      };
      docs.push(newDoc);
      saveDoctors(docs);

      errEl.style.display = 'none';
      document.getElementById('m-submit').disabled = true;
      document.getElementById('m-submit').textContent = 'Created ✓';
      document.getElementById('cred-u').textContent = username;
      document.getElementById('cred-p').textContent = password;
      document.getElementById('m-success').style.display = 'block';
      toast('Doctor account created successfully!');
    }

    function showCreds(id) {
      const d = getDoctors().find(doc => doc.id === id);
      APP.showModal = 'view_creds'; APP.modalData = d; render();
    }

    function resetPassword(id) {
      const d = getDoctors().find(doc => doc.id === id);
      APP.showModal = 'reset_pass'; APP.modalData = d; render();
    }

    function doResetPass() {
      const newPass = document.getElementById('new-pass').value.trim();
      const errEl = document.getElementById('rp-error');
      if (!newPass || newPass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
      const docs = getDoctors();
      const idx = docs.findIndex(d => d.id === APP.modalData.id);
      docs[idx].password = newPass;
      saveDoctors(docs);
      errEl.style.display = 'none';
      document.getElementById('rp-new-val').textContent = newPass;
      document.getElementById('rp-success').style.display = 'block';
      document.getElementById('rp-submit').disabled = true;
      toast('Password reset successfully!');
    }

    function toggleDoctor(id) {
      const docs = getDoctors();
      const idx = docs.findIndex(d => d.id === id);
      docs[idx].active = !docs[idx].active;
      saveDoctors(docs);
      toast(docs[idx].active ? 'Doctor activated.' : 'Doctor deactivated.');
      render();
    }

    function addTag(type) {
      const inp = document.getElementById(type === 'lab' ? 'new-lab' : 'new-diag');

    function resetForm() {
      APP.formMeds = [{ name: '', dosage: '', days: '', timing: 'After food' }];
      APP.formLabTests = []; APP.formDiagTests = []; APP.formReferrals = [];
      APP.formProcedures = []; APP.formProcInstructions = '';
      APP.editingRxId = null;
      clearDraft();
    }

    function savePrescription() {
      const data = gatherForm();
      if (!data.patient.name) { toast('Patient name is required.', 'error'); return; }
      const doc = APP.currentDoctor;

      if (APP.editingRxId) {
        const rx = getRx(APP.editingRxId);
        if (rx) {
          const updated = { ...rx, ...data, edited: true, editedAt: new Date().toISOString() };
          // Regenerate order lines if new procedures/tests added
          if (!updated.orderLines) updated.orderLines = generateOrderLines(updated);
          updated.status = computeRxStatus(updated);
          updatePrescription(updated);
          APP.previewRx = updated;
        }
      } else {
        const rx = {
          id: genId('RX'),
          doctorId: doc.id, doctorName: doc.profile.name, doctorReg: doc.profile.regId,
          doctorSpec: doc.profile.specialty, doctorQual: doc.profile.qualification,
          doctorSignature: doc.profile.signature,
          createdAt: new Date().toISOString(), edited: false,
          ...data
        };
        // Generate order lines from prescribed items
        rx.orderLines = generateOrderLines(rx);
        rx.status = computeRxStatus(rx);
        rx.followUp = null; // will be filled during review
        addPrescription(rx);
        APP.previewRx = rx;
      }

      resetForm();
      toast(APP.editingRxId ? 'Prescription updated!' : 'Prescription saved!');
      render();
    }

    /* ══════════════════════════════════════════════════════
       ORDER LINE GENERATION & STATUS
    ══════════════════════════════════════════════════════ */
    function generateOrderLines(rx) {
      const lines = [];
      let idx = 0;
      // From procedures
      (rx.procedures || []).forEach(p => {
        if (!p.type && !p.details) return;
        const pt = PROCEDURE_TYPES.find(t => t.value === p.type);
        lines.push({
          id: 'OL-' + (++idx),
          type: 'procedure',
          category: pt ? pt.label : p.type,
          icon: pt ? pt.icon : '💉',
          details: p.details || '',
          quantity: p.quantity || 1,
          status: 'pending',
          administeredAt: null,
          administeredBy: null,
          patientResponse: null,
          reportUrl: null,
          reportFileId: null,
          notes: '',
        });
      });
      // From lab tests
      (rx.labTests || []).forEach(t => {
        lines.push({
          id: 'OL-' + (++idx),
          type: 'lab_test',
          category: 'Laboratory',
          icon: '🧪',
          details: t,
          status: 'pending',
          patientResponse: null,
          reportUrl: null,
          reportFileId: null,
          notes: '',
          interpretation: '',
        });
      });
      // From diagnostic tests
      (rx.diagnosticTests || []).forEach(t => {
        lines.push({
          id: 'OL-' + (++idx),
          type: 'diagnostic_test',
          category: 'Imaging / Diagnostic',
          icon: '📡',
          details: t,
          status: 'pending',
          patientResponse: null,
          reportUrl: null,
          reportFileId: null,
          notes: '',
          interpretation: '',
        });
      });
      // From referrals
      (rx.referral || []).forEach(r => {
        if (!r.specialist) return;
        lines.push({
          id: 'OL-' + (++idx),
          type: 'referral',
          category: 'Referral',
          icon: '🔀',
          details: r.specialist + (r.hospital ? ' — ' + r.hospital : ''),
          status: 'pending',
          patientResponse: null,
          notes: r.reason || '',
        });
      });
      return lines;
    }

    function computeRxStatus(rx) {
      const lines = rx.orderLines || [];
      if (lines.length === 0) return 'active';

      const allResolved = lines.every(l =>
        l.status === 'administered' || l.status === 'declined' ||
        l.status === 'accepted' || l.status === 'report_uploaded' || l.status === 'not_required'
      );
      const hasTestsWithReports = lines.some(l =>
        (l.type === 'lab_test' || l.type === 'diagnostic_test') && l.status === 'report_uploaded'
      );
      const hasUnresolvedTests = lines.some(l =>
        (l.type === 'lab_test' || l.type === 'diagnostic_test') &&
        (l.status === 'pending' || l.status === 'accepted')
      );

      if (rx.followUp && rx.followUp.completedAt) return 'case_complete';
      if (hasTestsWithReports && !hasUnresolvedTests) return 'reports_ready';
      if (allResolved && !hasTestsWithReports) return 'executed';
      return 'pending_actions';
    }

    function editRx(id) {
      const rx = getRxs().find(r => r.id === id);
      if (!rx) return;
      APP.editingRxId = id;
      APP.formMeds = rx.medicines?.slice() || [{ name: '', dosage: '', days: '', timing: 'After food' }];
      APP.formLabTests = rx.labTests?.slice() || [];
      APP.formDiagTests = rx.diagnosticTests?.slice() || [];
      APP.formReferrals = rx.referral?.slice() || [];
      APP.formProcedures = rx.procedures?.slice() || [];
      APP.formProcInstructions = rx.procInstructions || '';
      APP.section = 'new';
      render();
    }

    function toggleExpand(id) { APP.expandedRx = APP.expandedRx === id ? null : id; render(); }
    function getRx(id) { return getRxs().find(r => r.id === id); }

    /* ══════════════════════════════════════════════════════
       DOCTOR PROFILE SAVE
    ══════════════════════════════════════════════════════ */
    function bindDoctorApp() {
      // Bind profile save
      document.getElementById('save-profile-btn')?.addEventListener('click', () => {
        const docs = getDoctors();
        const idx = docs.findIndex(d => d.id === APP.currentDoctor.id);
        const sig = sigCanvas ? sigCanvas.toDataURL() : docs[idx].profile.signature;
        docs[idx].profile = {
          ...docs[idx].profile,
          qualification: document.getElementById('up-qual')?.value || docs[idx].profile.qualification,
          experience: document.getElementById('up-exp')?.value || docs[idx].profile.experience,
          phone: document.getElementById('up-phone')?.value || docs[idx].profile.phone,
          bio: document.getElementById('up-bio')?.value || docs[idx].profile.bio,
          signature: sig,
        };
        saveDoctors(docs);
        APP.currentDoctor = docs[idx];
        toast('Profile saved successfully!');
      });

      // Bind signature pad if on profile
      if (APP.section === 'profile') {
        const canvas = document.getElementById('sig-canvas');
        if (canvas) {
          sigCanvas = canvas; sigCtx = canvas.getContext('2d');
          sigCtx.strokeStyle = '#F5621E'; sigCtx.lineWidth = 2.2; sigCtx.lineCap = 'round';
          // Restore existing sig
          const existingSig = APP.currentDoctor.profile.signature;
          if (existingSig) { const img = new Image(); img.onload = () => sigCtx.drawImage(img, 0, 0, canvas.width, canvas.height); img.src = existingSig; }
          const pt = e => ({ x: e.offsetX, y: e.offsetY });
          canvas.onmousedown = e => { sigDrawing = true; sigCtx.beginPath(); sigCtx.moveTo(pt(e).x, pt(e).y); };
          canvas.onmousemove = e => { if (!sigDrawing) return; sigCtx.lineTo(pt(e).x, pt(e).y); sigCtx.stroke(); };
          canvas.onmouseup = () => sigDrawing = false;
          canvas.onmouseleave = () => sigDrawing = false;
        }
      }

      // Apply draft if pending (after DOM is ready)
      if (APP.section === 'new' && APP._pendingDraft) {
        setTimeout(applyDraftToForm, 50);
      }

      // Start draft auto-save timer
      if (APP.section === 'new') {
        startDraftAutoSave();
      }
    }

    function bindAdminApp() { }

    /* ══════════════════════════════════════════════════════
       OPERATIONS DASHBOARD (Admin)
    ══════════════════════════════════════════════════════ */
    function renderOperations(allRxs) {
      const rxsWithOL = allRxs.filter(r => (r.orderLines || []).length > 0);
      const f = APP.opsFilter;
      const filtered = rxsWithOL.filter(rx => {
        if (f === 'all') return true;
        if (f === 'pending') return rx.status === 'pending_actions';
        if (f === 'to_administer') return (rx.orderLines||[]).some(l => l.type === 'procedure' && l.status === 'pending');
        if (f === 'reports_pending') return (rx.orderLines||[]).some(l => (l.type==='lab_test'||l.type==='diagnostic_test') && (l.status==='pending'||l.status==='accepted'));
        if (f === 'complete') return rx.status === 'executed' || rx.status === 'case_complete';
        return true;
      });
      const pendingCount = rxsWithOL.filter(r => r.status === 'pending_actions').length;
      const toAdminCount = rxsWithOL.reduce((c,r) => c + (r.orderLines||[]).filter(l => l.type === 'procedure' && l.status === 'pending').length, 0);
      const repPendCount = rxsWithOL.reduce((c,r) => c + (r.orderLines||[]).filter(l => (l.type==='lab_test'||l.type==='diagnostic_test') && (l.status==='pending'||l.status==='accepted')).length, 0);
      const doneCount = rxsWithOL.filter(r => r.status === 'executed' || r.status === 'case_complete').length;

      return `
  <div class="page-header">
    <div><h1 class="page-title">Operations</h1><div class="page-sub">Track procedures, tests & referrals</div></div>
  </div>
  <div class="ops-stats">
    <div class="ops-stat ${f==='pending'?'active':''}" onclick="APP.opsFilter='pending';render()"><div class="ops-stat-val" style="color:var(--warn)">${pendingCount}</div><div class="ops-stat-label">Pending Actions</div></div>
    <div class="ops-stat ${f==='to_administer'?'active':''}" onclick="APP.opsFilter='to_administer';render()"><div class="ops-stat-val" style="color:var(--orange)">${toAdminCount}</div><div class="ops-stat-label">To Administer</div></div>
    <div class="ops-stat ${f==='reports_pending'?'active':''}" onclick="APP.opsFilter='reports_pending';render()"><div class="ops-stat-val" style="color:var(--info)">${repPendCount}</div><div class="ops-stat-label">Reports Pending</div></div>
    <div class="ops-stat ${f==='complete'?'active':''}" onclick="APP.opsFilter='complete';render()"><div class="ops-stat-val" style="color:var(--success)">${doneCount}</div><div class="ops-stat-label">Complete</div></div>
  </div>
  <div class="filter-bar">
    <button class="filter-tab ${f==='all'?'active':''}" onclick="APP.opsFilter='all';render()">All</button>
  </div>
  ${filtered.length === 0 ? '<div class="empty-state"><div class="icon">📋</div><p>No items match this filter.</p></div>' :
    filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).map(rx => renderOpsCard(rx)).join('')}`;
    }

    function renderOpsCard(rx) {
      const lines = rx.orderLines || [];
      const sc = STATUS_CONFIG[rx.status] || STATUS_CONFIG.active;
      const doc = getDoctors().find(d => d.id === rx.doctorId);
      return `
  <div class="ops-card">
    <div class="ops-card-hdr">
      <div>
        <div style="font-weight:600;font-size:14px;">${rx.id} · ${rx.patient.name} · ${rx.patient.age}Y ${rx.patient.gender}</div>
        <div style="font-size:11.5px;color:var(--text-muted);margin-top:2px;">${doc?.profile?.name || rx.doctorName} · ${fmtDate(rx.createdAt)}</div>
      </div>
      <span class="pill ${sc.pill}">${sc.icon} ${sc.label}</span>
    </div>
    <div class="ops-card-body">
      ${lines.map((l, i) => renderOrderLine(rx.id, l, i)).join('')}
      <div class="nurse-select">
        <span style="font-size:12px;color:var(--text-muted);">Nurse:</span>
        <select id="nurse-${rx.id}" style="width:auto;min-width:160px;" onchange="saveOpsCard('${rx.id}')">
          <option value="">Select nurse...</option>
          ${NURSE_LIST.map(n => `<option value="${n.id}" ${lines.some(l=>l.administeredBy===n.id)?'selected':''}>${n.name}</option>`).join('')}
        </select>
        <button class="btn btn-primary btn-sm" onclick="saveOpsCard('${rx.id}')">💾 Save All</button>
      </div>
    </div>
  </div>`;
    }

    function renderOrderLine(rxId, line, idx) {
      const iconBg = line.type === 'procedure' ? 'rgba(245,98,30,0.12)' : line.type === 'referral' ? 'rgba(142,68,173,0.12)' : 'rgba(52,152,219,0.12)';
      const sDone = line.status === 'administered' || line.status === 'report_uploaded';
      const sDecl = line.status === 'declined';
      const sAccepted = line.status === 'accepted';
      const isPending = line.status === 'pending';
      const isTest = line.type === 'lab_test' || line.type === 'diagnostic_test';
      const isProc = line.type === 'procedure';
      const isRef = line.type === 'referral';

      let statusHtml = '';
      if (sDone) statusHtml = `<span class="pill pill-green">✅ ${isProc ? 'Administered' : 'Report Uploaded'}</span>`;
      else if (sDecl) statusHtml = `<span class="pill pill-red">❌ Declined</span>`;
      else if (sAccepted && isTest) statusHtml = `<span class="pill pill-blue">✓ Accepted</span><button class="btn btn-primary btn-sm" onclick="showUploadModal('${rxId}',${idx})">📤 Upload Report</button>`;
      else if (isPending) {
        if (isProc) statusHtml = `<button class="btn btn-success-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'administered')">✅ Administered</button><button class="btn btn-danger-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'declined')">❌ Declined</button>`;
        else if (isTest) statusHtml = `<button class="btn btn-info-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'accepted')">✅ Accepted</button><button class="btn btn-danger-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'declined')">❌ Declined</button>`;
        else if (isRef) statusHtml = `<button class="btn btn-info-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'accepted')">✅ Accepted</button><button class="btn btn-danger-soft btn-sm" onclick="setOLStatus('${rxId}',${idx},'declined')">❌ Declined</button>`;
      }

      return `
    <div class="order-line">
      <div class="order-line-icon" style="background:${iconBg}">${line.icon || ORDER_ICONS[line.type]}</div>
      <div class="order-line-info">
        <div class="order-line-name">${line.details}</div>
        <div class="order-line-meta">${line.category}${line.quantity > 1 ? ' × '+line.quantity : ''}${line.administeredBy ? ' · by '+NURSE_LIST.find(n=>n.id===line.administeredBy)?.name : ''}${line.administeredAt ? ' · '+fmtDate(line.administeredAt) : ''}</div>
      </div>
      <div class="order-line-actions">${statusHtml}</div>
    </div>`;
    }

    function setOLStatus(rxId, idx, status) {
      const rxs = getRxs();
      const rx = rxs.find(r => r.id === rxId);
      if (!rx || !rx.orderLines[idx]) return;
      rx.orderLines[idx].status = status;
      if (status === 'administered') {
        const nurseEl = document.getElementById('nurse-' + rxId);
        if (!nurseEl?.value) { toast('Please select a nurse first.', 'error'); return; }
        rx.orderLines[idx].administeredBy = nurseEl.value;
        rx.orderLines[idx].administeredAt = new Date().toISOString();
      }
      if (status === 'accepted' || status === 'declined') {
        rx.orderLines[idx].patientResponse = status;
      }
      rx.status = computeRxStatus(rx);
      saveRxs(rxs);
      updatePrescription(rx);
      toast(status === 'administered' ? 'Procedure marked as administered.' : status === 'declined' ? 'Marked as declined.' : 'Status updated.');
      render();
    }

    function saveOpsCard(rxId) {
      toast('Status saved for ' + rxId);
    }

    /* ── Upload Report Modal ── */
    function showUploadModal(rxId, lineIdx) {
      const existing = document.getElementById('upload-modal');
      if (existing) existing.remove();
      const ov = document.createElement('div');
      ov.className = 'overlay'; ov.id = 'upload-modal';
      ov.innerHTML = `
    <div class="modal" style="max-width:500px;">
      <div class="modal-hdr"><h3>📤 Upload Report</h3><button class="modal-close" onclick="closeUploadModal()">×</button></div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Upload the lab/diagnostic report image or PDF.</p>
        <div class="upload-area" id="upload-drop" onclick="document.getElementById('upload-file').click()">
          <div class="upload-icon">📁</div>
          <div class="upload-text">Click or drag & drop to upload</div>
          <div class="upload-hint">JPEG, PNG, or PDF · Max 10MB</div>
        </div>
        <input type="file" id="upload-file" accept="image/*,.pdf" style="display:none" onchange="handleFileSelect(this,'${rxId}',${lineIdx})">
        <div id="upload-preview-area"></div>
        <div id="upload-error" class="error-msg" style="display:none;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeUploadModal()">Cancel</button>
        <button class="btn btn-primary" id="upload-submit" disabled>Upload Report</button>
      </div>
    </div>`;
      document.body.appendChild(ov);
      // Drag & drop
      const drop = document.getElementById('upload-drop');
      drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
      drop.ondragleave = () => drop.classList.remove('dragover');
      drop.ondrop = e => { e.preventDefault(); drop.classList.remove('dragover'); if(e.dataTransfer.files[0]) processUploadFile(e.dataTransfer.files[0], rxId, lineIdx); };
    }

    function closeUploadModal() { const el = document.getElementById('upload-modal'); if(el) el.remove(); }

    let _pendingUpload = null;
    function handleFileSelect(input, rxId, lineIdx) {
      if(input.files[0]) processUploadFile(input.files[0], rxId, lineIdx);
    }

    function processUploadFile(file, rxId, lineIdx) {
      if(file.size > 10*1024*1024) { document.getElementById('upload-error').textContent='File too large (max 10MB)'; document.getElementById('upload-error').style.display='block'; return; }
      const reader = new FileReader();
      reader.onload = () => {
        _pendingUpload = { rxId, lineIdx, base64: reader.result, name: file.name, type: file.type };
        const prev = document.getElementById('upload-preview-area');
        if(file.type.startsWith('image/')) {
          prev.innerHTML = `<div class="upload-preview"><img class="upload-preview-thumb" src="${reader.result}"><div><div style="font-weight:600;font-size:13px;">${file.name}</div><div style="font-size:11px;color:var(--text-muted);">${(file.size/1024).toFixed(0)} KB</div></div></div>`;
        } else {
          prev.innerHTML = `<div class="upload-preview"><div style="font-size:28px;">📄</div><div><div style="font-weight:600;font-size:13px;">${file.name}</div><div style="font-size:11px;color:var(--text-muted);">${(file.size/1024).toFixed(0)} KB · PDF</div></div></div>`;
        }
        const btn = document.getElementById('upload-submit');
        btn.disabled = false;
        btn.onclick = () => doUploadReport();
      };
      reader.readAsDataURL(file);
    }

    function doUploadReport() {
      if(!_pendingUpload) return;
      const {rxId, lineIdx, base64, name, type} = _pendingUpload;
      const btn = document.getElementById('upload-submit');
      btn.disabled = true;
      btn.textContent = 'Uploading to Drive...';

      fetch(SHEET_API, {
        method: 'POST',
        body: JSON.stringify({ action: 'uploadReport', data: { base64, name, type } })
      })
      .then(r => r.json())
      .then(res => {
        if(res.error) throw new Error(res.error);
        const rxs = getRxs();
        const rx = rxs.find(r => r.id === rxId);
        if(!rx || !rx.orderLines[lineIdx]) return;

        rx.orderLines[lineIdx].status = 'report_uploaded';
        rx.orderLines[lineIdx].reportUrl = res.url;
        rx.orderLines[lineIdx].reportFileId = res.fileId;
        rx.orderLines[lineIdx].reportFileName = name;
        rx.orderLines[lineIdx].reportMimeType = type;
        rx.orderLines[lineIdx].reportUploadedAt = new Date().toISOString();
        rx.status = computeRxStatus(rx);
        
        saveRxs(rxs);
        updatePrescription(rx);
        
        _pendingUpload = null;
        closeUploadModal();
        toast('Report uploaded to Drive!');
        render();
      })
      .catch(err => {
        toast('Upload failed: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Retry Upload';
      });
    }

    /* ── Image Zoom ── */
    function zoomImage(src) {
      const ov = document.createElement('div');
      ov.className = 'report-zoom-overlay';
      ov.onclick = () => ov.remove();
      ov.innerHTML = `<img src="${src}">`;
      document.body.appendChild(ov);
    }

  <!-- Follow-Up Prescription -->
  ${!isComplete ? `

    function saveFollowUp(rxId) {
      const rxs = getRxs();
      const rx = rxs.find(r => r.id === rxId);
      if (!rx) return;
      const lines = rx.orderLines || [];
      // Save interpretations
      lines.forEach((l, i) => {
        if (l.status === 'report_uploaded') {
          const el = document.getElementById('interp-' + i);
          if (el) l.interpretation = el.value;
        }
      });
      rx.followUp = {
        ...(rx.followUp || {}),
        updatedDiagnosis: document.getElementById('fu-diagnosis')?.value || '',
        additionalMeds: document.getElementById('fu-meds')?.value || '',
        finalNotes: document.getElementById('fu-notes')?.value || '',
        savedAt: new Date().toISOString(),
      };
      saveRxs(rxs);
      updatePrescription(rx);
      toast('Follow-up saved!');
    }

    function completeCase(rxId) {
      saveFollowUp(rxId); // save first
      const rxs = getRxs();
      const rx = rxs.find(r => r.id === rxId);
      if (!rx) return;
      rx.followUp.completedAt = new Date().toISOString();
      rx.status = 'case_complete';
      saveRxs(rxs);
      updatePrescription(rx);
      toast('Case completed! Generating PDF...');
      APP.previewRx = rx;
      render();
    }

    function reopenCase(rxId) {
      const rxs = getRxs();
      const rx = rxs.find(r => r.id === rxId);
      if (!rx) return;
      rx.followUp.completedAt = null;
      rx.status = computeRxStatus(rx);
      saveRxs(rxs);
      updatePrescription(rx);
      toast('Case reopened for review.');
      render();
    }

        doc.setTextColor(...col); return cleanTxt;
      };
      const fillR = (x, yy, w, h, col, r = 2) => { doc.setFillColor(...col); r ? doc.roundedRect(x, yy, w, h, r, r, 'F') : doc.rect(x, yy, w, h, 'F'); };
